// ─── GOOGLE DRIVE HELPERS ─────────────────────────────────────────────────────
// All files use drive.file scope (regular Drive, not appDataFolder).
// This means one permission covers both sync AND public profile publishing.

async function driveUploadFile(name, jsonData, fileId, token, useAppData=true) {
  const CRLF = "\r\n";
  const boundary = "cric_bnd_7q";
  // appDataFolder for private sync files, no parent for public profile files
  const meta = JSON.stringify(fileId ? { name } : useAppData ? { name, parents:["appDataFolder"] } : { name });
  const body =
    "--" + boundary + CRLF + "Content-Type: application/json" + CRLF + CRLF +
    meta + CRLF +
    "--" + boundary + CRLF + "Content-Type: application/json" + CRLF + CRLF +
    JSON.stringify(jsonData) + CRLF +
    "--" + boundary + "--";
  const url = fileId
    ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
  const r = await fetch(url, {
    method: fileId ? "PATCH" : "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": `multipart/related; boundary=${boundary}` },
    body
  });
  if(!r.ok) { const t=await r.text(); throw new Error(`Drive upload ${r.status}: ${t}`); }
  return r.json();
}

async function driveReadFile(fileId, token) {
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if(!r.ok) { const t=await r.text(); throw new Error(`Read ${r.status}: ${t}`); }
  return r.json();
}

// Search appDataFolder — works across all devices for the same Google account
async function findAppDataFile(name, token) {
  const q = encodeURIComponent(`name='${name}' and trashed=false`);
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=${q}&fields=files(id,name,modifiedTime)&pageSize=5`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if(!r.ok) return null;
  const d = await r.json();
  return d.files?.[0] || null;
}

async function loadDBFromDrive(token, cachedFileId) {
  try {
    // Try cached ID first (fast path)
    if(cachedFileId) {
      try {
        const data = await driveReadFile(cachedFileId, token);
        if(data) return { data, fileId: cachedFileId };
      } catch(e) {
        if(!e.message.includes("404")) throw e;
        // 404 = file gone, fall through to search
      }
    }
    // Search appDataFolder — this works on any device logged into same Google account
    const file = await findAppDataFile(DRIVE_FILE_NAME, token);
    if(!file) return null;
    const data = await driveReadFile(file.id, token);
    return data ? { data, fileId: file.id } : null;
  } catch(e) { console.warn("loadDBFromDrive failed:", e); return null; }
}

async function saveDBToDrive(db, fileId, token) {
  const file = await driveUploadFile(DRIVE_FILE_NAME, db, fileId, token, true);
  return file.id;
}

// Public profile file — stored in regular Drive with public read permission
// Returns the Drive file ID which becomes the "friend code" to share
async function publishProfile(profile, dbSnapshot, token, existingPubFileId=null) {
  const name = `cricket_pub_${profile.userId}.json`;
  const CRLF = "\r\n";
  const boundary = "cric_pub_bnd_x9z";

  // Step 1: upload or update the file
  const uploadUrl = existingPubFileId
    ? `https://www.googleapis.com/upload/drive/v3/files/${existingPubFileId}?uploadType=multipart`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;

  // Keep the published file small so Google doesn't trigger the large-file scan page.
  // Only publish a lightweight DB summary (team names + match count) — NOT full match data.
  // Friends use this to confirm you're a real user; full data sync isn't needed for adding.
  const buildPayload = (fileId) => ({
    profile: {
      userId: profile.userId,
      username: profile.username,
      avatarColor: profile.avatarColor,
      lastSeen: Date.now(),
      publicFileId: fileId || null,
      friendCode: fileId ? makeFriendCode(profile, fileId) : null
    },
    dbSummary: {
      matchCount: (dbSnapshot.matches||[]).length,
      teamCount: (dbSnapshot.teams||[]).length,
      teams: (dbSnapshot.teams||[]).map(t=>({ id:t.id, name:t.name })),
    },
    // db is intentionally omitted from public profile to keep file size small
    // (large files trigger Google's virus-scan confirmation page, breaking cross-user reads)
  });

  const buildBody = (fileId) => {
    const metaStr = JSON.stringify({ name });
    const dataStr = JSON.stringify(buildPayload(fileId));
    return "--" + boundary + CRLF +
      "Content-Type: application/json" + CRLF + CRLF +
      metaStr + CRLF +
      "--" + boundary + CRLF +
      "Content-Type: application/json" + CRLF + CRLF +
      dataStr + CRLF +
      "--" + boundary + "--";
  };

  // Public profiles go to regular Drive (not appDataFolder) so they can be shared
  const pubMeta = JSON.stringify(existingPubFileId ? { name } : { name }); // no appDataFolder
  const buildPubBody = (fileId) => {
    const metaStr = JSON.stringify({ name });
    const dataStr = JSON.stringify(buildPayload(fileId));
    return "--" + boundary + CRLF +
      "Content-Type: application/json" + CRLF + CRLF +
      metaStr + CRLF +
      "--" + boundary + CRLF +
      "Content-Type: application/json" + CRLF + CRLF +
      dataStr + CRLF +
      "--" + boundary + "--";
  };
  const r = await fetch(uploadUrl, {
    method: existingPubFileId ? "PATCH" : "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": `multipart/related; boundary=${boundary}` },
    body: buildPubBody(existingPubFileId)
  });
  if(!r.ok) { const t=await r.text(); throw new Error(`Publish ${r.status}: ${t}`); }
  const fileData = await r.json();
  const fileId = fileData.id;

  // Step 2: set public permission — required for friends to read this file
  // Always attempt, even on updates (in case permission was lost)
  const permResp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/permissions`, {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ role: "reader", type: "anyone" })
  });
  if(!permResp.ok) {
    const permErr = await permResp.text();
    // 409 = permission already exists (fine), otherwise it's a real error
    if(!permErr.includes("alreadyExistsForFile") && permResp.status !== 409) {
      throw new Error(`Permission ${permResp.status}: ${permErr}`);
    }
  }

  // Step 3: if this was a new file, patch it again now that we know the real fileId
  // so the stored friendCode inside the file is correct
  if(!existingPubFileId) {
    try {
      const patchUrl = `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`;
      await fetch(patchUrl, {
        method: "PATCH",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": `multipart/related; boundary=${boundary}` },
        body: buildBody(fileId)
      });
    } catch(e) { console.warn("Self-patch failed (non-fatal):", e); }
  }

  return fileId;
}

async function readPublicProfile(fileId, token) {
  if(!fileId) throw new Error("No file ID provided");

  // Helper: safely parse JSON from text, returns null if not valid JSON
  function safeParseJSON(text) {
    try {
      const t = text.trim();
      if(!t.startsWith("{") && !t.startsWith("[")) return null;
      return JSON.parse(t);
    } catch(e) { return null; }
  }

  const apiUrl = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;

  // 1. Try authenticated first — works for own files and shared files in same Drive session
  if(token) {
    try {
      const r = await fetch(apiUrl, {
        headers: { Authorization: `Bearer ${token}`, Accept: "application/json" }
      });
      if(r.ok) {
        const text = await r.text();
        const parsed = safeParseJSON(text);
        if(parsed) return parsed;
        // Got HTML (Google scan page) — file too large, fall through to unauthenticated
      } else if(r.status !== 403 && r.status !== 404) {
        throw new Error(`Read profile ${r.status}`);
      }
      // 403/404 = different user's file or missing, try public URL below
    } catch(e) {
      if(e.message.startsWith("Read profile")) throw e;
    }
  }

  // 2. Unauthenticated public download — for cross-user access ("anyone with link")
  // &confirm=t bypasses Google's large-file virus-scan interstitial page
  for(const url of [
    `https://drive.google.com/uc?export=download&id=${fileId}&confirm=t`,
    `https://drive.google.com/uc?export=download&id=${fileId}`,
  ]) {
    try {
      const r = await fetch(url);
      if(r.ok) {
        const text = await r.text();
        const parsed = safeParseJSON(text);
        if(parsed) return parsed;
        // Still getting HTML — file might be too large; try next URL
      }
    } catch(e) { /* network error, try next */ }
  }

  throw new Error("Profile not accessible — ask your friend to re-publish their profile");
}

async function loadDB() {
  try {
    // Try compressed key first, fall back to old key
    const raw = localStorage.getItem("cricket_db4") || localStorage.getItem("cricket_db3");
    if(!raw) return INITIAL_DB;
    const d = JSON.parse(raw);
    return {
      teams:       d.teams       !== undefined ? d.teams       : [],
      grounds:     d.grounds     !== undefined ? d.grounds     : [],
      matches:     d.matches     !== undefined ? d.matches     : [],
      tournaments: d.tournaments !== undefined ? d.tournaments : [],

      settings:    { accent: "#f5c842", ...(d.settings || {}) },
    };
  } catch { return INITIAL_DB; }
}
async function saveDB(db) {
  try {
    const str = JSON.stringify(db);
    // Try saving full data
    try {
      localStorage.setItem("cricket_db4", str);
      localStorage.removeItem("cricket_db3"); // clean up old key
      return;
    } catch(e) {
      // Quota exceeded — save a trimmed version (keep all matches but strip spell plans which can be large)
      console.warn("localStorage quota hit, saving trimmed version");
      const trimmed = { ...db, teamSpellPlans: {}, mergeLog: {} };
      try {
        localStorage.setItem("cricket_db4", JSON.stringify(trimmed));
        localStorage.removeItem("cricket_db3");
      } catch(e2) {
        // Still too big — save without match ball-by-ball detail
        const minimal = { ...trimmed, matches: (db.matches||[]).map(m => {
          const { innings, ...rest } = m;
          // Keep innings but strip ball-by-ball arrays if present
          const slimInnings = (innings||[]).map(inn => {
            const { balls, ...innRest } = inn;
            return innRest;
          });
          return { ...rest, innings: slimInnings };
        })};
        localStorage.setItem("cricket_db4", JSON.stringify(minimal));
        localStorage.removeItem("cricket_db3");
      }
    }
  } catch(e) { console.error("saveDB failed entirely", e); }
}

const uid = () => Math.random().toString(36).slice(2,10);
const ovrStr = b => `${Math.floor(b/6)}.${b%6}`;
const rrColor = rr => rr>=10?"#ef4444":rr>=8?"#fb923c":rr>=6?"#fbbf24":"#4ade80";
function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function normalizeKey(v) { return String(v||"").trim().toLowerCase().replace(/[^a-z0-9]+/g," ").replace(/s+/g," ").trim(); }
function canonicalGroundKey(g) { return normalizeKey(typeof g === "string" ? g : (g?.name||"")); }
function matchMillis(m) { const t=Date.parse(m?.date||m?.completedAt||m?.createdAt||""); return Number.isFinite(t)?t:0; }
function sortMatchesChronological(matches, dir="asc") {
  return [...(matches||[])].sort((a,b)=>{ const d=matchMillis(a)-matchMillis(b); if(d) return dir==="desc"?-d:d; return String(a.id||"").localeCompare(String(b.id||"")); });
}
function makeFriendCode(profile, pubFileId) { return pubFileId ? `CRIC-FRIEND:${profile?.userId||""}:${pubFileId}` : ""; }
function parseFriendCode(input) {
  const raw=String(input||"").trim(); const parts=raw.split(":");
  if(parts[0]==="CRIC-FRIEND"&&parts.length>=3) return {userId:parts[1]||null,fileId:parts.slice(2).join(":")};
  if(parts.length===2&&parts[0]&&parts[1]) return {userId:parts[0],fileId:parts[1]};
  return {userId:null,fileId:raw};
}
function getTournamentScopeIds(tournament) { return [...new Set([tournament?.id, ...((tournament?.linkedTournamentIds)||[])].filter(Boolean))]; }
function getTournamentMatches(tournament, matches) { const ids=new Set(getTournamentScopeIds(tournament)); return sortMatchesChronological((matches||[]).filter(m=>ids.has(m.tournamentId))); }
function getCombinedTournament(tournament, db) {
  const ids=getTournamentScopeIds(tournament); const linked=(db.tournaments||[]).filter(t=>ids.includes(t.id));
  const matchTeamIds=getTournamentMatches(tournament, db.matches||[]).flatMap(m=>[m.team1Id,m.team2Id]);
  return {...tournament, teamIds:[...new Set([...linked.flatMap(t=>t.teamIds||[]), ...matchTeamIds].filter(Boolean))], scopeIds:ids};
}
function getTeamRecord(teamId, matches, db) {
  const team=db.teams?.find(t=>t.id===teamId); const teamMatches=(matches||[]).filter(m=>m.team1Id===teamId||m.team2Id===teamId);
  let played=0,won=0,lost=0,tied=0,runsFor=0,runsAgainst=0;
  for(const m of teamMatches){ const i1=m.innings?.[0],i2=m.innings?.[1]; if(!i1||!i2||!i1.completed||!i2.completed) continue; const mine=[i1,i2].find(i=>i.battingTeamId===teamId), opp=[i1,i2].find(i=>i.battingTeamId!==teamId); if(!mine||!opp) continue; played++; runsFor+=mine.runs; runsAgainst+=opp.runs; if(mine.runs>opp.runs) won++; else if(mine.runs<opp.runs) lost++; else tied++; }
  const players=(team?.players||[]).map(p=>({id:p.id,name:p.name,role:p.role,bat:getPlayerBattingStats(p.id,teamMatches),bowl:getPlayerBowlingStats(p.id,teamMatches),field:getPlayerFieldingStats(p.id,teamMatches),mvp:calcMVPPoints(p.id,teamMatches)}));
  const topBat=[...players].sort((a,b)=>b.bat.runs-a.bat.runs)[0]; const topBowler=[...players].sort((a,b)=>b.bowl.wickets-a.bowl.wickets)[0]; const bestPlayer=[...players].sort((a,b)=>b.mvp-a.mvp)[0];
  return {played,won,lost,tied,avgFor:played?(runsFor/played).toFixed(1):"-",avgAgainst:played?(runsAgainst/played).toFixed(1):"-",topBat:topBat&&topBat.bat.runs>0?{...topBat,runs:topBat.bat.runs}:null,topBowler:topBowler&&topBowler.bowl.wickets>0?{...topBowler,wickets:topBowler.bowl.wickets}:null,bestPlayer:bestPlayer&&bestPlayer.mvp>0?bestPlayer:null};
}

// ─── INNINGS FACTORY ──────────────────────────────────────────────────────────
function mkInnings(battingTeamId, bowlingTeamId) {
  return { battingTeamId, bowlingTeamId, balls:0, runs:0, wickets:0,
    extras:{wide:0,noBall:0,bye:0,legBye:0,penalty:0},
    overs:[], partnerships:[], batsmen:{}, bowlers:{}, fallOfWickets:[],
    currentOver:{bowlerId:null,balls:[]}, onStrike:null, nonStrike:null,
    currentPartnership:{bat1:null,bat2:null,runs:0,balls:0},
    completed:false, target:null, history:[] };
}

// ─── SCORING LOGIC ────────────────────────────────────────────────────────────
function snapshotInnings(inn) { return JSON.parse(JSON.stringify({...inn,history:[]})); }

function applyBall(inn, event) {
  const snap = snapshotInnings(inn);
  const n = JSON.parse(JSON.stringify(inn));
  n.history = [...(n.history||[]),snap].slice(-50);
  const {type,runs=0,extraType,wicketType,dismissedId,newBatsmanId,fielderId=null} = event;
  const strId=n.onStrike, bowlId=n.currentOver?.bowlerId;
  if(strId&&!n.batsmen[strId]) n.batsmen[strId]={id:strId,runs:0,balls:0,fours:0,sixes:0,out:false,how:""};
  if(bowlId&&!n.bowlers[bowlId]) n.bowlers[bowlId]={id:bowlId,balls:0,runs:0,wickets:0,wides:0,noBalls:0};
  const bat=strId?n.batsmen[strId]:null, bowl=bowlId?n.bowlers[bowlId]:null;

  if(type==="run"){
    n.runs+=runs; n.balls++;
    if(bat){bat.runs+=runs;bat.balls++;if(runs===4)bat.fours++;if(runs===6)bat.sixes++;}
    if(bowl){bowl.balls++;bowl.runs+=runs;}
    n.currentOver.balls.push({type:"run",runs});
    if(runs%2!==0)[n.onStrike,n.nonStrike]=[n.nonStrike,n.onStrike];
    n.currentPartnership.runs+=runs; n.currentPartnership.balls++;
  }
  if(type==="extra"){
    const tr=1; // for wide/bye/legbye base is 1
    if(extraType==="Wide"){
      n.runs+=1+runs; n.extras.wide+=1+runs;
      if(bowl){bowl.wides+=1+runs;bowl.runs+=1+runs;}
      n.currentOver.balls.push({type:"wide",runs:1+runs});
    } else if(extraType==="Bye"||extraType==="Leg Bye"){
      const amt=runs||1;
      n.runs+=amt; n.balls++;
      if(extraType==="Bye") n.extras.bye+=amt; else n.extras.legBye+=amt;
      if(bowl){bowl.balls++;bowl.runs+=amt;}
      n.currentOver.balls.push({type:extraType==="Bye"?"bye":"legbye",runs:amt});
      if(amt%2!==0)[n.onStrike,n.nonStrike]=[n.nonStrike,n.onStrike];
      n.currentPartnership.runs+=amt; n.currentPartnership.balls++;
    } else if(extraType==="Penalty"){
      n.runs+=5; n.extras.penalty+=5;
      n.currentOver.balls.push({type:"penalty",runs:5});
    }
  }
  if(type==="wicket"){
    n.balls++;
    if(bat){bat.balls++;bat.out=true;bat.how=wicketType||"Out";bat.runs+=runs;bat.bowlerId=bowlId;bat.fielderId=fielderId;}
    if(bowl){
      bowl.balls++;
      if(["Bowled","Caught","LBW","Stumped","Hit Wicket","Caught & Bowled","Mankad"].includes(wicketType)) bowl.wickets++;
      bowl.runs+=runs;
    }
    n.wickets++; n.runs+=runs;
    n.currentOver.balls.push({type:"wicket",wicketType,runs});
    n.fallOfWickets.push({score:n.runs,wicket:n.wickets,batsmanId:dismissedId,over:ovrStr(n.balls)});
    if(n.currentPartnership.bat1||n.currentPartnership.bat2) n.partnerships.push({...n.currentPartnership});
    if(wicketType==="Mankad"){
      if(n.batsmen[n.nonStrike]){n.batsmen[n.nonStrike].out=true;n.batsmen[n.nonStrike].how="Mankad";}
      n.nonStrike=newBatsmanId||null;
    } else {
      if(runs%2!==0)[n.onStrike,n.nonStrike]=[n.nonStrike,n.onStrike];
      n.onStrike=newBatsmanId||null;
    }
    n.currentPartnership={bat1:n.onStrike,bat2:n.nonStrike,runs:0,balls:0};
    if(n._maxPlayers ? n.wickets>=n._maxPlayers-1 : n.wickets>=10) n.completed=true;
  }
  const legalInOver=n.currentOver.balls.filter(b=>b.type!=="wide"&&b.type!=="penalty").length;
  if(legalInOver>=6){
    n.overs.push({...n.currentOver});
    n.currentOver={bowlerId:null,balls:[]};
    [n.onStrike,n.nonStrike]=[n.nonStrike,n.onStrike];
    // Auto-complete if overs limit reached
    if(n._maxOvers && n.overs.length>=n._maxOvers) n.completed=true;
  }
  return n;
}

function applyNoBall(inn, scored) {
  const snap=snapshotInnings(inn);
  const n=JSON.parse(JSON.stringify(inn));
  n.history=[...(n.history||[]),snap].slice(-50);
  const bowlId=n.currentOver?.bowlerId, strId=n.onStrike, total=1+scored;
  n.runs+=total; n.extras.noBall+=1;
  if(strId&&!n.batsmen[strId]) n.batsmen[strId]={id:strId,runs:0,balls:0,fours:0,sixes:0,out:false,how:""};
  if(bowlId&&!n.bowlers[bowlId]) n.bowlers[bowlId]={id:bowlId,balls:0,runs:0,wickets:0,wides:0,noBalls:0};
  const bat=strId?n.batsmen[strId]:null, bowl=bowlId?n.bowlers[bowlId]:null;
  if(bat&&scored>0){bat.runs+=scored;bat.balls++;if(scored===4)bat.fours++;if(scored===6)bat.sixes++;}
  else if(bat) bat.balls++;
  if(bowl){bowl.noBalls++;bowl.runs+=total;}
  n.currentOver.balls.push({type:"noBall",runs:total,scored});
  n.currentPartnership.runs+=total;
  if(scored%2!==0)[n.onStrike,n.nonStrike]=[n.nonStrike,n.onStrike];
  return n;
}

function undoLast(inn) {
  if(!inn.history?.length) return inn;
  const prev=inn.history[inn.history.length-1];
  return {...prev,history:inn.history.slice(0,-1)};
}

// ─── STATS HELPERS ────────────────────────────────────────────────────────────
function getPlayerBattingStats(playerId, matches) {
  let innings=0,runs=0,balls=0,fours=0,sixes=0,outs=0,fifties=0,hundreds=0,best=0,notOuts=0,ducks=0,dotBalls=0;
  for(const m of matches){
    for(const inn of (m.innings||[])){
      if(!inn) continue;
      const b=inn.batsmen?.[playerId];
      if(b){
        innings++;
        runs+=b.runs; balls+=b.balls; fours+=b.fours||0; sixes+=b.sixes||0;
        if(b.out) outs++; else notOuts++;
        if(b.runs>best) best=b.runs;
        if(b.runs>=100) hundreds++;
        else if(b.runs>=50) fifties++;
        if(b.runs===0&&b.out) ducks++;
        // count dot balls from over history
        for(const over of (inn.overs||[])){
          for(const ball of (over.balls||[])){
            if((ball.batsmanId===playerId||over.batsmanIds?.includes(playerId))&&ball.runs===0&&ball.type!=="wide"&&ball.type!=="noBall") dotBalls++;
          }
        }
      }
    }
  }
  const avg = outs>0?(runs/outs).toFixed(1):"—";
  const sr  = balls>0?((runs/balls)*100).toFixed(1):"—";
  return {innings,runs,balls,fours,sixes,outs,notOuts,fifties,hundreds,best,avg,sr,ducks,dotBalls};
}

function getPlayerFieldingStats(playerId, matches) {
  let catches=0,stumpings=0,runOuts=0;
  for(const m of matches){
    for(const inn of (m.innings||[])){
      if(!inn) continue;
      for(const [,bat] of Object.entries(inn.batsmen||{})){
        if(bat.fielderId===playerId){
          if(bat.how==="Caught"||bat.how==="Caught & Bowled") catches++;
          else if(bat.how==="Stumped") stumpings++;
          else if(bat.how==="Run Out") runOuts++;
        }
      }
    }
  }
  return {catches,stumpings,runOuts,total:catches+stumpings+runOuts};
}

function getPlayerBowlingStats(playerId, matches) {
  let innings=0,balls=0,runs=0,wickets=0,wides=0,noBalls=0,best5=0,bestFig={w:0,r:999},maidens=0,dotBalls=0;
  for(const m of matches){
    for(const inn of (m.innings||[])){
      if(!inn) continue;
      const b=inn.bowlers?.[playerId];
      if(b&&b.balls>0){
        innings++;
        balls+=b.balls; runs+=b.runs; wickets+=b.wickets;
        wides+=b.wides||0; noBalls+=b.noBalls||0;
        maidens+=b.maidens||0;
        dotBalls+=b.dotBalls||0;
        if(b.wickets>=5) best5++;
        if(b.wickets>bestFig.w||(b.wickets===bestFig.w&&b.runs<bestFig.r)) bestFig={w:b.wickets,r:b.runs};
      }
    }
  }
  const avg  = wickets>0?(runs/wickets).toFixed(1):"—";
  const econ = balls>0?((runs/(balls/6))).toFixed(2):"—";
  const sr   = wickets>0?(balls/wickets).toFixed(1):"—";
  const bestStr = bestFig.w>0?`${bestFig.w}/${bestFig.r}`:"—";
  return {innings,balls,runs,wickets,wides,noBalls,avg,econ,sr,best5,bestStr,maidens,dotBalls};
}

// MVP scoring — CricClubs.com official ranking system
// Batting: 1pt/run, +1 four bonus, +2 six bonus, -10 duck
//   Run rate bonus (min 10 runs AND 10 balls faced):
//     SR <50: -10 | 50-74: 0 | 75-99: 0 | 100-124: +10 | 125-149: +20 | 150+: +30
//   Milestone bonus: 10pts@10, 20pts@20, 30pts@30, 40pts@40, 50pts@50
// Bowling: 20pts/wicket, 40pts/maiden
//   Economy bonus (min 2 overs = 12 balls):
//     0-1.99: +30 | 2-3.99: +20 | 4-5.99: +10 | 6-7.99: 0 | 8-9.99: -10 | 10+: -20
// Fielding: catch +10, stumping +15, run-out (direct) +20, run-out (indirect) +10
// MOTM: +50
// ── CricClubs Official Ranking Points ────────────────────────────────────────
// Batting:  1pt/run, +1 four bonus, +2 six bonus, duck=-10
//   SR bonus (min 10 runs, 10 balls): <50=-10, 50-74=0, 75-99=0,
//     100-124=+10, 125-149=+20, 150-174=+30, 175-199=+40, 200+=+50
//   Milestone (highest reached, only if <50 runs): 10@10, 20@20, 30@30, 40@40
//   50+ runs: runs are doubled instead of milestones (60 runs = 120 pts, no milestone)
// Bowling:  20pts/wkt, 40pts/maiden
//   Wicket milestones (stacking): 2wkt=+10, 3wkt=+20, 4wkt=+40, 5wkt=+80
//   Economy (min 2 overs): <2=+30, 2-3.99=+20, 4-5.99=+10, 6-7.99=0,
//     8-9.99=-10, 10-11.99=-20, 12+=-30
// Fielding: catch=10, keeper catch=10, stumping=10, run-out=10 (direct=20 N/A — not tracked)
// MOTM:     +50
function calcSRBonus(runs, balls) {
  if(runs < 10 || balls < 10) return 0;
  const sr = (runs / balls) * 100;
  if(sr < 50)  return -10;
  if(sr < 75)  return 0;
  if(sr < 100) return 0;
  if(sr < 125) return 10;
  if(sr < 150) return 20;
  if(sr < 175) return 30;
  if(sr < 200) return 40;
  return 50;
}
function calcMilestoneBonus(runs) {
  // Milestones only apply BELOW 50 runs.
  // At 50+, runs are doubled instead (handled in calcMVPPoints) — no separate milestones.
  if(runs >= 50) return 0;
  if(runs >= 40) return 40;
  if(runs >= 30) return 30;
  if(runs >= 20) return 20;
  if(runs >= 10) return 10;
  return 0;
}
function calcEconBonus(balls, runs) {
  if(balls < 12) return 0;
  const econ = runs / (balls / 6);
  if(econ <  2) return 30;
  if(econ <  4) return 20;
  if(econ <  6) return 10;
  if(econ <  8) return 0;
  if(econ < 10) return -10;
  if(econ < 12) return -20;
  return -30;
}
function calcWicketMilestone(wkts) {
  let bonus = 0;
  if(wkts >= 2) bonus += 10;
  if(wkts >= 3) bonus += 20;
  if(wkts >= 4) bonus += 40;
  if(wkts >= 5) bonus += 80;
  return bonus;
}
function calcMVPPoints(playerId, matches, countMOTM=true) {
  const bat  = getPlayerBattingStats(playerId, matches);
  const bowl = getPlayerBowlingStats(playerId, matches);
  const field= getPlayerFieldingStats(playerId, matches);
  let pts = 0;
  // Batting — runs doubled for 50+
  const runs = bat.runs || 0;
  pts += runs >= 50 ? runs * 2 : runs;
  pts += (bat.fours||0) * 1;
  pts += (bat.sixes||0) * 2;
  pts -= (bat.ducks||0) * 10;
  pts += calcSRBonus(runs, bat.balls||0);
  pts += calcMilestoneBonus(runs);
  // Bowling
  const wkts = bowl.wickets || 0;
  pts += wkts * 20;
  pts += (bowl.maidens||0) * 40;
  pts += calcWicketMilestone(wkts);
  pts += calcEconBonus(bowl.balls||0, bowl.runs||0);
  // Fielding
  pts += (field.catches||0) * 10;
  pts += (field.stumpings||0) * 10;
  pts += (field.runOuts||0) * 10;
  // MOTM
  if(countMOTM) {
    pts += matches.filter(m => m.motm === playerId).length * 50;
  }
  return Math.round(pts);
}

// Detailed breakdown for display
function calcMVPBreakdown(playerId, matches) {
  const bat  = getPlayerBattingStats(playerId, matches);
  const bowl = getPlayerBowlingStats(playerId, matches);
  const field= getPlayerFieldingStats(playerId, matches);
  const runs = bat.runs || 0;
  const wkts = bowl.wickets || 0;
  const motmCount = matches.filter(m => m.motm === playerId).length;
  return {
    runs: runs >= 50 ? runs * 2 : runs,
    runDoubled: runs >= 50,
    fours:    (bat.fours||0) * 1,
    sixes:    (bat.sixes||0) * 2,
    ducks:   -((bat.ducks||0) * 10),
    srBonus:  calcSRBonus(runs, bat.balls||0),
    milestone:calcMilestoneBonus(runs),
    wickets:  wkts * 20,
    maidens:  (bowl.maidens||0) * 40,
    wktMilestone: calcWicketMilestone(wkts),
    econBonus:calcEconBonus(bowl.balls||0, bowl.runs||0),
    catches:  (field.catches||0) * 10,
    stumpings:(field.stumpings||0) * 10,
    runOuts:  (field.runOuts||0) * 10,
    motm:     motmCount * 50,
    total:    calcMVPPoints(playerId, matches, true),
  };
}

function getAutoMOTM(match) {
  const matchArr=[match];
  const teams=[match.matchTeams?.[match.team1Id],match.matchTeams?.[match.team2Id]];
  const players=teams.flatMap(t=>(t?.players||[]).map(p=>p.id));
  // Rank by MVP points, then tiebreak: wickets → economy → maidens → runs → SR
  const ranked = players.map(pid => {
    const pts  = calcMVPPoints(pid, matchArr, false);
    const bowl = getPlayerBowlingStats(pid, matchArr);
    const bat  = getPlayerBattingStats(pid, matchArr);
    const econ = (bowl.balls||0)>=6 ? bowl.runs/(bowl.balls/6) : 99;
    return { pid, pts, wkts: bowl.wickets||0, econ, maidens: bowl.maidens||0,
             runs: bat.runs||0, sr: (bat.balls||0)>0?(bat.runs/bat.balls)*100:0 };
  }).sort((a,b) =>
    b.pts    - a.pts    ||   // 1. Most MVP points
    b.wkts   - a.wkts   ||   // 2. Most wickets
    a.econ   - b.econ   ||   // 3. Better economy (lower is better)
    b.maidens- a.maidens ||   // 4. Most maidens
    b.runs   - a.runs   ||   // 5. Most runs
    b.sr     - a.sr          // 6. Better strike rate
  );
  const best = ranked[0];
  return { playerId: best?.pid || null, points: best?.pts || 0 };
}

function getGroundStats(groundName, matches) {
  let inn1Runs=0,inn1Balls=0,inn1Count=0,inn2Runs=0,inn2Balls=0,inn2Count=0,matchCount=0;
  for(const m of matches){
    if((m.ground||"").toLowerCase()!==(groundName||"").toLowerCase()) continue;
    matchCount++;
    const i1=m.innings?.[0], i2=m.innings?.[1];
    if(i1&&i1.balls>0){inn1Runs+=i1.runs;inn1Balls+=i1.balls;inn1Count++;}
    if(i2&&i2.balls>0){inn2Runs+=i2.runs;inn2Balls+=i2.balls;inn2Count++;}
  }
  return {
    matchCount,
    inn1Avg:  inn1Count>0?(inn1Runs/inn1Count).toFixed(1):"—",
    inn1RR:   inn1Balls>0?((inn1Runs/(inn1Balls/6))).toFixed(2):"—",
    inn2Avg:  inn2Count>0?(inn2Runs/inn2Count).toFixed(1):"—",
    inn2RR:   inn2Balls>0?((inn2Runs/(inn2Balls/6))).toFixed(2):"—",
    inn1Count, inn2Count,
  };
}

function getTournamentPoints(tournament, matches, db) {
  const scopedForTeams = getTournamentMatches(tournament, matches||[]);
  const teamIds = [...new Set([...(tournament.teamIds||[]), ...scopedForTeams.flatMap(m=>[m.team1Id,m.team2Id])].filter(Boolean))];
  const table = {};
  for(const id of teamIds){
    table[id]={played:0,won:0,lost:0,tied:0,nrr:0,pts:0,runFor:0,ballsFor:0,runAgainst:0,ballsAgainst:0};
  }
  const tMatches = getTournamentMatches(tournament, matches||[]);
  for(const m of tMatches){
    const i1=m.innings?.[0], i2=m.innings?.[1];
    if(!i1||!i2||!i1.completed||!i2.completed) continue;
    const t1=m.innings[0].battingTeamId, t2=m.innings[1].battingTeamId;
    if(!table[t1]||!table[t2]) continue;
    table[t1].played++; table[t2].played++;
    table[t1].runFor+=i1.runs; table[t1].ballsFor+=i1.balls;
    table[t2].runAgainst+=i1.runs; table[t2].ballsAgainst+=i1.balls;
    table[t2].runFor+=i2.runs; table[t2].ballsFor+=i2.balls;
    table[t1].runAgainst+=i2.runs; table[t1].ballsAgainst+=i2.balls;
    // Determine winner
    if(i2.runs>i1.runs){ table[t2].won++;table[t1].lost++;table[t2].pts+=2; }
    else if(i1.runs>i2.runs){ table[t1].won++;table[t2].lost++;table[t1].pts+=2; }
    else { table[t1].tied++;table[t2].tied++;table[t1].pts+=1;table[t2].pts+=1; }
  }
  // Compute NRR
  for(const id of teamIds){
    const t=table[id];
    const rrFor  = t.ballsFor>0  ?(t.runFor/(t.ballsFor/6)):0;
    const rrAgst = t.ballsAgainst>0?(t.runAgainst/(t.ballsAgainst/6)):0;
    t.nrr=(rrFor-rrAgst).toFixed(3);
  }
  return Object.entries(table).map(([id,row])=>({id,...row,name:db.teams?.find(t=>t.id===id)?.name||id}))
    .sort((a,b)=>b.pts-a.pts||(parseFloat(b.nrr)-parseFloat(a.nrr)));
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
// ─── ERROR BOUNDARY ───────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error("App error:", error, info); }
  render() {
    if(this.state.hasError) {
      return (
        <div style={{padding:24,color:"#e2e8f0",fontFamily:"sans-serif",background:"#0a0e1a",minHeight:"100vh"}}>
          <div style={{fontSize:18,fontWeight:700,marginBottom:8,color:"#f87171"}}>⚠️ Something went wrong</div>
          <div style={{fontSize:12,color:"#8899aa",marginBottom:16,wordBreak:"break-word"}}>{this.state.error?.message}</div>
          <button onClick={()=>this.setState({hasError:false,error:null})}
            style={{background:"#1e3a50",color:"#e2e8f0",border:"none",borderRadius:8,padding:"10px 20px",cursor:"pointer",marginRight:8,fontSize:13}}>
            Try Again
          </button>
          <button onClick={()=>{ localStorage.removeItem("cricket_db4"); localStorage.removeItem("cricket_db3"); window.location.reload(); }}
            style={{background:"#7f1d1d",color:"#fca5a5",border:"none",borderRadius:8,padding:"10px 20px",cursor:"pointer",fontSize:13}}>
            Reset &amp; Reload
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

function CricketScorer() {
  const [db,setDB]           = useState(INITIAL_DB);
  const [loaded,setLoaded]   = useState(false);
  const [view,setView]       = useState("home");
  const [activeMatch,setAM]  = useState(null);
  const [toast,setToast]     = useState(null);

  // ── Google / Cloud state ──
  const [gToken,setGToken]   = useState(null);   // OAuth access token
  const [gUser,setGUser]     = useState(null);    // { name, email, picture, sub }
  const [driveFileId,setDFI] = useState(null);
  const [social,setSocial]   = useState(INITIAL_SOCIAL);
  const [socialFileId,setSFI]= useState(null);
  const [cloudStatus,setCS]  = useState("local"); // "local"|"syncing"|"synced"|"error"
  const tokenRef             = useRef(null);
  const gCallbackRef         = useRef(null); // always-current ref to onGoogleToken

  // ── Boot: load local DB + restore cached Google user + restore social ──
  useEffect(()=>{
    loadDB().then(d=>{ setDB(d); setLoaded(true); });
    try {
      const cached = localStorage.getItem("cricket_guser");
      if(cached) setGUser(JSON.parse(cached));
    } catch{}
    try {
      const cachedSocial = localStorage.getItem("cricket_social");
      if(cachedSocial) setSocial(JSON.parse(cachedSocial));
    } catch{}
  },[]);

  // ── Core: perform Drive sync after we have a valid token ──
  const doSync = useCallback(async (token) => {
    setCS("syncing");
    try {
      const localRaw = localStorage.getItem("cricket_db4") || localStorage.getItem("cricket_db3");
      const localDB = localRaw ? JSON.parse(localRaw) : INITIAL_DB;

      // Use cached file IDs — drive.file scope doesn't allow search queries
      const cachedDFI = localStorage.getItem("cricket_drive_file_id") || null;
      const cachedSFI = localStorage.getItem("cricket_social_file_id") || null;

      // DB sync — always search appDataFolder so new devices find the file
      const driveResult = await loadDBFromDrive(token, cachedDFI);
      if(driveResult) {
        const driveDB = driveResult.data || {};
        // True merge: union of matches/teams/grounds from both sides (don't discard either)
        const myMatchIds = new Set((localDB.matches||[]).map(m=>m.id));
        const myTeamIds  = new Set((localDB.teams||[]).map(t=>t.id));
        const myGroundIds= new Set((localDB.grounds||[]).map(g=>g.id));
        const merged = {
          ...INITIAL_DB,
          ...driveDB,
          settings: { ...driveDB.settings, ...(localDB.settings||{}) },
          matches:  [...(driveDB.matches||[]), ...(localDB.matches||[]).filter(m=>!new Set((driveDB.matches||[]).map(x=>x.id)).has(m.id))],
          teams:    [...(driveDB.teams||[]),   ...(localDB.teams||[]).filter(t=>!new Set((driveDB.teams||[]).map(x=>x.id)).has(t.id))],
          grounds:  [...(driveDB.grounds||[]), ...(localDB.grounds||[]).filter(g=>!new Set((driveDB.grounds||[]).map(x=>x.id)).has(g.id))],
          tournaments: [...(driveDB.tournaments||[]), ...(localDB.tournaments||[]).filter(t=>!new Set((driveDB.tournaments||[]).map(x=>x.id)).has(t.id))],
          teamSpellPlans: { ...(localDB.teamSpellPlans||{}), ...(driveDB.teamSpellPlans||{}) },
          mergeLog: { ...(localDB.mergeLog||{}), ...(driveDB.mergeLog||{}) },
        };
        setDB(merged);
        await saveDB(merged);
        setDFI(driveResult.fileId);
        localStorage.setItem("cricket_drive_file_id", driveResult.fileId);
        saveDBToDrive(merged, driveResult.fileId, token).catch(()=>{});
      } else {
        // No Drive file yet — upload local data
        const newId = await saveDBToDrive(localDB, null, token);
        if(newId) { setDFI(newId); localStorage.setItem("cricket_drive_file_id", newId); }
      }

      // Social sync — merge friends from both Drive and local so neither device loses friends
      const socialResult = await loadSocialFromDrive(token, cachedSFI);
      if(socialResult && socialResult.data) {
        const driveSocial = socialResult.data;
        const cachedSocialRaw = localStorage.getItem("cricket_social");
        const localSocial = cachedSocialRaw ? JSON.parse(cachedSocialRaw) : null;
        // Union friends list: keep all unique friends from both sides
        const driveFriends = driveSocial.friends || [];
        const localFriends = (localSocial && localSocial.profile?.userId === driveSocial.profile?.userId)
          ? (localSocial.friends || []) : [];
        const friendMap = new Map();
        [...driveFriends, ...localFriends].forEach(f => {
          if(f && f.userId && typeof f.userId === "string") friendMap.set(f.userId, f);
        });
        const mergedSocial = { ...driveSocial, friends: [...friendMap.values()] };
        setSocial(mergedSocial);
        localStorage.setItem("cricket_social", JSON.stringify(mergedSocial));
        setSFI(socialResult.fileId);
        socialFileIdRef.current = socialResult.fileId;
        localStorage.setItem("cricket_social_file_id", socialResult.fileId);
        // Push merged version back to Drive if friends were added from local
        if(mergedSocial.friends.length > driveFriends.length) {
          saveSocialToDrive(mergedSocial, socialResult.fileId, token).catch(()=>{});
        }
      } else {
        // No social file yet — create one, seeding from local cache if available
        const cachedSocial = localStorage.getItem("cricket_social");
        const localSocial = cachedSocial ? JSON.parse(cachedSocial) : null;
        const cachedUser = localStorage.getItem("cricket_guser");
        const uData = cachedUser ? JSON.parse(cachedUser) : null;
        if(uData) {
          const baseSocial = localSocial && localSocial.profile?.userId === uData.sub
            ? localSocial
            : { ...INITIAL_SOCIAL, profile:{ userId: uData.sub, username: uData.name.split(" ")[0].toLowerCase() + uid().slice(0,4), avatarColor:"#f5c842" } };
          setSocial(baseSocial);
          localStorage.setItem("cricket_social", JSON.stringify(baseSocial));
          const newSId = await saveSocialToDrive(baseSocial, null, token).catch(()=>null);
          if(newSId) { setSFI(newSId); localStorage.setItem("cricket_social_file_id", newSId); }
        }
      }
      setCS("synced");
    } catch(e) {
      console.error("Sync failed", e);
      setCS("error");
    }
  }, []);

  // ── Google token callback — called by Google after sign-in or silent refresh ──
  const onGoogleToken = useCallback(async (tokenResp) => {
    const err = tokenResp.error;
    if(err) {
      console.warn("Google token error:", err, tokenResp);
      // interaction_required / consent_required = need to show the permissions screen
      // access_denied = user cancelled
      // These are all expected — just stay local, don't show a red error
      setCS("local");
      if(tokenResp._manual && err !== "interaction_required" && err !== "consent_required") {
        showToast("Could not sign in — try again","error");
      }
      return;
    }

    const token = tokenResp.access_token;
    if(!token) return; // ignore empty callbacks (can happen during consent redirect)

    // Store token
    tokenRef.current = token;
    setGToken(token);
    localStorage.setItem("cricket_token_expiry", String(Date.now() + ((tokenResp.expires_in||3500)*1000)));

    // Get/update user profile (only needed on first sign-in or when user info might have changed)
    try {
      const uResp = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", { headers:{ Authorization:`Bearer ${token}` }});
      if(uResp.ok) {
        const uData = await uResp.json();
        const gUserData = { name:uData.name, email:uData.email, picture:uData.picture, sub:uData.sub };
        setGUser(gUserData);
        localStorage.setItem("cricket_guser", JSON.stringify(gUserData));
        localStorage.setItem("cricket_google_remember", "1");
      }
    } catch(e) { console.warn("userinfo fetch failed (non-fatal)", e); }

    // Run Drive sync
    await doSync(token, tokenResp._manual);
  }, [doSync]);

  // Keep ref current so intervals always call the latest version
  gCallbackRef.current = onGoogleToken;

  // ── Auto silent re-auth on page load if previously signed in ──
  useEffect(()=>{
    const cachedUser = localStorage.getItem("cricket_guser");
    const remember = localStorage.getItem("cricket_google_remember");
    if(!cachedUser || remember === "0") return;
    let attempts = 0;
    const interval = setInterval(()=>{
      attempts++;
      if(attempts > 40) { clearInterval(interval); return; }
      if(!window.google?.accounts?.oauth2) return;
      clearInterval(interval);
      try {
        const parsed = JSON.parse(cachedUser);
        const client = window.google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: DRIVE_SCOPES,
          hint: parsed.email,
          callback: (resp) => gCallbackRef.current && gCallbackRef.current(resp),
        });
        client.requestAccessToken({ prompt:"" });
      } catch(e){ console.warn("Auto-auth failed", e); }
    }, 250);
    return () => clearInterval(interval);
  },[]);

  // ── Periodic silent token refresh every 45 min ──
  useEffect(()=>{
    const iv = setInterval(()=>{
      if(!tokenRef.current) return;
      if(localStorage.getItem("cricket_google_remember") === "0") return;
      const expiry = Number(localStorage.getItem("cricket_token_expiry")||0);
      if(Date.now() < expiry - 600000) return; // more than 10 min left, skip
      const cachedUser = localStorage.getItem("cricket_guser");
      if(!cachedUser) return;
      try {
        const parsed = JSON.parse(cachedUser);
        const client = window.google?.accounts?.oauth2?.initTokenClient({
          client_id: GOOGLE_CLIENT_ID, scope: DRIVE_SCOPES, hint: parsed.email,
          callback: (resp) => {
            if(!resp.error && resp.access_token) {
              tokenRef.current = resp.access_token;
              setGToken(resp.access_token);
              localStorage.setItem("cricket_token_expiry", String(Date.now() + ((resp.expires_in||3500)*1000)));
            }
          },
        });
        if(client) client.requestAccessToken({ prompt:"" });
      } catch(e){ console.warn("Token refresh failed", e); }
    }, 60000);
    return () => clearInterval(iv);
  },[]);

  // ── Trigger Google sign-in manually ──
  const signInGoogle = useCallback(() => {
    if(!window.google?.accounts?.oauth2) { showToast("Google not loaded yet — refresh the page","error"); return; }
    const cachedUser = localStorage.getItem("cricket_guser");
    try {
      const client = window.google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: DRIVE_SCOPES,
        callback: (resp) => gCallbackRef.current && gCallbackRef.current({ ...resp, _manual: true }),
        error_callback: (err) => {
          console.warn("GSI error:", err);
          if(err?.type === "popup_blocked_by_browser") {
            showToast("Popup blocked — allow popups for this site in your browser settings, then try again","error");
          } else if(err?.type === "popup_closed_by_user") {
            // user closed it, do nothing
          } else {
            showToast("Sign-in failed — try again","error");
          }
        }
      });
      client.requestAccessToken({ prompt: cachedUser ? "" : "select_account" });
    } catch(e) {
      console.error("signInGoogle error:", e);
      showToast("Sign-in error — refresh the page and try again","error");
    }
  }, []);

  const signOutGoogle = useCallback(() => {
    if(gToken && window.google?.accounts?.oauth2) {
      window.google.accounts.oauth2.revoke(gToken);
    }
    setGToken(null); setGUser(null); tokenRef.current=null;
    localStorage.removeItem("cricket_guser");
    localStorage.setItem("cricket_google_remember", "0");
    setDFI(null); setSFI(null);
    setCS("local");
  }, [gToken]);

  // ── Persist: save to localStorage + Drive ──
  const persist = useCallback((newDB) => {
    setDB(newDB);
    saveDB(newDB);
    if(tokenRef.current) {
      setCS("syncing");
      saveDBToDrive(newDB, driveFileId, tokenRef.current)
        .then(id => { setDFI(id); setCS("synced"); })
        .catch(() => setCS("error"));
    }
  }, [driveFileId]);

  const socialFileIdRef = useRef(null);
  useEffect(()=>{ socialFileIdRef.current = socialFileId; }, [socialFileId]);

  // ── Persist social ──
  const persistSocial = useCallback((newSocial) => {
    setSocial(newSocial);
    try { localStorage.setItem("cricket_social", JSON.stringify(newSocial)); } catch{}
    if(tokenRef.current) {
      saveSocialToDrive(newSocial, socialFileIdRef.current, tokenRef.current)
        .then(id => { setSFI(id); socialFileIdRef.current = id; localStorage.setItem("cricket_social_file_id", id); })
        .catch(e => console.warn("Social persist failed", e));
    }
  }, []);

  const showToast=(msg,type="success")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),2500); };
  const accent=db.settings?.accent||"#f5c842";
  const accentRgb=hexToRgb(accent);
  const css=`
    :root{--acc:${accent};--acc-rgb:${accentRgb};}
    *{box-sizing:border-box;} body{margin:0;}
    button:hover{filter:brightness(1.12);}
    .run-btn:hover{transform:scale(1.08);}
    .qcard:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(var(--acc-rgb),.18);}
    .nav-btn:hover{background:rgba(var(--acc-rgb),.12);}
    .pl-row:hover{background:#1a2640;}
    .hcard:hover{border-color:rgba(var(--acc-rgb),.45)!important;}
    .undo-btn:hover{background:rgba(255,100,100,.15)!important;border-color:#ef4444!important;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
    .af{animation:fadeIn .25s ease both;}
    input:focus,select:focus{outline:2px solid var(--acc)!important;outline-offset:0;}
    ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:#0a0e1a;} ::-webkit-scrollbar-thumb{background:#1e2d40;border-radius:4px;}
    .tab-btn{border-bottom:2px solid transparent;transition:color .2s,border-color .2s;}
    .tab-btn.active{border-bottom-color:var(--acc);color:var(--acc)!important;}
  `;

  if(!loaded) return(
    <div style={S.splash}><style>{css}</style>
      <div style={{fontSize:72}}>🏏</div>
      <div style={{fontSize:26,fontWeight:900,letterSpacing:8,color:accent,fontFamily:"Georgia,serif"}}>CRICKET SCORER</div>
      <div style={{width:50,height:3,background:accent,borderRadius:3,marginTop:8,opacity:.7}}/>
    </div>
  );

  const props={db,persist,showToast,accent,setView,setActiveMatch:setAM,
    gToken,gUser,signInGoogle,signOutGoogle,cloudStatus,social,persistSocial};

  return(
    <div style={S.app}>
      <style>{css}</style>
      <NavBar view={view} setView={setView} hasLive={!!activeMatch} accent={accent} gUser={gUser} cloudStatus={cloudStatus}/>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
      <div style={S.content}>
        {view==="home"        && <HomeView {...props}/>}
        {view==="teams"       && <TeamsView {...props}/>}
        {view==="matches"     && <MatchesView {...props}/>}
        {view==="tournaments" && <TournamentsView {...props}/>}
        {view==="grounds"     && <GroundsView {...props}/>}
        {view==="scoring"     && activeMatch && <ScoringView {...props} matchId={activeMatch}/>}
        {view==="settings"    && <SettingsView {...props}/>}
        {view==="profile"     && <ProfileView {...props}/>}
        {view==="deploy"      && <DeployView {...props}/>}
      </div>
    </div>
  );
}
