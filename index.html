          const batSixes=(bat1?.sixes||0)+(bat2?.sixes||0);
          const batOut=(bat1?.out||false)||(bat2?.out||false);
          const bowlBalls=(bowl1?.balls||0)+(bowl2?.balls||0);
          const bowlRuns=(bowl1?.runs||0)+(bowl2?.runs||0);
          const bowlWkts=(bowl1?.wickets||0)+(bowl2?.wickets||0);
          const hasBat=bat1||bat2, hasBowl=bowlBalls>0;
          if(!hasBat&&!hasBowl) return null;
          const sr=batBalls>0?((batRuns/batBalls)*100).toFixed(0):"—";
          const econ=bowlBalls>0?((bowlRuns/(bowlBalls/6))).toFixed(2):"—";
          const ovs=bowlBalls>0?ovrStr(bowlBalls):"—";
          return{...p,batRuns,batBalls,batFours,batSixes,batOut,hasBat,
            bowlBalls,bowlRuns,bowlWkts,hasBowl,sr,econ,ovs};
        }).filter(Boolean);
        if(!rows.length) return null;
        return(
          <div style={{marginTop:8}}>
            <div style={{color:"#8899aa",fontSize:9,fontWeight:700,letterSpacing:1.5,marginBottom:8,marginTop:20}}>PLAYER SUMMARY</div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,minWidth:360}}>
                <thead>
                  <tr style={{borderBottom:"1px solid #1a2840"}}>
                    {["Player","R/B","4s/6s","SR","O/M","W","Runs","Econ"].map((h,i)=>(
                      <th key={h} style={{padding:"4px 3px",textAlign:i===0?"left":"center",
                        color:"#556677",fontSize:8,fontWeight:700,letterSpacing:.3}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rows.map(p=>{
                    const maidens1=inn1?(inn1.overs||[]).filter(ov=>ov.bowlerId===p.id&&
                      !ov.balls.some(bl=>bl.type==="wide"||bl.type==="noBall")&&
                      ov.balls.reduce((s,bl)=>s+bl.runs,0)===0).length:0;
                    const maidens2=inn2?(inn2.overs||[]).filter(ov=>ov.bowlerId===p.id&&
                      !ov.balls.some(bl=>bl.type==="wide"||bl.type==="noBall")&&
                      ov.balls.reduce((s,bl)=>s+bl.runs,0)===0).length:0;
                    const totalMaidens=maidens1+maidens2;
                    return(
                      <tr key={p.id} style={{borderBottom:"1px solid #0d1424",
                        background:p.id===motmPlayer?.id?`rgba(${hexToRgb(accent)},.06)`:""}}>
                        <td style={{padding:"6px 3px"}}>
                          <div style={{fontWeight:600,fontSize:10}}>
                            {p.id===motmPlayer?.id&&<span style={{marginRight:3}}>⭐</span>}
                            {p.name}
                          </div>
                          <div style={{color:"#556677",fontSize:8}}>{p.teamName}</div>
                        </td>
                        <td style={{textAlign:"center",padding:"6px 3px",
                          color:p.batRuns>=50?"#f59e0b":p.batRuns>=30?accent:"#cdd5e0"}}>
                          {p.hasBat?`${p.batRuns}${!p.batOut?"*":""}/${p.batBalls}`:"—"}
                        </td>
                        <td style={{textAlign:"center",padding:"6px 3px",color:"#cdd5e0"}}>
                          {p.hasBat?`${p.batFours}/${p.batSixes}`:"—"}
                        </td>
                        <td style={{textAlign:"center",padding:"6px 3px",color:"#cdd5e0"}}>{p.hasBat?p.sr:"—"}</td>
                        <td style={{textAlign:"center",padding:"6px 3px",color:"#cdd5e0"}}>{p.hasBowl?`${p.ovs}/${totalMaidens}`:"—"}</td>
                        <td style={{textAlign:"center",padding:"6px 3px",
                          fontWeight:p.bowlWkts>0?700:400,
                          color:p.bowlWkts>=5?"#f59e0b":p.bowlWkts>0?accent:"#cdd5e0"}}>
                          {p.hasBowl?p.bowlWkts:"—"}
                        </td>
                        <td style={{textAlign:"center",padding:"6px 3px",color:"#cdd5e0"}}>{p.hasBowl?p.bowlRuns:"—"}</td>
                        <td style={{textAlign:"center",padding:"6px 3px",color:"#cdd5e0"}}>{p.hasBowl?p.econ:"—"}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{color:"#334455",fontSize:8,marginTop:6,lineHeight:1.8}}>
              R=runs B=balls SR=strike rate O=overs M=maidens W=wickets Econ=economy * not out
            </div>
          </div>
        );
      })()}

      {/* MOTM picker modal */}
      {showMotm&&(
        <Modal onClose={()=>setShowMotm(false)} accent={accent} title="Man of the Match">
          <input value={motmSearch} onChange={e=>setMotmSearch(e.target.value)}
            placeholder="Search player…" style={{...S.input,marginBottom:10}}/>
          <div style={{maxHeight:300,overflowY:"auto"}}>
            {filtered.map(p=>(
              <div key={p.id} className="hcard" onClick={()=>setMotm(p.id)}
                style={{...S.card,marginBottom:6,cursor:"pointer",padding:"10px 12px",
                  border:p.id===match.motm?`1px solid ${accent}`:"1px solid #1e2d40"}}>
                <div style={{fontWeight:700,color:p.id===match.motm?accent:"#e2e8f0"}}>
                  {p.id===match.motm&&"⭐ "}{p.name}
                </div>
                <div style={{color:"#8899aa",fontSize:10,marginTop:2}}>{p.teamName}</div>
              </div>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── SETTINGS VIEW ────────────────────────────────────────────────────────────
function SettingsView({db,persist,showToast,accent,setView}){
  const setAccent=c=>{ persist({...db,settings:{...db.settings,accent:c}}); showToast("Theme updated"); };

  // ── encode/decode helpers ──────────────────────────────────────────────────
  const b64Encode=(bytes)=>{ let bin=""; bytes.forEach(b=>bin+=String.fromCharCode(b)); return btoa(bin); };
  const b64Decode=(b64)=>{ const bin=atob(b64); const bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); return bytes; };

  async function compressBytes(bytes){
    const cs=new CompressionStream("deflate-raw");
    const w=cs.writable.getWriter(); w.write(bytes); w.close();
    const chunks=[]; const r=cs.readable.getReader();
    while(true){ const {done,value}=await r.read(); if(done) break; chunks.push(value); }
    const total=chunks.reduce((s,c)=>s+c.length,0);
    const out=new Uint8Array(total); let off=0;
    chunks.forEach(c=>{out.set(c,off);off+=c.length;});
    return out;
  }
  async function decompressBytes(bytes){
    const ds=new DecompressionStream("deflate-raw");
    const w=ds.writable.getWriter(); w.write(bytes); w.close();
    const chunks=[]; const r=ds.readable.getReader();
    while(true){ const {done,value}=await r.read(); if(done) break; chunks.push(value); }
    const total=chunks.reduce((s,c)=>s+c.length,0);
    const out=new Uint8Array(total); let off=0;
    chunks.forEach(c=>{out.set(c,off);off+=c.length;});
    return new TextDecoder().decode(out);
  }

  async function encodeDB(d){
    try{
      const json=JSON.stringify(d);
      const raw=new TextEncoder().encode(json);
      const compressed=await compressBytes(raw);
      return "CRIC4:"+b64Encode(compressed);
    } catch{ return ""; }
  }
  async function decodeDB(txt){
    try{
      if(txt.startsWith("CRIC4:")){
        const bytes=b64Decode(txt.slice(6));
        const json=await decompressBytes(bytes);
        return JSON.parse(json);
      }
      // Legacy CRIC3 fallback
      if(txt.startsWith("CRIC3:")){
        const bytes=b64Decode(txt.slice(6));
        return JSON.parse(new TextDecoder().decode(bytes));
      }
      return null;
    } catch{ return null; }
  }

  // ── export ─────────────────────────────────────────────────────────────────
  const [copied,setCopied]=useState(false);
  const [exportPayload,setExportPayload]=useState("Generating…");
  useEffect(()=>{ encodeDB(db).then(p=>setExportPayload(p)); },[db]);
  const exportCode=()=>{
    const ta=document.getElementById("export-ta");
    if(ta){ ta.select(); ta.setSelectionRange(0,99999); }
    try{ navigator.clipboard.writeText(exportPayload).catch(()=>{}); } catch{}
    setCopied(true); setTimeout(()=>setCopied(false),2500);
  };

  // ── import mode: null | "replace" | "merge" ────────────────────────────────
  const [importMode,setImportMode]=useState(null);
  const [importText,setImportText]=useState("");
  const [importParsed,setImportParsed]=useState(null); // decoded foreign db

  // ── merge state ────────────────────────────────────────────────────────────
  // selTeams/selMatches/selGrounds: Set of ids the user wants to pull in
  const [mergePreview,setMergePreview]=useState(null); // {newTeams,newMatches,newGrounds,updTeams,newTournaments}
  const [selTeams,setSelTeams]=useState(new Set());
  const [selMatches,setSelMatches]=useState(new Set());
  const [selGrounds,setSelGrounds]=useState(new Set());
  const [selTournaments,setSelTournaments]=useState(new Set());
  const [mergeStep,setMergeStep]=useState("paste"); // "paste"|"pick"|"done"

  const resetImport=()=>{
    setImportMode(null);setImportText("");setImportParsed(null);
    setMergePreview(null);setSelTeams(new Set());setSelMatches(new Set());setSelGrounds(new Set());setSelTournaments(new Set());
    setMergeStep("paste");
  };

  // Build merge preview: what's new vs what we already have
  const buildMergePreview=(foreign)=>{
    const myTeamIds=new Set((db.teams||[]).map(t=>t.id));
    const myMatchIds=new Set((db.matches||[]).map(m=>m.id));
    const myGroundIds=new Set((db.grounds||[]).map(g=>g.id));
    const myGroundKeys=new Set((db.grounds||[]).map(canonicalGroundKey).filter(Boolean));
    const myTournamentIds=new Set((db.tournaments||[]).map(t=>t.id));

    const newTeams=(foreign.teams||[]).filter(t=>!myTeamIds.has(t.id));
    const newMatches=(foreign.matches||[]).filter(m=>!myMatchIds.has(m.id));
    const newGrounds=(foreign.grounds||[]).filter(g=>!myGroundIds.has(g.id)&&!myGroundKeys.has(canonicalGroundKey(g)));
    const newTournaments=(foreign.tournaments||[]).filter(t=>!myTournamentIds.has(t.id));

    // Teams we both have — find foreign players not in ours
    const updTeams=(foreign.teams||[]).filter(t=>myTeamIds.has(t.id)).map(ft=>{
      const mine=db.teams.find(t=>t.id===ft.id);
      const myPIds=new Set((mine?.players||[]).map(p=>p.id));
      const newPlayers=(ft.players||[]).filter(p=>!myPIds.has(p.id));
      return newPlayers.length>0?{id:ft.id,name:ft.name,newPlayers}:null;
    }).filter(Boolean);

    return {newTeams,newMatches,newGrounds,updTeams,newTournaments};
  };

  const loadCode=async(mode)=>{
    const txt=importText.trim();
    const parsed=await decodeDB(txt);
    if(!parsed?.teams){showToast("Invalid code","error");return;}
    setImportParsed(parsed);
    if(mode==="replace"){
      setImportMode("replace");
    } else {
      const preview=buildMergePreview(parsed);
      setMergePreview(preview);
      // Pre-select everything new
      setSelTeams(new Set(preview.newTeams.map(t=>t.id)));
      setSelMatches(new Set(preview.newMatches.map(m=>m.id)));
      setSelGrounds(new Set(preview.newGrounds.map(g=>g.id)));
      setSelTournaments(new Set(preview.newTournaments.map(t=>t.id)));
      setImportMode("merge");
      setMergeStep("pick");
    }
  };

  const confirmReplace=()=>{
    if(!importParsed) return;
    persist(importParsed);
    resetImport();
    showToast("Data replaced!");
  };

  const confirmMerge=()=>{
    if(!importParsed||!mergePreview) return;
    let nd={...db};
    const existingGroundByKey=new Map((nd.grounds||[]).map(g=>[canonicalGroundKey(g), g]));

    // Add selected new teams
    const teamsToAdd=(mergePreview.newTeams||[]).filter(t=>selTeams.has(t.id));
    nd={...nd,teams:[...(nd.teams||[]),...teamsToAdd]};

    // Add new players to existing teams
    (mergePreview.updTeams||[]).forEach(ut=>{
      nd={...nd,teams:nd.teams.map(t=>{
        if(t.id!==ut.id) return t;
        return {...t,players:[...(t.players||[]),...ut.newPlayers]};
      })};
    });

    // Add selected new matches (includes full innings/stats)
    const matchesToAdd=(mergePreview.newMatches||[]).filter(m=>selMatches.has(m.id)).map(m=>{ const g=existingGroundByKey.get(canonicalGroundKey(m.ground)); return g?{...m,ground:g.name||m.ground}:m; });
    nd={...nd,matches:[...(nd.matches||[]),...matchesToAdd]};

    // Add selected new grounds
    const groundsToAdd=(mergePreview.newGrounds||[]).filter(g=>selGrounds.has(g.id)&&!existingGroundByKey.has(canonicalGroundKey(g)));
    nd={...nd,grounds:[...(nd.grounds||[]),...groundsToAdd]};

    // Add selected new tournaments
    const tournamentsToAdd=(mergePreview.newTournaments||[]).filter(t=>selTournaments.has(t.id));
    nd={...nd,tournaments:[...(nd.tournaments||[]),...tournamentsToAdd]};

    // Merge teamSpellPlans — foreign wins only for keys we don't already have
    const foreignSpellPlans=importParsed.teamSpellPlans||{};
    const mySpellPlans={...(nd.teamSpellPlans||{})};
    Object.entries(foreignSpellPlans).forEach(([teamId,squadPlans])=>{
      if(!mySpellPlans[teamId]) mySpellPlans[teamId]={};
      Object.entries(squadPlans||{}).forEach(([key,val])=>{
        if(!mySpellPlans[teamId][key]) mySpellPlans[teamId][key]=val;
      });
    });
    nd={...nd,teamSpellPlans:mySpellPlans};

    // Track merge timestamp per source item so re-merge only picks up truly new stuff
    const mergeLog={
      ...(nd.mergeLog||{}),
      [Date.now()]: {
        teams:[...selTeams],
        matches:[...selMatches],
        grounds:[...selGrounds],
        tournaments:[...selTournaments],
        at:new Date().toISOString()
      }
    };
    nd={...nd,mergeLog};

    persist(nd);
    const parts=[];
    if(teamsToAdd.length) parts.push(`+${teamsToAdd.length} team${teamsToAdd.length>1?"s":""}`);
    if(matchesToAdd.length) parts.push(`+${matchesToAdd.length} match${matchesToAdd.length>1?"es":""}`);
    if(groundsToAdd.length) parts.push(`+${groundsToAdd.length} ground${groundsToAdd.length>1?"s":""}`);
    if(tournamentsToAdd.length) parts.push(`+${tournamentsToAdd.length} tournament${tournamentsToAdd.length>1?"s":""}`);
    if(mergePreview.updTeams?.length) parts.push(`players added to ${mergePreview.updTeams.length} team${mergePreview.updTeams.length>1?"s":""}`);
    resetImport();
    showToast(parts.length?parts.join(" · "):"Nothing new to merge");
  };

  const tog=(set,setter,id)=>setter(prev=>{ const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
  const allNew=mergePreview&&(mergePreview.newTeams.length+mergePreview.newMatches.length+mergePreview.newGrounds.length+mergePreview.newTournaments.length)===0&&mergePreview.updTeams.length===0;

  return(
    <div className="af" style={{padding:20}}>
      <div style={{fontWeight:800,fontSize:18,marginBottom:18}}>Settings</div>

      {/* ── ACCENT COLOR ── */}
      <div style={S.card}>
        <div style={{fontWeight:700,fontSize:12,marginBottom:14,color:accent,letterSpacing:1}}>ACCENT COLOR</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:12}}>
          {ACCENT_PRESETS.map(p=>(
            <button key={p.color} onClick={()=>setAccent(p.color)}
              style={{width:38,height:38,borderRadius:"50%",background:p.color,cursor:"pointer",
                border:accent===p.color?"3px solid #fff":"3px solid transparent",
                transition:"all .2s",transform:accent===p.color?"scale(1.15)":"scale(1)"}}>
            </button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <label style={{color:"#8899aa",fontSize:12}}>Custom:</label>
          <input type="color" value={accent} onChange={e=>setAccent(e.target.value)}
            style={{width:38,height:38,borderRadius:8,cursor:"pointer",border:"none",background:"transparent",padding:0}}/>
          <span style={{color:accent,fontWeight:700,fontFamily:"monospace",fontSize:12}}>{accent}</span>
        </div>
      </div>

      {/* ── TRANSFER DATA ── */}
      <div style={{...S.card,marginTop:12}}>
        <div style={{fontWeight:700,fontSize:12,color:accent,letterSpacing:1,marginBottom:6}}>TRANSFER DATA</div>
        <div style={{color:"#8899aa",fontSize:12,marginBottom:12}}>Share your data or bring in someone else's.</div>

        {/* Export */}
        <div style={{marginBottom:14}}>
          <div style={{color:"#cdd5e0",fontSize:11,fontWeight:700,marginBottom:6}}>📤 YOUR SAVE CODE</div>
          <textarea id="export-ta" readOnly value={exportPayload}
            style={{width:"100%",background:"#060b14",border:"1px solid #1e2d40",borderRadius:8,
              padding:"8px 10px",color:"#445566",fontSize:9,fontFamily:"monospace",
              resize:"none",height:64,lineHeight:1.4}}/>
          <button onClick={exportCode}
            style={{marginTop:6,width:"100%",padding:"9px",borderRadius:8,cursor:"pointer",
              fontFamily:"inherit",fontWeight:700,fontSize:13,border:"none",
              background:copied?`rgba(${hexToRgb(accent)},.25)`:`rgba(${hexToRgb(accent)},.15)`,
              color:accent}}>
            {copied?"✓ Copied to clipboard!":"Copy Code"}
          </button>
          <div style={{color:"#2a3a4a",fontSize:10,marginTop:5}}>
            {db.teams?.length||0} teams · {db.matches?.length||0} matches · {db.grounds?.length||0} grounds
          </div>
        </div>

        {/* Import — step 0: mode buttons */}
        {!importMode&&(
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setImportMode("paste_replace")}
              style={{flex:1,padding:"9px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",
                fontWeight:700,fontSize:12,background:"transparent",border:"1px solid #1e2d40",color:"#8899aa"}}>
              📥 Replace All
            </button>
            <button onClick={()=>setImportMode("paste_merge")}
              style={{flex:1,padding:"9px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",
                fontWeight:700,fontSize:12,background:`rgba(${hexToRgb(accent)},.12)`,
                border:`1px solid rgba(${hexToRgb(accent)},.35)`,color:accent}}>
              🔗 Merge Into Mine
            </button>
          </div>
        )}

        {/* Import — step 1: paste */}
        {(importMode==="paste_replace"||importMode==="paste_merge")&&(
          <div>
            <div style={{color:"#cdd5e0",fontSize:11,fontWeight:700,marginBottom:6}}>
              {importMode==="paste_merge"?"🔗 MERGE — paste their code":"📥 REPLACE — paste their code"}
            </div>
            {importMode==="paste_merge"&&(
              <div style={{color:"#8899aa",fontSize:11,marginBottom:8,lineHeight:1.5}}>
                Only new items will be added. Run it again later to pick up anything added since.
              </div>
            )}
            <textarea value={importText} onChange={e=>setImportText(e.target.value)}
              placeholder="Paste CRIC3:... code here"
              style={{width:"100%",background:"#060b14",border:"1px solid #1e2d40",borderRadius:8,
                padding:"8px 10px",color:"#e2e8f0",fontSize:11,fontFamily:"monospace",
                resize:"none",height:72,lineHeight:1.4,marginBottom:8}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={resetImport}
                style={{flex:1,padding:"8px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",
                  fontWeight:700,fontSize:12,background:"transparent",border:"1px solid #1e2d40",color:"#8899aa"}}>
                Cancel
              </button>
              <button onClick={()=>loadCode(importMode==="paste_replace"?"replace":"merge")}
                disabled={!importText.trim()}
                style={{flex:2,padding:"8px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",
                  fontWeight:700,fontSize:12,border:"none",
                  background:importText.trim()?`rgba(${hexToRgb(accent)},.15)`:"#0d1424",
                  color:importText.trim()?accent:"#2a3a4a"}}>
                Load Code →
              </button>
            </div>
          </div>
        )}

        {/* Replace confirm */}
        {importMode==="replace"&&importParsed&&(
          <div>
            <div style={{color:"#fbbf24",fontSize:11,fontWeight:700,marginBottom:8}}>⚠️ CONFIRM REPLACE</div>
            <div style={{color:"#8899aa",fontSize:12,marginBottom:12,lineHeight:1.5}}>
              This will wipe all your current data and load:<br/>
              <span style={{color:"#cdd5e0",fontWeight:700}}>
                {importParsed.teams?.length||0} teams · {importParsed.matches?.length||0} matches · {importParsed.grounds?.length||0} grounds
              </span>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={resetImport}
                style={{flex:1,padding:"9px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",
                  fontWeight:700,fontSize:12,background:"transparent",border:"1px solid #1e2d40",color:"#8899aa"}}>
                Back
              </button>
              <button onClick={confirmReplace}
                style={{flex:2,padding:"9px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",
                  fontWeight:700,fontSize:12,border:"none",background:"rgba(239,68,68,.2)",color:"#fca5a5"}}>
                Yes, Replace My Data
              </button>
            </div>
          </div>
        )}

        {/* Merge — pick step */}
        {importMode==="merge"&&mergeStep==="pick"&&mergePreview&&(
          <div>
            <div style={{color:accent,fontSize:11,fontWeight:700,marginBottom:10}}>🔗 PICK WHAT TO MERGE IN</div>
            {allNew&&(
              <div style={{color:"#4ade80",fontSize:12,padding:"10px 12px",background:"rgba(74,222,128,.08)",
                border:"1px solid rgba(74,222,128,.2)",borderRadius:8,marginBottom:10}}>
                ✓ Nothing new — you already have everything in that code.
              </div>
            )}

            {/* New teams */}
            {mergePreview.newTeams.length>0&&(
              <div style={{marginBottom:12}}>
                <div style={{color:"#8899aa",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:6}}>NEW TEAMS</div>
                {mergePreview.newTeams.map(t=>(
                  <div key={t.id} onClick={()=>tog(selTeams,setSelTeams,t.id)}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,
                      cursor:"pointer",marginBottom:6,
                      background:selTeams.has(t.id)?`rgba(${hexToRgb(accent)},.1)`:"#0d1424",
                      border:`1px solid ${selTeams.has(t.id)?accent:"#1e2d40"}`}}>
                    <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${selTeams.has(t.id)?accent:"#445566"}`,
                      background:selTeams.has(t.id)?accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {selTeams.has(t.id)&&<span style={{color:"#000",fontSize:11,fontWeight:900}}>✓</span>}
                    </div>
                    <div>
                      <div style={{fontWeight:700,fontSize:13}}>{t.name}</div>
                      <div style={{color:"#8899aa",fontSize:10}}>{t.players?.length||0} players</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* New players added to existing teams */}
            {mergePreview.updTeams.length>0&&(
              <div style={{marginBottom:12}}>
                <div style={{color:"#8899aa",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:6}}>NEW PLAYERS (auto-added to existing teams)</div>
                {mergePreview.updTeams.map(ut=>(
                  <div key={ut.id} style={{padding:"9px 12px",borderRadius:8,background:"rgba(74,222,128,.06)",
                    border:"1px solid rgba(74,222,128,.18)",marginBottom:6}}>
                    <div style={{fontWeight:700,fontSize:12,color:"#4ade80"}}>{ut.name}</div>
                    <div style={{color:"#8899aa",fontSize:10,marginTop:2}}>
                      +{ut.newPlayers.length} new: {ut.newPlayers.map(p=>p.name).join(", ")}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* New matches */}
            {mergePreview.newMatches.length>0&&(
              <div style={{marginBottom:12}}>
                <div style={{color:"#8899aa",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:6}}>NEW MATCHES</div>
                <div style={{display:"flex",gap:6,marginBottom:6}}>
                  <button onClick={()=>setSelMatches(new Set(mergePreview.newMatches.map(m=>m.id)))}
                    style={{...S.secondaryBtn,fontSize:10,padding:"4px 10px"}}>All</button>
                  <button onClick={()=>setSelMatches(new Set())}
                    style={{...S.secondaryBtn,fontSize:10,padding:"4px 10px"}}>None</button>
                </div>
                {mergePreview.newMatches.map(m=>{
                  const t1n=m.matchTeams?.[m.team1Id]?.name||(importParsed.teams?.find(t=>t.id===m.team1Id)?.name||"?");
                  const t2n=m.matchTeams?.[m.team2Id]?.name||(importParsed.teams?.find(t=>t.id===m.team2Id)?.name||"?");
                  const i1=m.innings?.[0], i2=m.innings?.[1];
                  const tourn=m.tournamentId?(importParsed.tournaments||[]).find(t=>t.id===m.tournamentId):null;
                  const sel=selMatches.has(m.id);
                  return(
                    <div key={m.id} onClick={()=>tog(selMatches,setSelMatches,m.id)}
                      style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",borderRadius:8,
                        cursor:"pointer",marginBottom:6,
                        background:sel?`rgba(${hexToRgb(accent)},.1)`:"#0d1424",
                        border:`1px solid ${sel?accent:"#1e2d40"}`}}>
                      <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${sel?accent:"#445566"}`,
                        background:sel?accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
                        {sel&&<span style={{color:"#000",fontSize:11,fontWeight:900}}>✓</span>}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:12}}>{t1n} vs {t2n}</div>
                        <div style={{color:"#8899aa",fontSize:10,marginTop:1}}>{new Date(m.date).toLocaleDateString()} · {m.overs} overs</div>
                        {i1&&<div style={{fontSize:10,color:"#cdd5e0",marginTop:3}}>
                          <span style={{color:"#8899aa"}}>{t1n}:</span> {i1.runs}/{i1.wickets} ({Math.floor(i1.balls/6)}.{i1.balls%6} ov)
                          {i2&&<> · <span style={{color:"#8899aa"}}>{t2n}:</span> {i2.runs}/{i2.wickets} ({Math.floor(i2.balls/6)}.{i2.balls%6} ov)</>}
                        </div>}
                        {m.result&&<div style={{fontSize:10,color:"#4ade80",marginTop:2,fontWeight:600}}>{m.result}</div>}
                        {tourn&&<div style={{fontSize:9,color:"#a78bfa",marginTop:2}}>🏆 {tourn.name}</div>}
                        {m.motm&&(()=>{
                          const allPl=[...(m.matchTeams?.[m.team1Id]?.players||importParsed.teams?.find(t=>t.id===m.team1Id)?.players||[]),
                                       ...(m.matchTeams?.[m.team2Id]?.players||importParsed.teams?.find(t=>t.id===m.team2Id)?.players||[])];
                          const motmP=allPl.find(p=>p.id===m.motm);
                          return motmP&&<div style={{fontSize:9,color:"#f59e0b",marginTop:2}}>⭐ {motmP.name}</div>;
                        })()}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* New tournaments */}
            {mergePreview.newTournaments.length>0&&(
              <div style={{marginBottom:12}}>
                <div style={{color:"#8899aa",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:6}}>NEW TOURNAMENTS</div>
                <div style={{display:"flex",gap:6,marginBottom:6}}>
                  <button onClick={()=>setSelTournaments(new Set(mergePreview.newTournaments.map(t=>t.id)))}
                    style={{...S.secondaryBtn,fontSize:10,padding:"4px 10px"}}>All</button>
                  <button onClick={()=>setSelTournaments(new Set())}
                    style={{...S.secondaryBtn,fontSize:10,padding:"4px 10px"}}>None</button>
                </div>
                {mergePreview.newTournaments.map(tourn=>{
                  const tournMatches=(importParsed.matches||[]).filter(m=>m.tournamentId===tourn.id);
                  const teamIds=new Set(tournMatches.flatMap(m=>[m.team1Id,m.team2Id]));
                  const teamNames=[...teamIds].map(id=>(importParsed.teams||[]).find(t=>t.id===id)?.name).filter(Boolean);
                  const completed=tournMatches.filter(m=>m.status==="complete");
                  const sel=selTournaments.has(tourn.id);
                  return(
                    <div key={tourn.id} onClick={()=>tog(selTournaments,setSelTournaments,tourn.id)}
                      style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",borderRadius:8,
                        cursor:"pointer",marginBottom:6,
                        background:sel?`rgba(167,139,250,.1)`:"#0d1424",
                        border:`1px solid ${sel?"#a78bfa":"#1e2d40"}`}}>
                      <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${sel?"#a78bfa":"#445566"}`,
                        background:sel?"#a78bfa":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
                        {sel&&<span style={{color:"#000",fontSize:11,fontWeight:900}}>✓</span>}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:13,color:sel?"#a78bfa":"#cdd5e0"}}>🏆 {tourn.name}</div>
                        <div style={{color:"#8899aa",fontSize:10,marginTop:2}}>
                          {tournMatches.length} match{tournMatches.length!==1?"es":""} · {completed.length} completed
                        </div>
                        {teamNames.length>0&&(
                          <div style={{fontSize:9,color:"#556677",marginTop:2}}>{teamNames.join(", ")}</div>
                        )}
                        {tourn.startDate&&<div style={{fontSize:9,color:"#445566",marginTop:1}}>
                          {new Date(tourn.startDate).toLocaleDateString()}{tourn.endDate?` – ${new Date(tourn.endDate).toLocaleDateString()}`:""}
                        </div>}
                        <div style={{fontSize:9,color:"#445566",marginTop:2,fontStyle:"italic"}}>
                          ℹ️ Select the matches above too to bring in full stats
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* New grounds */}
            {mergePreview.newGrounds.length>0&&(
              <div style={{marginBottom:12}}>
                <div style={{color:"#8899aa",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:6}}>NEW GROUNDS</div>
                {mergePreview.newGrounds.map(g=>(
                  <div key={g.id} onClick={()=>tog(selGrounds,setSelGrounds,g.id)}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,
                      cursor:"pointer",marginBottom:6,
                      background:selGrounds.has(g.id)?`rgba(${hexToRgb(accent)},.1)`:"#0d1424",
                      border:`1px solid ${selGrounds.has(g.id)?accent:"#1e2d40"}`}}>
                    <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${selGrounds.has(g.id)?accent:"#445566"}`,
                      background:selGrounds.has(g.id)?accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {selGrounds.has(g.id)&&<span style={{color:"#000",fontSize:11,fontWeight:900}}>✓</span>}
                    </div>
                    <div style={{fontWeight:700,fontSize:13}}>{g.name}</div>
                  </div>
                ))}
              </div>
            )}

            <div style={{display:"flex",gap:8,marginTop:4}}>
              <button onClick={resetImport}
                style={{flex:1,padding:"9px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",
                  fontWeight:700,fontSize:12,background:"transparent",border:"1px solid #1e2d40",color:"#8899aa"}}>
                Cancel
              </button>
              <button onClick={confirmMerge}
                style={{flex:2,padding:"9px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",
                  fontWeight:700,fontSize:12,border:"none",
                  background:`rgba(${hexToRgb(accent)},.18)`,color:accent}}>
                Merge Selected →
              </button>
            </div>
          </div>
        )}
      </div>

      {/* ── DANGER ZONE ── */}
      <div style={{...S.card,marginTop:12}}>
        <div style={{fontWeight:700,fontSize:12,color:"#ef4444",letterSpacing:1,marginBottom:6}}>DANGER ZONE</div>
        <div style={{color:"#8899aa",fontSize:12,marginBottom:10}}>Clear all data — teams, grounds, tournaments and matches.</div>
        <button onClick={()=>{ persist(INITIAL_DB); showToast("Cleared","warn"); }}
          style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.4)",
            color:"#fca5a5",padding:"8px 14px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>
          Clear All Data
        </button>
      </div>
      <div style={{...S.card,marginTop:12}}>
        <div style={{fontWeight:700,fontSize:12,color:"#8899aa",letterSpacing:1,marginBottom:8}}>QUICK LINKS</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setView("profile")} style={{...S.secondaryBtn,flex:1,fontSize:11}}>👤 Profile &amp; Friends</button>
          <button onClick={()=>setView("deploy")}  style={{...S.secondaryBtn,flex:1,fontSize:11}}>🚀 Deploy App</button>
        </div>
      </div>
      <div style={{...S.card,marginTop:12}}>
        <div style={{fontWeight:700,fontSize:12,color:"#8899aa",letterSpacing:1,marginBottom:4}}>ABOUT</div>
        <div style={{color:"#445566",fontSize:11}}>Cricket Scorer v3.1</div>
        <div style={{color:"#445566",fontSize:11,marginTop:2}}>Tournaments · Grounds · Player Stats · Points Table · Ground Analytics · Cloud Sync</div>
      </div>
    </div>
  );
}





// ─── PROFILE VIEW ─────────────────────────────────────────────────────────────
function ProfileView({db,persist,showToast,accent,gToken,gUser,signInGoogle,signOutGoogle,cloudStatus,social,persistSocial,setView}){
  const [editingName,setEditingName] = useState(false);
  const [newUsername,setNewUsername] = useState("");
  const [friendInput,setFriendInput] = useState("");
  const [searching,setSearching]     = useState(false);
  const [syncingId,setSyncingId]     = useState(null);
  const [autoSync,setAutoSync]       = useState(false);
  const [publishStatus,setPublish]   = useState(null); // null|"publishing"|"done"|"error"
  const [friendFound,setFriendFound] = useState(null); // { profile, db } from their pub file
  const [pubFileId,setPubFileId]     = useState(()=>localStorage.getItem("cricket_pub_file_id")||null);

  const profile  = social?.profile || INITIAL_SOCIAL.profile;
  const friends  = social?.friends  || [];
  const requests = social?.requests || [];
  const myFriendCode = pubFileId ? makeFriendCode(profile, pubFileId) : "";

  // Merge helper reused from settings
  function buildMergePreview(foreign) {
    if(!foreign || typeof foreign !== "object") return { newTeams:[], newMatches:[], newGrounds:[], newTournaments:[] };
    const myTeamIds=new Set((db.teams||[]).map(t=>t.id));
    const myMatchIds=new Set((db.matches||[]).map(m=>m.id));
    const myGroundIds=new Set((db.grounds||[]).map(g=>g.id));
    const myGroundKeys=new Set((db.grounds||[]).map(canonicalGroundKey).filter(Boolean));
    const myTournamentIds=new Set((db.tournaments||[]).map(t=>t.id));
    return {
      newTeams:(foreign.teams||[]).filter(t=>t&&t.id&&!myTeamIds.has(t.id)),
      newMatches:(foreign.matches||[]).filter(m=>m&&m.id&&!myMatchIds.has(m.id)),
      newGrounds:(foreign.grounds||[]).filter(g=>g&&g.id&&!myGroundIds.has(g.id)&&!myGroundKeys.has(canonicalGroundKey(g))),
      newTournaments:(foreign.tournaments||[]).filter(t=>t&&t.id&&!myTournamentIds.has(t.id)),
    };
  }

  const doMerge = (foreignDB, friendName) => {
    const preview = buildMergePreview(foreignDB);
    let nd = {...db};
    nd = {...nd, teams:[...(nd.teams||[]),...preview.newTeams]};
    nd = {...nd, matches:[...(nd.matches||[]),...preview.newMatches]};
    nd = {...nd, grounds:[...(nd.grounds||[]),...preview.newGrounds]};
    nd = {...nd, tournaments:[...(nd.tournaments||[]),...preview.newTournaments]};
    // merge spellPlans
    const fp = foreignDB.teamSpellPlans||{};
    const mp = {...(nd.teamSpellPlans||{})};
    Object.entries(fp).forEach(([k,v])=>{ if(!mp[k]) mp[k]=v; });
    nd={...nd,teamSpellPlans:mp};
    persist(nd);
    const parts = [];
    if(preview.newTeams.length)       parts.push(`+${preview.newTeams.length} teams`);
    if(preview.newMatches.length)     parts.push(`+${preview.newMatches.length} matches`);
    if(preview.newGrounds.length)     parts.push(`+${preview.newGrounds.length} grounds`);
    if(preview.newTournaments.length) parts.push(`+${preview.newTournaments.length} tournaments`);
    showToast(parts.length ? `Merged from ${friendName}: ${parts.join(" · ")}` : "Already up to date");
  };

  const saveUsername = () => {
    if(!newUsername.trim()) return;
    const updated = {...social, profile:{...profile, username:newUsername.trim().toLowerCase().replace(/\s+/g,"_")}};
    persistSocial(updated);
    setEditingName(false);
    showToast("Username updated");
  };

  const setAvatarColor = (c) => {
    const updated = {...social, profile:{...profile, avatarColor:c}};
    persistSocial(updated);
  };

  const publishMyProfile = async () => {
    if(!gToken){ showToast("Sign in with Google first","error"); return; }
    setPublish("publishing");
    try {
      // If we have a cached pub file ID that might be stale (from appDataFolder era), clear it
      // and let publishProfile search for an existing file instead
      let resolvedPubFileId = pubFileId;
      if(resolvedPubFileId && resolvedPubFileId.length < 10) {
        resolvedPubFileId = null;
        localStorage.removeItem("cricket_pub_file_id");
        setPubFileId(null);
      }
      const fileId = await publishProfile(profile, db, gToken, resolvedPubFileId);
      setPubFileId(fileId);
      localStorage.setItem("cricket_pub_file_id", fileId);
      setPublish("done");
      showToast("Profile published! Share your Friend Code with teammates.");
    } catch(e) {
      console.error("Publish failed", e);
      setPublish("error");
      const msg = e.message || "";
      if(msg.includes("401")) {
        showToast("Session expired — tap Sign In again then retry","error");
      } else if(msg.includes("403")) {
        showToast("Drive permission needed — sign out, sign back in, and grant Drive access","error");
      } else if(msg.includes("404")) {
        // File was deleted from Drive — clear cached ID and retry fresh
        localStorage.removeItem("cricket_pub_file_id");
        setPubFileId(null);
        showToast("Profile file missing — tap Publish again to recreate it","error");
      } else {
        showToast("Publish failed — check connection and try again","error");
      }
    }
    setTimeout(()=>setPublish(null),3000);
  };

  const searchFriend = async () => {
    const raw = friendInput.trim();
    if(!raw){ return; }
    if(!gToken){ showToast("Sign in first","error"); return; }
    setSearching(true); setFriendFound(null);
    try {
      let fileId = null;
      let expectedUserId = null;

      if(raw.startsWith("CRIC-FRIEND:") || raw.includes(":")) {
        // Friend code — extract file ID and user ID
        const parsed = parseFriendCode(raw);
        fileId = parsed.fileId;
        expectedUserId = parsed.userId;
      } else {
        // Treat as a raw Drive file ID (in case someone shares just the ID)
        fileId = raw;
      }

      if(!fileId) { showToast("Invalid Friend Code","error"); setSearching(false); return; }

      const data = await readPublicProfile(fileId, gToken);
      if(!data?.profile) {
        showToast("No profile found at that code — ask your friend to re-publish","error");
        setSearching(false); return;
      }
      if(expectedUserId && data.profile.userId && expectedUserId !== data.profile.userId) {
        showToast("Friend Code mismatch — ask your friend for their latest code","error");
        setSearching(false); return;
      }
      setFriendFound({ ...data, fileId });
    } catch(e) {
      console.error("Friend search error:", e);
      const msg = e.message || "";
      if(msg.includes("404")) {
        showToast("Profile not found — ask your friend to re-publish their profile","error");
      } else if(msg.includes("403")) {
        showToast("Profile is private — ask your friend to re-publish so it's shared","error");
      } else {
        showToast("Could not find profile — check the Friend Code and try again","error");
      }
    }
    setSearching(false);
  };

  const sendFriendRequest = () => {
    if(!friendFound) return;
    const fp = friendFound.profile;
    if(!fp || !fp.userId) { showToast("Profile is missing required data — ask your friend to re-publish","error"); return; }
    const alreadyFriend = friends.some(f=>f.userId===fp.userId);
    const alreadyReq = requests.some(r=>r.userId===fp.userId&&r.direction==="sent");
    if(alreadyFriend){ showToast("Already friends!"); return; }
    if(alreadyReq){ showToast("Request already sent"); return; }
    const newFriend = {
      userId: fp.userId,
      username: fp.username || "unknown",
      avatarColor: fp.avatarColor || "#f5c842",
      addedAt: Date.now(),
      pubFileId: friendFound.fileId
    };
    const updated = {...social, friends:[...friends, newFriend]};
    persistSocial(updated);
    setFriendFound(null); setFriendInput("");
    showToast(`${fp.username || "Friend"} added! Share your Friend Code so they can add you back.`);
  };

  const syncFriend = async (friend) => {
    setSyncingId(friend.userId);
    if(!friend.pubFileId){ showToast("No Friend Code stored — ask them to re-share","error"); setSyncingId(null); return; }
    try {
      const data = await readPublicProfile(friend.pubFileId, gToken);
      // Guard: data must be an object with a profile field
      if(!data || typeof data !== "object") throw new Error("Invalid profile data returned");
      if(!data.profile) throw new Error("Profile missing from response");
      // db is no longer included in public profiles (to keep file size small).
      // Profile sync only updates friend info — match data is not shared via friends.
      // (doMerge is kept for backwards compatibility with old published profiles)
      if(data.db && typeof data.db === "object") {
        doMerge(data.db, friend.username || "friend");
      }
      // Update stored friend info with latest profile data
      const updatedFriends = (social.friends||[]).map(f=>
        f.userId===friend.userId
          ? {...f, username:data.profile.username||f.username, avatarColor:data.profile.avatarColor||f.avatarColor, pubFileId:friend.pubFileId, lastSynced:Date.now()}
          : f
      );
      persistSocial({...social, friends:updatedFriends});
      showToast(`${friend.username || "Friend"} synced!`);
    } catch(e) {
      console.error("syncFriend error:", e);
      const msg = e.message || "";
      if(msg.includes("404")) showToast("Profile not found — ask your friend to re-publish","error");
      else if(msg.includes("403")) showToast("Profile is private — ask your friend to re-publish","error");
      else if(msg.includes("corrupt") || msg.includes("JSON")) showToast("Profile data is corrupt — ask your friend to re-publish","error");
      else showToast("Sync failed — check the Friend Code is still valid","error");
    }
    setSyncingId(null);
  };

  const removeFriend = (userId) => {
    const updated = {...social, friends:friends.filter(f=>f.userId!==userId)};
    persistSocial(updated);
    showToast("Friend removed");
  };

  const cloudColor = cloudStatus==="synced"?"#4ade80":cloudStatus==="syncing"?"#fbbf24":cloudStatus==="error"?"#ef4444":"#445566";
  const cloudLabel = cloudStatus==="synced"?"Synced to Drive":cloudStatus==="syncing"?"Syncing…":cloudStatus==="error"?"Sync error":"Saved locally only";

  return(
    <div className="af" style={{padding:20}}>
      <div style={{fontWeight:800,fontSize:18,marginBottom:18}}>Profile</div>

      {/* ── GOOGLE SIGN IN ── */}
      {!gUser ? (
        <div style={{...S.card,textAlign:"center",padding:28}}>
          <div style={{fontSize:40,marginBottom:12}}>☁️</div>
          <div style={{fontWeight:700,fontSize:15,marginBottom:8,color:"#e2e8f0"}}>Sign in with Google</div>
          <div style={{color:"#8899aa",fontSize:12,marginBottom:18,lineHeight:1.6}}>
            Save your cricket data to Google Drive, access it from any device, and sync data with friends.
          </div>
          <button onClick={signInGoogle}
              style={{display:"flex",alignItems:"center",gap:10,margin:"0 auto",padding:"10px 22px",
                borderRadius:8,border:"1px solid #2a3a4a",background:"#0d1424",cursor:"pointer",
                color:"#e2e8f0",fontWeight:700,fontSize:13,fontFamily:"inherit"}}>
              <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
              Continue with Google
            </button>
        </div>
      ) : (
        <>
          {/* ── ACCOUNT CARD ── */}
          <div style={{...S.card,marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
              <div style={{position:"relative"}}>
                {gUser.picture
                  ? <img src={gUser.picture} style={{width:54,height:54,borderRadius:"50%",objectFit:"cover",border:`2px solid ${profile.avatarColor||accent}`}} alt=""/>
                  : <div style={{width:54,height:54,borderRadius:"50%",background:profile.avatarColor||accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:900,color:"#000"}}>{(profile.username||"?")[0].toUpperCase()}</div>
                }
                <span style={{position:"absolute",bottom:-2,right:-2,width:14,height:14,borderRadius:"50%",background:cloudColor,border:"2px solid #0d1424"}}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,fontSize:16,color:"#e2e8f0",marginBottom:2}}>{gUser.name}</div>
                <div style={{color:"#8899aa",fontSize:11,marginBottom:2}}>{gUser.email}</div>
                <div style={{fontSize:10,color:cloudColor}}>{cloudLabel}</div>
              </div>
            </div>

            {/* Username */}
            <div style={{marginBottom:12}}>
              <label style={S.label}>USERNAME (for friends to add you)</label>
              {editingName ? (
                <div style={{display:"flex",gap:8}}>
                  <input value={newUsername} onChange={e=>setNewUsername(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&saveUsername()}
                    style={{...S.input,flex:1}} placeholder={profile.username||"username"}/>
                  <button onClick={saveUsername} style={{...S.primaryBtn(accent),padding:"9px 14px"}}>Save</button>
                  <button onClick={()=>setEditingName(false)} style={S.secondaryBtn}>✕</button>
                </div>
              ) : (
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{fontWeight:700,fontSize:14,color:accent,fontFamily:"monospace"}}>@{profile.username||"—"}</div>
                  <button onClick={()=>{setNewUsername(profile.username||"");setEditingName(true);}} style={{...S.secondaryBtn,fontSize:11,padding:"4px 10px"}}>Edit</button>
                </div>
              )}
            </div>

            {/* Friend Code */}
            <div style={{marginBottom:12}}>
              <label style={S.label}>YOUR FRIEND CODE (share this after publishing)</label>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <div style={{fontFamily:"monospace",fontSize:11,color:pubFileId?"#8899aa":"#445566",background:"#060b14",
                  padding:"6px 10px",borderRadius:6,flex:1,wordBreak:"break-all"}}>
                  {myFriendCode||"Tap Publish Profile to generate your Friend Code"}
                </div>
                {pubFileId&&<button onClick={()=>{navigator.clipboard?.writeText(myFriendCode);showToast("Friend Code copied!");}}
                  style={{...S.secondaryBtn,fontSize:11,padding:"6px 10px",flexShrink:0}}>Copy</button>}
              </div>
            </div>

            {/* Avatar color */}
            <div style={{marginBottom:14}}>
              <label style={S.label}>AVATAR COLOUR</label>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {ACCENT_PRESETS.map(p=>(
                  <button key={p.color} onClick={()=>setAvatarColor(p.color)}
                    style={{width:30,height:30,borderRadius:"50%",background:p.color,border:profile.avatarColor===p.color?"3px solid #fff":"3px solid transparent",cursor:"pointer"}}/>
                ))}
              </div>
            </div>

            {/* Publish + Sign out */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button onClick={publishMyProfile} disabled={publishStatus==="publishing"}
                style={{...S.secondaryBtn,flex:1,fontSize:11,color:publishStatus==="done"?"#4ade80":publishStatus==="error"?"#ef4444":"#8899aa"}}>
                {publishStatus==="publishing"?"Publishing…":publishStatus==="done"?"✓ Published!":publishStatus==="error"?"✕ Failed":"📡 Publish Profile"}
              </button>
              <button onClick={signOutGoogle}
                style={{...S.secondaryBtn,fontSize:11,padding:"7px 14px",color:"#ef4444",borderColor:"rgba(239,68,68,.3)"}}>
                Sign Out
              </button>
            </div>
            <div style={{color:"#445566",fontSize:10,marginTop:8}}>
              After publishing, copy your Friend Code above. It keeps your Google user ID and public profile pointer together.
            </div>
          </div>

          {/* ── FRIENDS ── */}
          <div style={{...S.card,marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:12,color:accent,letterSpacing:1,marginBottom:12}}>FRIENDS ({friends.length})</div>

            {/* Add friend */}
            <div style={{marginBottom:14}}>
              <label style={S.label}>ADD FRIEND BY FRIEND CODE</label>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <input value={friendInput} onChange={e=>setFriendInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&searchFriend()}
                  style={{...S.input,flex:1,fontFamily:"monospace",fontSize:12}} placeholder="Paste their Friend Code…"/>
                <button onClick={searchFriend} disabled={searching}
                  style={{...S.primaryBtn(accent),padding:"9px 14px",flexShrink:0}}>
                  {searching?"…":"Find"}
                </button>
              </div>
              {friendFound&&(
                <div style={{background:"#060b14",border:`1px solid ${accent}`,borderRadius:8,padding:"10px 12px",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:friendFound.profile.avatarColor||"#f5c842",
                    display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:16,color:"#000",flexShrink:0}}>
                    {(friendFound.profile.username||"?")[0].toUpperCase()}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,color:"#e2e8f0"}}>@{friendFound.profile.username}</div>
                    <div style={{color:"#8899aa",fontSize:10}}>{friendFound.dbSummary?.teamCount ?? (friendFound.dbSummary?.teams||[]).length ?? "?"} teams · {friendFound.dbSummary?.matchCount ?? "?"} matches</div>
                  </div>
                  <button onClick={sendFriendRequest} style={{...S.primaryBtn(accent),fontSize:11,padding:"7px 12px"}}>
                    + Add
                  </button>
                </div>
              )}
            </div>

            {/* Friends list */}
            {friends.length===0 ? (
              <div style={S.empty}>No friends added yet.<br/>Publish your profile, then share your Friend Code with teammates!</div>
            ) : (
              friends.map(f=>(
                <div key={f.userId} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid #1e2d40"}}>
                  <div style={{width:38,height:38,borderRadius:"50%",background:f.avatarColor||"#f5c842",
                    display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:16,color:"#000",flexShrink:0}}>
                    {(f.username||"?")[0].toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,color:"#e2e8f0",fontSize:13}}>@{f.username}</div>
                    {f.lastSeen&&<div style={{color:"#445566",fontSize:10}}>Last seen {new Date(f.lastSeen).toLocaleDateString()}</div>}
                  </div>
                  <button onClick={()=>syncFriend(f)} disabled={syncingId===f.userId}
                    style={{...S.secondaryBtn,fontSize:11,padding:"6px 10px",color:syncingId===f.userId?"#fbbf24":accent,
                      borderColor:syncingId===f.userId?"rgba(251,191,36,.3)":`rgba(${hexToRgb(accent)},.35)`}}>
                    {syncingId===f.userId?"Syncing…":"⇄ Merge"}
                  </button>
                  <button onClick={()=>removeFriend(f.userId)}
                    style={{...S.secondaryBtn,fontSize:11,padding:"6px 8px",color:"#ef4444",borderColor:"rgba(239,68,68,.25)"}}>
                    ✕
                  </button>
                </div>
              ))
            )}

            {friends.length>0&&(
              <div style={{marginTop:12}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <button onClick={async()=>{
                    if(!gToken){showToast("Sign in first","error");return;}
                    showToast("Syncing all friends…");
                    for(const f of friends){ await syncFriend(f).catch(()=>{}); }
                    showToast("All friends synced!");
                  }} style={{...S.primaryBtn(accent),fontSize:11,padding:"8px 14px"}}>
                    ⇄ Sync All Friends
                  </button>
                  <div style={{color:"#445566",fontSize:10}}>Merges new matches/teams from all friends at once</div>
                </div>
              </div>
            )}
          </div>


        </>
      )}
    </div>
  );
}


// ─── DEPLOY VIEW ──────────────────────────────────────────────────────────────
function DeployView({db,showToast,accent,setView}){
  const [ghToken,setGhToken]   = useState(localStorage.getItem("gh_token")||"");
  const [repoName,setRepoName] = useState(localStorage.getItem("gh_repo")||"cricket-scorer");
  const [clientId,setClientId] = useState(localStorage.getItem("google_client_id")||"");
  const [step,setStep]         = useState("idle"); // idle|creating|pushing|done|error
  const [log,setLog]           = useState([]);
  const [deployUrl,setDeployUrl]= useState(localStorage.getItem("gh_deploy_url")||"");

  const addLog = (msg,color="#8899aa") => setLog(l=>[...l,{msg,color,t:Date.now()}]);

  const saveSettings = ()=>{
    localStorage.setItem("gh_token", ghToken);
    localStorage.setItem("gh_repo", repoName);
    localStorage.setItem("google_client_id", clientId);
  };

  const getGithubUser = async (token) => {
    const r = await fetch("https://api.github.com/user",{headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"}});
    if(!r.ok) throw new Error("Invalid GitHub token");
    return r.json();
  };

  const ensureRepo = async (token, owner, name) => {
    // Check if repo exists
    const check = await fetch(`https://api.github.com/repos/${owner}/${name}`,{headers:{Authorization:`Bearer ${token}`}});
    if(check.ok) { addLog(`✓ Repo ${owner}/${name} already exists`,"#4ade80"); return; }
    // Create it
    addLog(`Creating repo ${owner}/${name}…`);
    const r = await fetch("https://api.github.com/user/repos",{
      method:"POST",
      headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify({name,description:"Cricket Scorer",auto_init:true,private:false})
    });
    if(!r.ok) throw new Error("Failed to create repo");
    addLog(`✓ Repo created`,"#4ade80");
    await new Promise(r=>setTimeout(r,2000)); // wait for GitHub to init
  };

  const getDefaultBranch = async (token, owner, name) => {
    const r = await fetch(`https://api.github.com/repos/${owner}/${name}`,{headers:{Authorization:`Bearer ${token}`}});
    const d = await r.json();
    return d.default_branch || "main";
  };

  const getFileSha = async (token, owner, name, branch, path) => {
    const r = await fetch(`https://api.github.com/repos/${owner}/${name}/contents/${path}?ref=${branch}`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok) return null;
    const d = await r.json();
    return d.sha;
  };

  const pushFile = async (token, owner, repo, branch, path, content, message) => {
    const sha = await getFileSha(token, owner, repo, branch, path);
    const body = { message, content: btoa(unescape(encodeURIComponent(content))), branch };
    if(sha) body.sha = sha;
    const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{
      method:"PUT",
      headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    if(!r.ok){ const e=await r.json(); throw new Error(e.message||"Push failed"); }
    return r.json();
  };

  const enablePages = async (token, owner, repo, branch) => {
    const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/pages`,{
      method:"POST",
      headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify({source:{branch,path:"/"}})
    });
    // 201 = created, 409 = already enabled — both fine
    if(r.status!==201&&r.status!==409) {
      const e=await r.json().catch(()=>({}));
      addLog(`Pages note: ${e.message||r.status}`,"#fbbf24");
    } else {
      addLog("✓ GitHub Pages enabled","#4ade80");
    }
  };

  const buildHTML = () => {
    // Inject the google client ID into the source
    const source = document.documentElement.outerHTML;
    if(clientId) return source.replace("YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com", clientId);
    return source;
  };

  const deploy = async () => {
    if(!ghToken.trim()){showToast("Enter GitHub token","error");return;}
    if(!repoName.trim()){showToast("Enter repo name","error");return;}
    saveSettings();
    setStep("creating"); setLog([]);
    try {
      addLog("Authenticating with GitHub…");
      const user = await getGithubUser(ghToken);
      addLog(`✓ Logged in as ${user.login}`,"#4ade80");

      setStep("pushing");
      await ensureRepo(ghToken, user.login, repoName);
      const branch = await getDefaultBranch(ghToken, user.login, repoName);
      addLog(`Using branch: ${branch}`);

      addLog("Building app HTML…");
      const html = buildHTML();

      addLog("Pushing index.html…");
      await pushFile(ghToken, user.login, repoName, branch, "index.html", html, "Deploy Cricket Scorer");
      addLog("✓ Pushed index.html","#4ade80");

      // Add a minimal 404.html for SPA routing
      await pushFile(ghToken, user.login, repoName, branch, "404.html",
        `<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;URL='/'" /></head></html>`,
        "Add 404 redirect");

      addLog("Enabling GitHub Pages…");
      await enablePages(ghToken, user.login, repoName, branch);

      const url = `https://${user.login}.github.io/${repoName}/`;
      setDeployUrl(url);
      localStorage.setItem("gh_deploy_url",url);
      addLog(`✓ Deployed! URL: ${url}`,"#4ade80");
      addLog("(Pages may take 1–2 minutes to go live)","#fbbf24");
      setStep("done");
      showToast("Deployed to GitHub Pages!");
    } catch(e) {
      addLog(`✗ Error: ${e.message}`,"#ef4444");
      setStep("error");
      showToast(e.message,"error");
    }
  };

  const busy = step==="creating"||step==="pushing";

  return(
    <div className="af" style={{padding:20}}>
      <div style={{fontWeight:800,fontSize:18,marginBottom:4}}>🚀 Deploy to GitHub Pages</div>
      <div style={{color:"#8899aa",fontSize:12,marginBottom:18}}>Host your Cricket Scorer app for free — permanent URL, works on any device.</div>

      {/* Step 1: GitHub token */}
      <div style={{...S.card,marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:12,color:accent,letterSpacing:1,marginBottom:10}}>STEP 1 — GITHUB TOKEN</div>
        <div style={{color:"#8899aa",fontSize:11,marginBottom:10,lineHeight:1.7}}>
          Go to <strong style={{color:"#e2e8f0"}}>github.com → Settings → Developer Settings → Personal access tokens → Tokens (classic)</strong>.<br/>
          Create a token with <strong style={{color:"#e2e8f0"}}>repo</strong> and <strong style={{color:"#e2e8f0"}}>pages</strong> scopes.
        </div>
        <input value={ghToken} onChange={e=>setGhToken(e.target.value)} type="password"
          style={S.input} placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"/>
        <div style={{color:"#445566",fontSize:10,marginTop:4}}>Stored in your browser only, never sent anywhere except github.com.</div>
      </div>

      {/* Step 2: Repo name */}
      <div style={{...S.card,marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:12,color:accent,letterSpacing:1,marginBottom:10}}>STEP 2 — REPOSITORY NAME</div>
        <input value={repoName} onChange={e=>setRepoName(e.target.value.toLowerCase().replace(/\s/g,"-"))}
          style={S.input} placeholder="cricket-scorer"/>
        <div style={{color:"#445566",fontSize:10,marginTop:4}}>Will be created automatically if it doesn't exist.</div>
      </div>

      {/* Step 3: Google Client ID (optional) */}
      <div style={{...S.card,marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:12,color:accent,letterSpacing:1,marginBottom:6}}>STEP 3 — GOOGLE CLIENT ID (for Drive sync)</div>
        <div style={{color:"#8899aa",fontSize:11,marginBottom:10,lineHeight:1.7}}>
          Optional but recommended. From <strong style={{color:"#e2e8f0"}}>console.cloud.google.com</strong> → APIs &amp; Services → Credentials.<br/>
          Add <code style={{color:accent}}>https://YOUR-USERNAME.github.io</code> to Authorized JavaScript Origins.
        </div>
        <input value={clientId} onChange={e=>setClientId(e.target.value)}
          style={S.input} placeholder="123456789.apps.googleusercontent.com (optional)"/>
      </div>

      {/* Google Sites embed info */}
      <div style={{...S.card,marginBottom:12,background:"rgba(16,185,129,.05)",borderColor:"rgba(16,185,129,.2)"}}>
        <div style={{fontWeight:700,fontSize:12,color:"#10b981",letterSpacing:1,marginBottom:6}}>📌 ADDING TO GOOGLE SITES</div>
        <div style={{color:"#8899aa",fontSize:11,lineHeight:1.7}}>
          After deploying, in Google Sites:<br/>
          1. Insert → <strong style={{color:"#e2e8f0"}}>Embed</strong><br/>
          2. Paste your GitHub Pages URL<br/>
          3. Resize the embed to full width<br/>
          <br/>
          Or use the <strong style={{color:"#e2e8f0"}}>"By URL"</strong> option in the Embed dialog and enter your Pages URL.
        </div>
      </div>

      {/* Deploy button */}
      <button onClick={deploy} disabled={busy}
        style={{...S.primaryBtn(accent),width:"100%",padding:"12px",fontSize:14,marginBottom:12,
          opacity:busy?0.7:1}}>
        {busy?"Deploying…":step==="done"?"✓ Deployed! Deploy Again":"🚀 Deploy Now"}
      </button>

      {/* Log output */}
      {log.length>0&&(
        <div style={{...S.card,fontFamily:"monospace",fontSize:11,lineHeight:1.8,maxHeight:220,overflowY:"auto"}}>
          {log.map((l,i)=><div key={i} style={{color:l.color}}>{l.msg}</div>)}
        </div>
      )}

      {/* Live URL */}
      {deployUrl&&(
        <div style={{...S.card,marginTop:12,background:"rgba(74,222,128,.05)",borderColor:"rgba(74,222,128,.2)"}}>
          <div style={{fontWeight:700,fontSize:12,color:"#4ade80",letterSpacing:1,marginBottom:8}}>✓ YOUR LIVE URL</div>
          <div style={{fontFamily:"monospace",color:"#e2e8f0",fontSize:12,wordBreak:"break-all",marginBottom:8}}>{deployUrl}</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{navigator.clipboard?.writeText(deployUrl);showToast("URL copied");}}
              style={{...S.secondaryBtn,fontSize:11,flex:1}}>Copy URL</button>
            <a href={deployUrl} target="_blank" rel="noreferrer"
              style={{...S.secondaryBtn,flex:1,textDecoration:"none",textAlign:"center",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>
              Open ↗
            </a>
          </div>
        </div>
      )}
    </div>
  );
}


// ─── STYLES ───────────────────────────────────────────────────────────────────
const S={
  app:    {minHeight:"100vh",background:"#060b14",color:"#e2e8f0",fontFamily:"system-ui,sans-serif"},
  splash: {minHeight:"100vh",background:"#060b14",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,color:"#e2e8f0"},
  header: {display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",background:"#0a0e1a",borderBottom:"1px solid",position:"sticky",top:0,zIndex:100},
  navBtn: {display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"5px 8px",background:"transparent",border:"none",cursor:"pointer",borderRadius:6,transition:"background .15s",fontFamily:"inherit"},
  content:{maxWidth:480,margin:"0 auto"},
  card:   {background:"#0d1424",border:"1px solid #1e2d40",borderRadius:12,padding:"12px 14px",transition:"border-color .2s"},
  qcard:  {background:"#0d1424",border:"1px solid",borderRadius:12,padding:"18px 14px",cursor:"pointer",transition:"all .2s",display:"flex",flexDirection:"column",alignItems:"center",gap:7,fontFamily:"inherit"},
  input:  {width:"100%",background:"#0d1424",border:"1px solid #1e2d40",borderRadius:8,padding:"9px 11px",color:"#e2e8f0",fontSize:13,fontFamily:"inherit",marginBottom:0},
  select: {width:"100%",background:"#0d1424",border:"1px solid #1e2d40",borderRadius:8,padding:"9px 11px",color:"#e2e8f0",fontSize:13,fontFamily:"inherit"},
  label:  {display:"block",color:"#8899aa",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:5},
  primaryBtn:(accent)=>({background:accent,color:"#000",border:"none",borderRadius:8,padding:"9px 16px",fontWeight:800,cursor:"pointer",fontSize:12,fontFamily:"inherit"}),
  secondaryBtn:{background:"transparent",border:"1px solid #1e2d40",borderRadius:8,padding:"7px 12px",color:"#8899aa",cursor:"pointer",fontSize:12,fontFamily:"inherit"},
  iconBtn:{background:"rgba(255,255,255,.04)",border:"1px solid #1e2d40",borderRadius:8,padding:"5px 9px",cursor:"pointer",fontSize:13,color:"#8899aa",fontFamily:"inherit"},
  actionBtn:{padding:"12px 8px",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit",transition:"all .15s",textAlign:"center"},
  empty:  {textAlign:"center",color:"#445566",padding:"32px 16px",fontSize:13},
  sectionLabel:{color:"#8899aa",fontSize:10,fontWeight:700,letterSpacing:2,marginBottom:10},
  sectionHeader:{display:"flex",alignItems:"center",gap:10,marginBottom:16},
  backBtn:{background:"transparent",border:"none",color:"#8899aa",cursor:"pointer",fontSize:13,padding:"2px 0",fontFamily:"inherit"},
};

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><CricketScorer /></ErrorBoundary>);
  </script>
</body>
</html>
