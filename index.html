// ─── TEAMS VIEW ───────────────────────────────────────────────────────────────
function TeamsView({db,persist,showToast,accent}){
  const [showNew,setShowNew]=useState(false);
  const [editId,setEditId]=useState(null);
  const [teamName,setTeamName]=useState("");
  const [players,setPlayers]=useState([{id:uid(),name:"",role:ROLES[0]}]);
  const [viewPlayer,setViewPlayer]=useState(null); // {teamId,playerId}
  const [showTransfer,setShowTransfer]=useState(false);
  const [txStep,setTxStep]=useState(1); // 1=pick source team, 2=pick player, 3=pick dest team
  const [txSrc,setTxSrc]=useState(null);
  const [txPlayer,setTxPlayer]=useState(null);
  const [txMode,setTxMode]=useState("transfer");
  const doTransfer=(destId)=>{
    if(!txSrc||!txPlayer||!destId||destId===txSrc) return;
    const srcTeam=db.teams.find(t=>t.id===txSrc);
    const player=srcTeam?.players?.find(p=>p.id===txPlayer);
    if(!player){showToast("Player not found","error");return;}
    const isCopy=txMode==="copy";
    const newPlayer=isCopy?{...player,id:uid()}:player;
    const nd={...db,teams:db.teams.map(t=>{
      if(t.id===txSrc&&!isCopy) return {...t,players:t.players.filter(p=>p.id!==txPlayer)};
      if(t.id===destId) return {...t,players:[...(t.players||[]),newPlayer]};
      return t;
    })};
    persist(nd);
    setShowTransfer(false);setTxStep(1);setTxSrc(null);setTxPlayer(null);setTxMode("transfer");
    showToast(isCopy?`${player.name} copied`:`${player.name} transferred`);
  };

  const openEdit=(team)=>{ setEditId(team.id);setTeamName(team.name);setPlayers(team.players?.length?[...team.players]:[{id:uid(),name:"",role:ROLES[0]}]);setShowNew(true); };
  const openNew=()=>{ setEditId(null);setTeamName("");setPlayers([{id:uid(),name:"",role:ROLES[0]}]);setShowNew(true); };
  const saveTeam=()=>{
    const vp=players.filter(p=>p.name.trim());
    if(!teamName.trim()){showToast("Enter team name","error");return;}
    if(vp.length<2){showToast("Need 2+ players","error");return;}
    const nd={...db};
    if(editId) nd.teams=db.teams.map(t=>t.id===editId?{...t,name:teamName.trim(),players:vp}:t);
    else nd.teams=[...(db.teams||[]),{id:uid(),name:teamName.trim(),players:vp}];
    persist(nd);setShowNew(false);showToast(editId?"Team updated":"Team created");
  };

  if(viewPlayer){
    const team=db.teams?.find(t=>t.id===viewPlayer.teamId);
    const player=team?.players?.find(p=>p.id===viewPlayer.playerId);
    const matches=(db.matches||[]).filter(m=>m.team1Id===viewPlayer.teamId||m.team2Id===viewPlayer.teamId);
    const bat=getPlayerBattingStats(viewPlayer.playerId,matches);
    const bowl=getPlayerBowlingStats(viewPlayer.playerId,matches);
    const field=getPlayerFieldingStats(viewPlayer.playerId,matches);
    const mvp=calcMVPPoints(viewPlayer.playerId,matches);
    const motmCount=(db.matches||[]).filter(m=>(m.team1Id===viewPlayer.teamId||m.team2Id===viewPlayer.teamId)&&m.motm===viewPlayer.playerId).length;
    return(
      <div className="af" style={{padding:20}}>
        <div style={S.sectionHeader}>
          <button onClick={()=>setViewPlayer(null)} style={S.backBtn}>← Back</button>
          <span style={{fontWeight:800,fontSize:16}}>{player?.name}</span>
        </div>
        <div style={{color:"#8899aa",fontSize:12,marginBottom:10}}>{player?.role} · {team?.name}</div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <div style={{flex:1,background:"#0a1020",border:`1px solid rgba(${hexToRgb(accent)},.3)`,borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,color:accent}}>{mvp}</div>
            <div style={{fontSize:9,color:"#8899aa",fontWeight:700,letterSpacing:1,marginTop:2}}>MVP PTS</div>
          </div>
          <div style={{flex:1,background:"#0a1020",border:"1px solid #1e2d40",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,color:"#f59e0b"}}>{motmCount}</div>
            <div style={{fontSize:9,color:"#8899aa",fontWeight:700,letterSpacing:1,marginTop:2}}>MAN OF MATCH</div>
          </div>
          <div style={{flex:1,background:"#0a1020",border:"1px solid #1e2d40",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,color:"#4ade80"}}>{field.total}</div>
            <div style={{fontSize:9,color:"#8899aa",fontWeight:700,letterSpacing:1,marginTop:2}}>DISMISSALS</div>
          </div>
        </div>
        <div style={S.sectionLabel}>BATTING</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
          {[["Innings",bat.innings],["Runs",bat.runs],["Avg",bat.avg],
            ["SR",bat.sr],["50s",bat.fifties],["100s",bat.hundreds],
            ["Best",bat.best],["4s",bat.fours],["6s",bat.sixes],
            ["Not Out",bat.notOuts],["Ducks",bat.ducks],["Balls",bat.balls]].map(([l,v])=>(
            <StatBox key={l} label={l} value={v} accent={accent}/>
          ))}
        </div>
        <div style={S.sectionLabel}>BOWLING</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
          {[["Innings",bowl.innings],["Wickets",bowl.wickets],["Avg",bowl.avg],
            ["Econ",bowl.econ],["SR",bowl.sr],["Best",bowl.bestStr],
            ["5-Wkts",bowl.best5],["Maidens",bowl.maidens],["Wides",bowl.wides],
            ["No Balls",bowl.noBalls],["Runs",bowl.runs],["Balls",bowl.balls]].map(([l,v])=>(
            <StatBox key={l} label={l} value={v} accent={accent}/>
          ))}
        </div>
        <div style={S.sectionLabel}>FIELDING</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
          {[["Catches",field.catches],["Stumpings",field.stumpings],["Run Outs",field.runOuts]].map(([l,v])=>(
            <StatBox key={l} label={l} value={v} accent={accent}/>
          ))}
        </div>
        {matches.length===0&&<div style={S.empty}>No match data yet for this player.</div>}
      </div>
    );
  }

  if(showNew) return(
    <div className="af" style={{padding:20}}>
      <div style={S.sectionHeader}>
        <button onClick={()=>setShowNew(false)} style={S.backBtn}>← Back</button>
        <span style={{fontWeight:800,fontSize:16}}>{editId?"Edit Team":"New Team"}</span>
      </div>
      <div style={{marginBottom:14}}>
        <label style={S.label}>Team Name</label>
        <input value={teamName} onChange={e=>setTeamName(e.target.value)} placeholder="e.g. Mumbai Indians" style={S.input}/>
      </div>
      <div style={S.sectionLabel}>PLAYERS</div>
      {players.map((p,i)=>(
        <div key={p.id} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
          <input value={p.name} placeholder={`Player ${i+1}`}
            onChange={e=>setPlayers(pl=>pl.map((x,j)=>j===i?{...x,name:e.target.value}:x))}
            style={{...S.input,flex:2,marginBottom:0}}/>
          <select value={p.role} onChange={e=>setPlayers(pl=>pl.map((x,j)=>j===i?{...x,role:e.target.value}:x))}
            style={{...S.select,flex:1}}>
            {ROLES.map(r=><option key={r}>{r}</option>)}
          </select>
          {players.length>1&&<button onClick={()=>setPlayers(pl=>pl.filter((_,j)=>j!==i))}
            style={{...S.iconBtn,color:"#ef4444"}}>✕</button>}
        </div>
      ))}
      <button onClick={()=>setPlayers(p=>[...p,{id:uid(),name:"",role:ROLES[0]}])}
        style={{...S.secondaryBtn,marginBottom:16}}>+ Add Player</button>
      <button onClick={saveTeam} style={{...S.primaryBtn(accent),width:"100%"}}>
        {editId?"Save Changes":"Create Team"}
      </button>
    </div>
  );

  if(showTransfer) return(
    <div className="af" style={{padding:20}}>
      <div style={S.sectionHeader}>
        <button onClick={()=>{setShowTransfer(false);setTxStep(1);setTxSrc(null);setTxPlayer(null);setTxMode("transfer");}} style={S.backBtn}>← Back</button>
        <span style={{fontWeight:800,fontSize:16}}>{txMode==="copy"?"Copy Player":"Transfer Player"}</span>
      </div>
      {txStep===1&&(
        <>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {[["transfer","⇄ Transfer (move)"],["copy","⊕ Copy (keep original)"]].map(([m,label])=>(
              <button key={m} onClick={()=>setTxMode(m)}
                style={{...S.secondaryBtn,flex:1,fontSize:11,borderColor:txMode===m?accent:"#1e2d40",color:txMode===m?accent:"#8899aa",fontWeight:txMode===m?700:400}}>
                {label}
              </button>
            ))}
          </div>
          <div style={{color:"#8899aa",fontSize:12,marginBottom:14}}>Step 1: Pick source team</div>
          {(db.teams||[]).map(t=>(
            <div key={t.id} className="pl-row" onClick={()=>{setTxSrc(t.id);setTxStep(2);}}
              style={{padding:"12px 14px",cursor:"pointer",borderRadius:8,background:"#0d1424",
                border:"1px solid #1e2d40",marginBottom:8}}>
              <div style={{fontWeight:700}}>{t.name}</div>
              <div style={{color:"#8899aa",fontSize:11}}>{t.players?.length||0} players</div>
            </div>
          ))}
        </>
      )}
      {txStep===2&&(()=>{
        const st=db.teams.find(t=>t.id===txSrc);
        return(
          <>
            <div style={{color:"#8899aa",fontSize:12,marginBottom:14}}>Step 2: Pick player from <b style={{color:"#e2e8f0"}}>{st?.name}</b></div>
            {(st?.players||[]).map(p=>(
              <div key={p.id} className="pl-row" onClick={()=>{setTxPlayer(p.id);setTxStep(3);}}
                style={{padding:"12px 14px",cursor:"pointer",borderRadius:8,background:"#0d1424",
                  border:"1px solid #1e2d40",marginBottom:8}}>
                <div style={{fontWeight:700}}>{p.name}</div>
                <div style={{color:"#8899aa",fontSize:11}}>{p.role}</div>
              </div>
            ))}
          </>
        );
      })()}
      {txStep===3&&(()=>{
        const player=db.teams.find(t=>t.id===txSrc)?.players?.find(p=>p.id===txPlayer);
        return(
          <>
            <div style={{color:"#8899aa",fontSize:12,marginBottom:14}}>
              Step 3: Pick destination team for <b style={{color:"#e2e8f0"}}>{player?.name}</b>
              <span style={{color:txMode==="copy"?"#4ade80":"#fbbf24",marginLeft:8,fontSize:10}}>
                {txMode==="copy"?"(will be copied — stays in source team too)":"(will be removed from source team)"}
              </span>
            </div>
            {(db.teams||[]).filter(t=>t.id!==txSrc).map(t=>(
              <div key={t.id} className="pl-row" onClick={()=>doTransfer(t.id)}
                style={{padding:"12px 14px",cursor:"pointer",borderRadius:8,background:"#0d1424",
                  border:"1px solid #1e2d40",marginBottom:8}}>
                <div style={{fontWeight:700}}>{t.name}</div>
                <div style={{color:"#8899aa",fontSize:11}}>{t.players?.length||0} players</div>
              </div>
            ))}
          </>
        );
      })()}
    </div>
  );

  return(
    <div className="af" style={{padding:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <span style={{fontWeight:800,fontSize:18}}>Teams</span>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowTransfer(true)} style={{...S.secondaryBtn,fontSize:11}}>⇄ Transfer</button>
          <button onClick={openNew} style={S.primaryBtn(accent)}>+ New Team</button>
        </div>
      </div>
      {(!db.teams?.length)&&<div style={S.empty}>No teams yet.</div>}
      {(db.teams||[]).map(team=>{
        const rec=getTeamRecord(team.id,db.matches||[],db);
        return(
        <div key={team.id} style={{...S.card,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div>
              <div style={{fontWeight:800,fontSize:15}}>{team.name}</div>
              <div style={{color:"#8899aa",fontSize:11,marginTop:2}}>{team.players?.length||0} players</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={e=>{e.stopPropagation();openEdit(team);}} style={S.iconBtn}>✏️</button>
              <button onClick={e=>{e.stopPropagation();persist({...db,teams:db.teams.filter(t=>t.id!==team.id)});showToast("Deleted","warn");}}
                style={{...S.iconBtn,color:"#ef4444"}}>🗑️</button>
            </div>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {rec.played>0&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,margin:"10px 0"}}>
                <StatBox label="Record" value={`${rec.won}-${rec.lost}${rec.tied?`-${rec.tied}T`:""}`} accent={accent}/>
                <StatBox label="Avg For" value={rec.avgFor} accent={accent}/>
                <StatBox label="Avg Agst" value={rec.avgAgainst} accent={accent}/>
                <StatBox label="Best" value={rec.bestPlayer?.name||"-"} accent={accent}/>
              </div>
            )}
            {rec.played>0&&(
              <div style={{color:"#8899aa",fontSize:10,marginBottom:8,lineHeight:1.5}}>
                Top bat: <span style={{color:"#cdd5e0"}}>{rec.topBat?.name||"-"}</span>{rec.topBat&&` (${rec.topBat.runs} runs)`} � Top bowler: <span style={{color:"#cdd5e0"}}>{rec.topBowler?.name||"-"}</span>{rec.topBowler&&` (${rec.topBowler.wickets} wkts)`}
              </div>
            )}
            {(team.players||[]).map(p=>(
              <button key={p.id} onClick={()=>setViewPlayer({teamId:team.id,playerId:p.id})}
                style={{background:"#162030",border:"1px solid #1e2d40",borderRadius:20,
                  padding:"3px 10px",fontSize:11,color:"#aabbcc",cursor:"pointer",fontFamily:"inherit"}}>
                {p.name} 👤
              </button>
            ))}
          </div>
        </div>
        );
      })}
    </div>
  );
}

function StatBox({label,value,accent}){
  return(
    <div style={{background:"#0a1020",border:"1px solid #1e2d40",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
      <div style={{fontSize:17,fontWeight:800,color:accent}}>{value??0}</div>
      <div style={{fontSize:9,color:"#8899aa",fontWeight:700,letterSpacing:1,marginTop:2}}>{label}</div>
    </div>
  );
}

// ─── GROUNDS VIEW ─────────────────────────────────────────────────────────────
function GroundsView({db,persist,showToast,accent}){
  const [showNew,setShowNew]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState({name:"",city:"",country:"",type:"Stadium",capacity:""});
  const [viewGround,setViewGround]=useState(null);

  const openNew=()=>{ setEditId(null);setForm({name:"",city:"",country:"",type:"Stadium",capacity:""});setShowNew(true); };
  const openEdit=(g)=>{ setEditId(g.id);setForm({name:g.name,city:g.city||"",country:g.country||"",type:g.type||"Stadium",capacity:g.capacity||""});setShowNew(true); };
  const save=()=>{
    if(!form.name.trim()){showToast("Enter ground name","error");return;}
    const nd={...db};
    if(editId) nd.grounds=db.grounds.map(g=>g.id===editId?{...g,...form}:g);
    else nd.grounds=[...(db.grounds||[]),{id:uid(),...form}];
    persist(nd);setShowNew(false);showToast(editId?"Updated":"Ground added");
  };

  if(viewGround){
    const g=db.grounds?.find(x=>x.id===viewGround);
    if(!g) return null;
    const stats=getGroundStats(g.name,db.matches||[]);
    const gMatches=(db.matches||[]).filter(m=>(m.ground||"").toLowerCase()===g.name.toLowerCase());
    return(
      <div className="af" style={{padding:20}}>
        <div style={S.sectionHeader}>
          <button onClick={()=>setViewGround(null)} style={S.backBtn}>← Back</button>
          <span style={{fontWeight:800,fontSize:16}}>{g.name}</span>
        </div>
        <div style={{color:"#8899aa",fontSize:12,marginBottom:16}}>
          {[g.city,g.country,g.type].filter(Boolean).join(" · ")}
          {g.capacity&&<span> · {g.capacity} cap.</span>}
        </div>
        <div style={S.sectionLabel}>GROUND STATS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
          <StatBox label="Matches" value={stats.matchCount} accent={accent}/>
          <StatBox label="1st Inn Avg" value={stats.inn1Avg} accent={accent}/>
          <StatBox label="1st Inn RR" value={stats.inn1RR} accent={accent}/>
          <StatBox label="2nd Inn Avg" value={stats.inn2Avg} accent={accent}/>
          <StatBox label="2nd Inn RR" value={stats.inn2RR} accent={accent}/>
          <StatBox label="2nd Inn Games" value={stats.inn2Count} accent={accent}/>
        </div>
        {stats.matchCount>0&&(
          <>
            <div style={S.sectionLabel}>INNINGS COMPARISON</div>
            <div style={{...S.card,marginBottom:16}}>
              <div style={{display:"flex",gap:0}}>
                {[["1st Innings",stats.inn1Avg,stats.inn1RR,stats.inn1Count],
                  ["2nd Innings",stats.inn2Avg,stats.inn2RR,stats.inn2Count]].map(([label,avg,rr,count])=>(
                  <div key={label} style={{flex:1,textAlign:"center",padding:"8px 0"}}>
                    <div style={{color:accent,fontSize:11,fontWeight:700,marginBottom:8}}>{label}</div>
                    <div style={{fontSize:20,fontWeight:900}}>{avg}</div>
                    <div style={{color:"#8899aa",fontSize:10,marginBottom:6}}>avg runs</div>
                    <div style={{fontSize:16,fontWeight:700,color:rrColor(parseFloat(rr)||0)}}>{rr}</div>
                    <div style={{color:"#8899aa",fontSize:10}}>run rate</div>
                    <div style={{color:"#445566",fontSize:10,marginTop:4}}>{count} innings</div>
                  </div>
                ))}
              </div>
            </div>
          </>
        )}
        <div style={S.sectionLabel}>MATCHES AT THIS VENUE</div>
        {gMatches.length===0&&<div style={S.empty}>No matches recorded here yet.</div>}
        {gMatches.map(m=>{
          const t1=db.teams?.find(t=>t.id===m.team1Id),t2=db.teams?.find(t=>t.id===m.team2Id);
          const i1=m.innings?.[0],i2=m.innings?.[1];
          return(
            <div key={m.id} style={{...S.card,marginBottom:8}}>
              <div style={{fontWeight:700,fontSize:13}}>{t1?.name||"?"} vs {t2?.name||"?"}</div>
              {i1&&<div style={{color:"#aabbcc",fontSize:11,marginTop:4}}>
                1st: {i1.runs}/{i1.wickets} ({ovrStr(i1.balls)} ov)
                {i2&&<span>  2nd: {i2.runs}/{i2.wickets} ({ovrStr(i2.balls)} ov)</span>}
              </div>}
            </div>
          );
        })}
      </div>
    );
  }

  if(showNew) return(
    <div className="af" style={{padding:20}}>
      <div style={S.sectionHeader}>
        <button onClick={()=>setShowNew(false)} style={S.backBtn}>← Back</button>
        <span style={{fontWeight:800,fontSize:16}}>{editId?"Edit Ground":"New Ground"}</span>
      </div>
      {[["name","Ground Name","e.g. Wankhede Stadium"],["city","City","e.g. Mumbai"],["country","Country","e.g. India"],["capacity","Capacity","e.g. 33000"]].map(([k,l,ph])=>(
        <div key={k} style={{marginBottom:12}}>
          <label style={S.label}>{l}</label>
          <input value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder={ph} style={S.input}/>
        </div>
      ))}
      <div style={{marginBottom:14}}>
        <label style={S.label}>Type</label>
        <select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))} style={S.select}>
          {GROUND_TYPES.map(t=><option key={t}>{t}</option>)}
        </select>
      </div>
      <button onClick={save} style={{...S.primaryBtn(accent),width:"100%"}}>{editId?"Save":"Add Ground"}</button>
    </div>
  );

  return(
    <div className="af" style={{padding:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <span style={{fontWeight:800,fontSize:18}}>Grounds</span>
        <button onClick={openNew} style={S.primaryBtn(accent)}>+ New Ground</button>
      </div>
      {(!db.grounds?.length)&&<div style={S.empty}>No grounds added yet.</div>}
      {(db.grounds||[]).map(g=>{
        const stats=getGroundStats(g.name,db.matches||[]);
        return(
          <div key={g.id} className="hcard" onClick={()=>setViewGround(g.id)}
            style={{...S.card,marginBottom:10,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontWeight:800,fontSize:14}}>{g.name}</div>
                <div style={{color:"#8899aa",fontSize:11,marginTop:2}}>
                  {[g.city,g.country].filter(Boolean).join(", ")||"No location"}
                  {g.capacity&&<span> · {g.capacity}</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:10,color:"#8899aa"}}>{stats.matchCount} matches</span>
                <button onClick={e=>{e.stopPropagation();openEdit(g);}} style={S.iconBtn}>✏️</button>
                <button onClick={e=>{e.stopPropagation();persist({...db,grounds:db.grounds.filter(x=>x.id!==g.id)});showToast("Deleted","warn");}}
                  style={{...S.iconBtn,color:"#ef4444"}}>🗑️</button>
              </div>
            </div>
            {stats.matchCount>0&&(
              <div style={{display:"flex",gap:16,marginTop:8,fontSize:11,color:"#aabbcc"}}>
                <span>1st inn avg: <b style={{color:accent}}>{stats.inn1Avg}</b></span>
                <span>2nd inn avg: <b style={{color:accent}}>{stats.inn2Avg}</b></span>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── TOURNAMENTS VIEW ─────────────────────────────────────────────────────────
function TournamentsView({db,persist,showToast,accent,setView,setActiveMatch}){
  const [showNew,setShowNew]=useState(false);
  const [editId,setEditId]=useState(null);
  const [viewId,setViewId]=useState(null);
  const [form,setForm]=useState({name:"",format:"T20",overs:"20",startDate:"",teamIds:[],linkedTournamentIds:[]});
  const [tTab,setTTab]=useState("standings");
  const [playerSubTab,setPlayerSubTab]=useState("bat");

  const openNew=()=>{ setEditId(null);setForm({name:"",format:"T20",overs:"20",startDate:"",teamIds:[],linkedTournamentIds:[]});setShowNew(true); };
  const openEdit=(t)=>{ setEditId(t.id);setForm({name:t.name,format:t.format||"T20",overs:t.overs||"20",startDate:t.startDate||"",teamIds:t.teamIds||[],linkedTournamentIds:t.linkedTournamentIds||[]});setShowNew(true); };
  const toggleTeam=(id)=>setForm(f=>({...f,teamIds:f.teamIds.includes(id)?f.teamIds.filter(x=>x!==id):[...f.teamIds,id]}));
  const toggleLinkedTournament=(id)=>setForm(f=>({...f,linkedTournamentIds:(f.linkedTournamentIds||[]).includes(id)?(f.linkedTournamentIds||[]).filter(x=>x!==id):[...(f.linkedTournamentIds||[]),id]}));
  const save=()=>{
    if(!form.name.trim()){showToast("Enter tournament name","error");return;}
    if(form.teamIds.length<2){showToast("Select 2+ teams","error");return;}
    const nd={...db};
    if(editId) nd.tournaments=db.tournaments.map(t=>t.id===editId?{...t,...form}:t);
    else nd.tournaments=[...(db.tournaments||[]),{id:uid(),...form}];
    persist(nd);setShowNew(false);showToast(editId?"Updated":"Tournament created");
  };

  if(viewId){
    const tourn=db.tournaments?.find(t=>t.id===viewId);
    if(!tourn) return null;
    const scopedTourn=getCombinedTournament(tourn,db);
    const linkedNames=(scopedTourn.scopeIds||[]).filter(id=>id!==tourn.id).map(id=>(db.tournaments||[]).find(t=>t.id===id)?.name).filter(Boolean);
    const table=getTournamentPoints(scopedTourn,db.matches||[],db);
    const tMatches=getTournamentMatches(scopedTourn,db.matches||[]);

    // Gather all players from all tournament teams
    const allTeams=(scopedTourn.teamIds||[]).map(id=>db.teams?.find(t=>t.id===id)).filter(Boolean);
    const allPlayers=allTeams.flatMap(t=>(t.players||[]).map(p=>({...p,teamName:t.name})));

    // Per-player stats filtered to tournament matches
    const battingRows=allPlayers.map(p=>{
      const s=getPlayerBattingStats(p.id,tMatches);
      return {...s,id:p.id,name:p.name,teamName:p.teamName};
    }).filter(r=>r.innings>0).sort((a,b)=>b.runs-a.runs);

    const bowlingRows=allPlayers.map(p=>{
      const s=getPlayerBowlingStats(p.id,tMatches);
      return {...s,id:p.id,name:p.name,teamName:p.teamName};
    }).filter(r=>r.innings>0).sort((a,b)=>b.wickets-a.wickets);

    return(
      <div className="af" style={{padding:20}}>
        <div style={S.sectionHeader}>
          <button onClick={()=>{setViewId(null);setTTab("standings");}} style={S.backBtn}>← Back</button>
          <span style={{fontWeight:800,fontSize:16}}>{tourn.name}</span>
        </div>
        <div style={{color:"#8899aa",fontSize:12,marginBottom:14}}>{tourn.format} · {tourn.overs} overs{tourn.startDate&&` · ${tourn.startDate}`}{linkedNames.length>0&&` · combined with ${linkedNames.join(", ")}`}</div>

        {/* Tournament tabs */}
        <div style={{display:"flex",borderBottom:"1px solid #1e2d40",marginBottom:16}}>
          {[["standings","Standings"],["matches","Matches"],["players","Players"],["mvp","MVP 🏆"]].map(([id,label])=>(
            <button key={id} onClick={()=>setTTab(id)}
              className={`tab-btn${tTab===id?" active":""}`}
              style={{flex:1,padding:"8px 2px",background:"transparent",border:"none",cursor:"pointer",
                color:tTab===id?accent:"#8899aa",fontSize:11,fontWeight:700,letterSpacing:.5,fontFamily:"inherit"}}>
              {label}
            </button>
          ))}
        </div>

        {tTab==="standings"&&(
          <div style={{overflowX:"auto",marginBottom:20}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:320}}>
              <thead>
                <tr style={{borderBottom:"1px solid #1e2d40"}}>
                  {["#","Team","P","W","L","T","Pts","NRR"].map(h=>(
                    <th key={h} style={{padding:"6px 6px",textAlign:h==="Team"?"left":"center",
                      color:"#8899aa",fontWeight:700,fontSize:10,letterSpacing:.5}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {table.map((row,i)=>(
                  <tr key={row.id} style={{borderBottom:"1px solid #0f1824",
                    background:i<2?`rgba(${hexToRgb(accent)},.05)`:""}}>
                    <td style={{padding:"8px 6px",textAlign:"center",color:i<2?accent:"#556677",fontWeight:700}}>{i+1}</td>
                    <td style={{padding:"8px 6px",fontWeight:i<2?700:400}}>{row.name}</td>
                    {[row.played,row.won,row.lost,row.tied,row.pts].map((v,j)=>(
                      <td key={j} style={{padding:"8px 6px",textAlign:"center",
                        color:j===4?accent:"#cdd5e0",fontWeight:j===4?800:400}}>{v}</td>
                    ))}
                    <td style={{padding:"8px 6px",textAlign:"center",
                      color:parseFloat(row.nrr)>0?"#4ade80":parseFloat(row.nrr)<0?"#f87171":"#8899aa",
                      fontSize:11}}>{row.nrr}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {tTab==="matches"&&(
          <div>
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
              <button onClick={()=>setView("matches")}
                style={{...S.primaryBtn(accent),padding:"6px 12px",fontSize:11}}>+ Add Match</button>
            </div>
            {tMatches.length===0&&<div style={S.empty}>No matches in this tournament yet.</div>}
            {tMatches.map(m=>{
              const t1=db.teams?.find(t=>t.id===m.team1Id),t2=db.teams?.find(t=>t.id===m.team2Id);
              const i1=m.innings?.[0],i2=m.innings?.[1];
              return(
                <div key={m.id} className="hcard" onClick={()=>{setActiveMatch(m.id);setView("scoring");}}
                  style={{...S.card,marginBottom:8,cursor:"pointer"}}>
                  <div style={{fontWeight:700,fontSize:13}}>{t1?.name||"?"} vs {t2?.name||"?"}</div>
                  <div style={{color:"#aabbcc",fontSize:11,marginTop:3}}>
                    {i1?`${t1?.name}: ${i1.runs}/${i1.wickets}`:""} {i2?`  ${t2?.name}: ${i2.runs}/${i2.wickets}`:""}
                  </div>
                  <div style={{color:"#556677",fontSize:10,marginTop:2}}>{m.ground||"No ground"}</div>
                </div>
              );
            })}
          </div>
        )}

        {tTab==="players"&&(()=>{
          const keeperIds=new Set(allTeams.flatMap(t=>(t.players||[]).filter(p=>p.role==="Wicket-Keeper").map(p=>p.id)));
          const fieldingRows=allPlayers.filter(p=>!keeperIds.has(p.id)).map(p=>{
            const f=getPlayerFieldingStats(p.id,tMatches);
            return {...f,id:p.id,name:p.name,teamName:p.teamName};
          }).filter(r=>r.total>0).sort((a,b)=>b.total-a.total);
          const keeperRows=allPlayers.filter(p=>keeperIds.has(p.id)).map(p=>{
            const f=getPlayerFieldingStats(p.id,tMatches);
            return {...f,id:p.id,name:p.name,teamName:p.teamName};
          }).filter(r=>r.total>0).sort((a,b)=>(b.stumpings+b.catches)-(a.stumpings+a.catches));
          return(
          <div>
            <div style={{display:"flex",gap:0,marginBottom:14,background:"#0d1424",borderRadius:8,border:"1px solid #1e2d40",overflow:"hidden"}}>
              {[["bat","Batting"],["bowl","Bowling"],["field","Fielding"],["keeper","Keeper"]].map(([id,label])=>(
                <button key={id} onClick={()=>setPlayerSubTab(id)}
                  style={{flex:1,padding:"8px 4px",background:playerSubTab===id?`rgba(${hexToRgb(accent)},.15)`:"transparent",
                    border:"none",cursor:"pointer",color:playerSubTab===id?accent:"#8899aa",
                    fontWeight:700,fontSize:10,fontFamily:"inherit",borderBottom:playerSubTab===id?`2px solid ${accent}`:"2px solid transparent"}}>
                  {label}
                </button>
              ))}
            </div>

            {playerSubTab==="bat"&&(
              battingRows.length===0?<div style={S.empty}>No batting data yet.</div>:(
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:480}}>
                  <thead>
                    <tr style={{borderBottom:"1px solid #1e2d40"}}>
                      {["Player","Inn","Runs","HS","Avg","SR","50s","100s","4s","6s"].map(h=>(
                        <th key={h} style={{padding:"5px 4px",textAlign:h==="Player"?"left":"center",
                          color:"#8899aa",fontWeight:700,fontSize:9,letterSpacing:.5}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {battingRows.map((r,i)=>(
                      <tr key={r.id} style={{borderBottom:"1px solid #0f1824",background:i===0?`rgba(${hexToRgb(accent)},.05)`:""}}>
                        <td style={{padding:"7px 4px"}}>
                          <div style={{fontWeight:600}}>{r.name}</div>
                          <div style={{color:"#556677",fontSize:9}}>{r.teamName}</div>
                        </td>
                        {[r.innings,r.runs,r.best,r.avg,r.sr,r.fifties,r.hundreds,r.fours,r.sixes].map((v,j)=>(
                          <td key={j} style={{textAlign:"center",padding:"7px 4px",
                            color:j===1&&r.runs>=100?"#f59e0b":j===1&&r.runs>=50?accent:"#cdd5e0",
                            fontWeight:j===1?700:400}}>{v}</td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ))}

            {playerSubTab==="bowl"&&(
              bowlingRows.length===0?<div style={S.empty}>No bowling data yet.</div>:(
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:480}}>
                  <thead>
                    <tr style={{borderBottom:"1px solid #1e2d40"}}>
                      {["Player","Inn","Wkts","Best","Avg","Econ","SR","5W","Mdn"].map(h=>(
                        <th key={h} style={{padding:"5px 4px",textAlign:h==="Player"?"left":"center",
                          color:"#8899aa",fontWeight:700,fontSize:9,letterSpacing:.5}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {bowlingRows.map((r,i)=>(
                      <tr key={r.id} style={{borderBottom:"1px solid #0f1824",background:i===0?`rgba(${hexToRgb(accent)},.05)`:""}}>
                        <td style={{padding:"7px 4px"}}>
                          <div style={{fontWeight:600}}>{r.name}</div>
                          <div style={{color:"#556677",fontSize:9}}>{r.teamName}</div>
                        </td>
                        {[r.innings,r.wickets,r.bestStr,r.avg,r.econ,r.sr,r.best5,r.maidens].map((v,j)=>(
                          <td key={j} style={{textAlign:"center",padding:"7px 4px",
                            color:j===1&&r.wickets>=5?"#f59e0b":j===1&&r.wickets>=3?accent:"#cdd5e0",
                            fontWeight:j===1?700:400}}>{v}</td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ))}

            {playerSubTab==="field"&&(
              fieldingRows.length===0?<div style={S.empty}>No fielding data yet.</div>:(
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:360}}>
                  <thead>
                    <tr style={{borderBottom:"1px solid #1e2d40"}}>
                      {["Player","Catches","Stumpings","Run Outs","Total"].map(h=>(
                        <th key={h} style={{padding:"5px 4px",textAlign:h==="Player"?"left":"center",
                          color:"#8899aa",fontWeight:700,fontSize:9,letterSpacing:.5}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {fieldingRows.map((r,i)=>(
                      <tr key={r.id} style={{borderBottom:"1px solid #0f1824",background:i===0?`rgba(${hexToRgb(accent)},.05)`:""}}>
                        <td style={{padding:"7px 4px"}}>
                          <div style={{fontWeight:600}}>{r.name}</div>
                          <div style={{color:"#556677",fontSize:9}}>{r.teamName}</div>
                        </td>
                        {[r.catches,r.stumpings,r.runOuts,r.total].map((v,j)=>(
                          <td key={j} style={{textAlign:"center",padding:"7px 4px",
                            color:j===3&&r.total>=5?"#f59e0b":j===3&&r.total>=3?accent:"#cdd5e0",
                            fontWeight:j===3?700:400}}>{v}</td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ))}

            {playerSubTab==="keeper"&&(
              keeperRows.length===0?<div style={S.empty}>No wicket-keepers with dismissals in this tournament.</div>:(
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:340}}>
                  <thead>
                    <tr style={{borderBottom:"1px solid #1e2d40"}}>
                      {["Keeper","Caught","Stumped","Run Out","Total"].map(h=>(
                        <th key={h} style={{padding:"5px 4px",textAlign:h==="Keeper"?"left":"center",
                          color:"#8899aa",fontWeight:700,fontSize:9,letterSpacing:.5}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {keeperRows.map((r,i)=>(
                      <tr key={r.id} style={{borderBottom:"1px solid #0f1824",background:i===0?`rgba(${hexToRgb(accent)},.05)`:""}}>
                        <td style={{padding:"7px 4px"}}>
                          <div style={{fontWeight:600}}>🧤 {r.name}</div>
                          <div style={{color:"#556677",fontSize:9}}>{r.teamName}</div>
                        </td>
                        {[r.catches,r.stumpings,r.runOuts,r.total].map((v,j)=>(
                          <td key={j} style={{textAlign:"center",padding:"7px 4px",
                            color:j===3&&r.total>=5?"#f59e0b":j===3&&r.total>=3?accent:"#cdd5e0",
                            fontWeight:j===3?700:400}}>{v}</td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ))}
          </div>
          );
        })()}

        {tTab==="mvp"&&(()=>{
          const allPlayersForMvp=allTeams.flatMap(t=>(t.players||[]).map(p=>({...p,teamName:t.name})));
          const mvpRows=allPlayersForMvp.map(p=>({
            id:p.id,name:p.name,teamName:p.teamName,
            pts:calcMVPPoints(p.id,tMatches),
            bat:getPlayerBattingStats(p.id,tMatches),
            bowl:getPlayerBowlingStats(p.id,tMatches),
            field:getPlayerFieldingStats(p.id,tMatches),
            motmCount:tMatches.filter(m=>m.motm===p.id).length,
          })).filter(r=>r.pts>0).sort((a,b)=>b.pts-a.pts);
          const maxPts=mvpRows[0]?.pts||1;

          // Highest batting average (min 3 innings)
          const avgRows=allPlayersForMvp.map(p=>{
            const s=getPlayerBattingStats(p.id,tMatches);
            return {...s,id:p.id,name:p.name,teamName:p.teamName};
          }).filter(r=>r.innings>=3&&r.avg!=="—").sort((a,b)=>parseFloat(b.avg)-parseFloat(a.avg));

          // Best economy (min 6 balls)
          const econRows=allPlayersForMvp.map(p=>{
            const s=getPlayerBowlingStats(p.id,tMatches);
            return {...s,id:p.id,name:p.name,teamName:p.teamName};
          }).filter(r=>r.balls>=6&&r.econ!=="—").sort((a,b)=>parseFloat(a.econ)-parseFloat(b.econ));

          // Most runs
          const runsRows=allPlayersForMvp.map(p=>{
            const s=getPlayerBattingStats(p.id,tMatches);
            return {...s,id:p.id,name:p.name,teamName:p.teamName};
          }).filter(r=>r.runs>0).sort((a,b)=>b.runs-a.runs);

          // Most wickets
          const wktRows=allPlayersForMvp.map(p=>{
            const s=getPlayerBowlingStats(p.id,tMatches);
            return {...s,id:p.id,name:p.name,teamName:p.teamName};
          }).filter(r=>r.wickets>0).sort((a,b)=>b.wickets-a.wickets);

          // Most dismissals (fielders only, no keepers)
          const keeperIdsForMvp=new Set(allTeams.flatMap(t=>(t.players||[]).filter(p=>p.role==="Wicket-Keeper").map(p=>p.id)));
          const disRows=allPlayersForMvp.filter(p=>!keeperIdsForMvp.has(p.id)).map(p=>{
            const f=getPlayerFieldingStats(p.id,tMatches);
            return {...f,id:p.id,name:p.name,teamName:p.teamName};
          }).filter(r=>r.total>0).sort((a,b)=>b.total-a.total);

          // Most keeper dismissals (keepers only)
          const keeperDisRows=allPlayersForMvp.filter(p=>keeperIdsForMvp.has(p.id)).map(p=>{
            const f=getPlayerFieldingStats(p.id,tMatches);
            return {...f,id:p.id,name:p.name,teamName:p.teamName};
          }).filter(r=>r.total>0).sort((a,b)=>b.total-a.total);

          const MiniLeaderRow=({r,i,left,right})=>(
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"7px 0",borderBottom:i<4?"1px solid #0f1824":""}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:16,textAlign:"center",fontSize:10,fontWeight:700,
                  color:i===0?"#f59e0b":i===1?"#94a3b8":i===2?"#b45309":"#445566"}}>{i+1}</span>
                <div>
                  <div style={{fontSize:11,fontWeight:i===0?700:400,color:i===0?accent:"#cdd5e0"}}>{r.name}</div>
                  <div style={{fontSize:9,color:"#556677"}}>{r.teamName}</div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>{right}</div>
            </div>
          );

          return(
          <div>
            {/* MVP Overall */}
            <div style={{...S.card,marginBottom:12}}>
              <div style={{color:accent,fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:4}}>🏆 MVP LEADERBOARD</div>
              <div style={{color:"#445566",fontSize:9,marginBottom:10}}>CricClubs system · 1pt/run (×2 if 50+) · 4s+1 · 6s+2 · Wkt×20 · Maiden×40 · MOTM+50 · SR/Econ bonuses</div>
              {mvpRows.length===0&&<div style={S.empty}>No match data yet.</div>}
              {mvpRows.slice(0,10).map((r,i)=>(
                <div key={r.id} style={{marginBottom:9}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{width:18,textAlign:"center",fontSize:10,fontWeight:700,
                        color:i===0?"#f59e0b":i===1?"#94a3b8":i===2?"#b45309":"#556677"}}>{i+1}</span>
                      <div>
                        <div style={{fontSize:11,fontWeight:i<3?700:400,color:i===0?"#f59e0b":i<3?accent:"#cdd5e0"}}>
                          {i===0?"🥇":i===1?"🥈":i===2?"🥉":""} {r.name}
                          {r.motmCount>0&&<span style={{marginLeft:4,fontSize:9,color:"#f59e0b"}}>⭐×{r.motmCount}</span>}
                        </div>
                        <div style={{fontSize:9,color:"#556677"}}>{r.teamName}</div>
                      </div>
                    </div>
                    <span style={{fontSize:13,fontWeight:800,color:i===0?"#f59e0b":i<3?accent:"#8899aa"}}>{r.pts}</span>
                  </div>
                  <div style={{height:4,background:"#0a0e1a",borderRadius:3,overflow:"hidden",marginLeft:24}}>
                    <div style={{height:"100%",borderRadius:3,width:`${(r.pts/maxPts)*100}%`,
                      background:i===0?"#f59e0b":i<3?accent:"#1e3a50"}}/>
                  </div>
                  <div style={{fontSize:9,color:"#445566",marginTop:2,marginLeft:24}}>
                    {r.bat.runs>0&&`${r.bat.runs}r`}{r.bowl.wickets>0&&` · ${r.bowl.wickets}w`}{r.field.total>0&&` · ${r.field.total} dis`}
                  </div>
                </div>
              ))}
            </div>

            {/* Most Runs */}
            {runsRows.length>0&&(
              <div style={{...S.card,marginBottom:12}}>
                <div style={{color:"#fbbf24",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8}}>🏏 MOST RUNS</div>
                {runsRows.slice(0,5).map((r,i)=>(
                  <MiniLeaderRow key={r.id} r={r} i={i} right={
                    <div>
                      <div style={{fontSize:13,fontWeight:800,color:i===0?"#fbbf24":"#cdd5e0"}}>{r.runs}</div>
                      <div style={{fontSize:9,color:"#445566"}}>avg {r.avg} · hs {r.best}</div>
                    </div>
                  }/>
                ))}
              </div>
            )}

            {/* Highest Average */}
            {avgRows.length>0&&(
              <div style={{...S.card,marginBottom:12}}>
                <div style={{color:"#34d399",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8}}>📈 HIGHEST BATTING AVERAGE <span style={{color:"#445566",fontWeight:400}}>(min 3 innings)</span></div>
                {avgRows.slice(0,5).map((r,i)=>(
                  <MiniLeaderRow key={r.id} r={r} i={i} right={
                    <div>
                      <div style={{fontSize:13,fontWeight:800,color:i===0?"#34d399":"#cdd5e0"}}>{r.avg}</div>
                      <div style={{fontSize:9,color:"#445566"}}>{r.runs}r · {r.innings} inn</div>
                    </div>
                  }/>
                ))}
              </div>
            )}

            {/* Best Economy */}
            {econRows.length>0&&(
              <div style={{...S.card,marginBottom:12}}>
                <div style={{color:"#a78bfa",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8}}>🎯 BEST ECONOMY <span style={{color:"#445566",fontWeight:400}}>(min 1 over)</span></div>
                {econRows.slice(0,5).map((r,i)=>(
                  <MiniLeaderRow key={r.id} r={r} i={i} right={
                    <div>
                      <div style={{fontSize:13,fontWeight:800,color:i===0?"#a78bfa":"#cdd5e0"}}>{r.econ}</div>
                      <div style={{fontSize:9,color:"#445566"}}>{r.wickets}w · {r.innings} inn</div>
                    </div>
                  }/>
                ))}
              </div>
            )}

            {/* Most Wickets */}
            {wktRows.length>0&&(
              <div style={{...S.card,marginBottom:12}}>
                <div style={{color:"#f87171",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8}}>💥 MOST WICKETS</div>
                {wktRows.slice(0,5).map((r,i)=>(
                  <MiniLeaderRow key={r.id} r={r} i={i} right={
                    <div>
                      <div style={{fontSize:13,fontWeight:800,color:i===0?"#f87171":"#cdd5e0"}}>{r.wickets}w</div>
                      <div style={{fontSize:9,color:"#445566"}}>{r.bestStr} best · {r.econ} econ</div>
                    </div>
                  }/>
                ))}
              </div>
            )}

            {/* Most Fielding Dismissals (non-keepers) */}
            {disRows.length>0&&(
              <div style={{...S.card,marginBottom:12}}>
                <div style={{color:"#38bdf8",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8}}>🤝 MOST FIELDING DISMISSALS <span style={{color:"#445566",fontWeight:400}}>(excl. keepers)</span></div>
                {disRows.slice(0,5).map((r,i)=>(
                  <MiniLeaderRow key={r.id} r={r} i={i} right={
                    <div>
                      <div style={{fontSize:13,fontWeight:800,color:i===0?"#38bdf8":"#cdd5e0"}}>{r.total}</div>
                      <div style={{fontSize:9,color:"#445566"}}>{r.catches}ct · {r.runOuts}ro</div>
                    </div>
                  }/>
                ))}
              </div>
            )}

            {/* Keeper Dismissals */}
            {keeperDisRows.length>0&&(
              <div style={{...S.card,marginBottom:12}}>
                <div style={{color:"#fb923c",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8}}>🧤 TOP WICKET-KEEPERS</div>
                {keeperDisRows.slice(0,5).map((r,i)=>(
                  <MiniLeaderRow key={r.id} r={r} i={i} right={
                    <div>
                      <div style={{fontSize:13,fontWeight:800,color:i===0?"#fb923c":"#cdd5e0"}}>{r.total}</div>
                      <div style={{fontSize:9,color:"#445566"}}>{r.catches}ct · {r.stumpings}st · {r.runOuts}ro</div>
                    </div>
                  }/>
                ))}
              </div>
            )}

            {/* Best Strike Rate */}
            {(()=>{
              const srRows=allPlayersForMvp.map(p=>{
                const s=getPlayerBattingStats(p.id,tMatches);
                return {...s,id:p.id,name:p.name,teamName:p.teamName};
              }).filter(r=>r.balls>=12&&r.sr!=="—").sort((a,b)=>parseFloat(b.sr)-parseFloat(a.sr));
              return srRows.length>0&&(
                <div style={{...S.card,marginBottom:12}}>
                  <div style={{color:"#facc15",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8}}>⚡ BEST STRIKE RATE <span style={{color:"#445566",fontWeight:400}}>(min 2 overs faced)</span></div>
                  {srRows.slice(0,5).map((r,i)=>(
                    <MiniLeaderRow key={r.id} r={r} i={i} right={
                      <div>
                        <div style={{fontSize:13,fontWeight:800,color:i===0?"#facc15":"#cdd5e0"}}>{r.sr}</div>
                        <div style={{fontSize:9,color:"#445566"}}>{r.runs}r off {r.balls}b</div>
                      </div>
                    }/>
                  ))}
                </div>
              );
            })()}

            {/* Most Sixes */}
            {(()=>{
              const sixRows=allPlayersForMvp.map(p=>{
                const s=getPlayerBattingStats(p.id,tMatches);
                return {...s,id:p.id,name:p.name,teamName:p.teamName};
              }).filter(r=>(r.sixes||0)>0).sort((a,b)=>(b.sixes||0)-(a.sixes||0));
              return sixRows.length>0&&(
                <div style={{...S.card,marginBottom:12}}>
                  <div style={{color:"#f97316",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8}}>💥 MOST SIXES</div>
                  {sixRows.slice(0,5).map((r,i)=>(
                    <MiniLeaderRow key={r.id} r={r} i={i} right={
                      <div>
                        <div style={{fontSize:13,fontWeight:800,color:i===0?"#f97316":"#cdd5e0"}}>{r.sixes}</div>
                        <div style={{fontSize:9,color:"#445566"}}>{r.fours||0} fours too</div>
                      </div>
                    }/>
                  ))}
                </div>
              );
            })()}

            {/* Highest Score */}
            {(()=>{
              const hsRows=allPlayersForMvp.map(p=>{
                const s=getPlayerBattingStats(p.id,tMatches);
                return {...s,id:p.id,name:p.name,teamName:p.teamName};
              }).filter(r=>r.best>0).sort((a,b)=>b.best-a.best);
              return hsRows.length>0&&(
                <div style={{...S.card,marginBottom:12}}>
                  <div style={{color:"#4ade80",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8}}>🏅 HIGHEST SCORE</div>
                  {hsRows.slice(0,5).map((r,i)=>(
                    <MiniLeaderRow key={r.id} r={r} i={i} right={
                      <div>
                        <div style={{fontSize:13,fontWeight:800,color:i===0?"#4ade80":"#cdd5e0"}}>{r.best}</div>
                        <div style={{fontSize:9,color:"#445566"}}>{r.hundreds}×💯 {r.fifties}×50</div>
                      </div>
                    }/>
                  ))}
                </div>
              );
            })()}

            {/* Best Bowling SR */}
            {(()=>{
              const bsrRows=allPlayersForMvp.map(p=>{
                const s=getPlayerBowlingStats(p.id,tMatches);
                return {...s,id:p.id,name:p.name,teamName:p.teamName};
              }).filter(r=>r.wickets>=2&&r.sr!=="—").sort((a,b)=>parseFloat(a.sr)-parseFloat(b.sr));
              return bsrRows.length>0&&(
                <div style={{...S.card,marginBottom:12}}>
                  <div style={{color:"#c084fc",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8}}>🎯 BEST BOWLING STRIKE RATE <span style={{color:"#445566",fontWeight:400}}>(min 2 wkts)</span></div>
                  {bsrRows.slice(0,5).map((r,i)=>(
                    <MiniLeaderRow key={r.id} r={r} i={i} right={
                      <div>
                        <div style={{fontSize:13,fontWeight:800,color:i===0?"#c084fc":"#cdd5e0"}}>{r.sr}</div>
                        <div style={{fontSize:9,color:"#445566"}}>{r.wickets}w · {r.bestStr} best</div>
                      </div>
                    }/>
                  ))}
                </div>
              );
            })()}

            {/* 5-wicket hauls */}
            {(()=>{
              const fwRows=allPlayersForMvp.map(p=>{
                const s=getPlayerBowlingStats(p.id,tMatches);
                return {...s,id:p.id,name:p.name,teamName:p.teamName};
              }).filter(r=>(r.best5||0)>0).sort((a,b)=>(b.best5||0)-(a.best5||0));
              return fwRows.length>0&&(
                <div style={{...S.card,marginBottom:12}}>
                  <div style={{color:"#fb7185",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8}}>🌟 5-WICKET HAULS</div>
                  {fwRows.slice(0,5).map((r,i)=>(
                    <MiniLeaderRow key={r.id} r={r} i={i} right={
                      <div>
                        <div style={{fontSize:13,fontWeight:800,color:i===0?"#fb7185":"#cdd5e0"}}>{r.best5}×</div>
                        <div style={{fontSize:9,color:"#445566"}}>{r.bestStr} best · {r.wickets}w total</div>
                      </div>
                    }/>
                  ))}
                </div>
              );
            })()}

            {mvpRows.length===0&&runsRows.length===0&&<div style={S.empty}>No match data yet. Play some matches first!</div>}
          </div>
          );
        })()}
      </div>
    );
  }

  if(showNew) return(
    <div className="af" style={{padding:20}}>
      <div style={S.sectionHeader}>
        <button onClick={()=>setShowNew(false)} style={S.backBtn}>← Back</button>
        <span style={{fontWeight:800,fontSize:16}}>{editId?"Edit Tournament":"New Tournament"}</span>
      </div>
      <div style={{marginBottom:12}}>
        <label style={S.label}>Tournament Name</label>
        <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Summer League 2025" style={S.input}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <div>
          <label style={S.label}>Format</label>

// ─── MATCHES VIEW ─────────────────────────────────────────────────────────────
function MatchesView({db,persist,setView,setActiveMatch,showToast,accent}){
  const [creating,setCreating]=useState(false);
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({team1Id:"",team2Id:"",overs:"20",maxBowlerOvers:"",ground:"",tossWon:"",elected:"",tournamentId:""});
  const [xi1,setXi1]=useState([]); // selected player ids for team1
  const [xi2,setXi2]=useState([]); // selected player ids for team2
  const toggleXi=(id,setter)=>setter(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);

  const goToXiStep=()=>{
    if(!form.team1Id||!form.team2Id){showToast("Select both teams","error");return;}
    if(form.team1Id===form.team2Id){showToast("Teams must differ","error");return;}
    if(!form.overs||isNaN(form.overs)||+form.overs<1){showToast("Enter valid overs","error");return;}
    const t1=db.teams?.find(t=>t.id===form.team1Id);
    const t2=db.teams?.find(t=>t.id===form.team2Id);
    setXi1((t1?.players||[]).map(p=>p.id));
    setXi2((t2?.players||[]).map(p=>p.id));
    setStep(2);
  };

  const createMatch=()=>{
    if(!form.team1Id||!form.team2Id){showToast("Select both teams","error");return;}
    if(form.team1Id===form.team2Id){showToast("Teams must differ","error");return;}
    if(!form.overs||isNaN(form.overs)||+form.overs<1){showToast("Enter valid overs","error");return;}
    if(form.maxBowlerOvers&&(isNaN(form.maxBowlerOvers)||+form.maxBowlerOvers<1||+form.maxBowlerOvers>+form.overs)){
      showToast("Max bowler overs must be between 1 and total overs","error");return;
    }
    const batFirst=form.tossWon&&form.elected==="bat"?form.tossWon:
                   form.tossWon&&form.elected==="field"?(form.tossWon===form.team1Id?form.team2Id:form.team1Id):form.team1Id;
    const bowlFirst=batFirst===form.team1Id?form.team2Id:form.team1Id;
    const rawT1=db.teams?.find(t=>t.id===form.team1Id);
    const rawT2=db.teams?.find(t=>t.id===form.team2Id);
    const squad1=(rawT1?.players||[]).filter(p=>xi1.includes(p.id));
    const squad2=(rawT2?.players||[]).filter(p=>xi2.includes(p.id));
    const matchTeams={
      [form.team1Id]:{...rawT1,players:squad1},
      [form.team2Id]:{...rawT2,players:squad2},
    };
    const maxPlayers=Math.max(squad1.length,squad2.length,1);
    const match={id:uid(),team1Id:form.team1Id,team2Id:form.team2Id,overs:+form.overs,
      maxBowlerOvers:form.maxBowlerOvers?+form.maxBowlerOvers:null,
      ground:form.ground,tossWon:form.tossWon,elected:form.elected,
      tournamentId:form.tournamentId||null,date:new Date().toISOString(),
      matchTeams,maxPlayers,
      innings:[mkInnings(batFirst,bowlFirst),null],currentInnings:0,status:"live"};
    persist({...db,matches:[...(db.matches||[]),match]});
    setActiveMatch(match.id);setView("scoring");showToast("Match started!");
  };

  if(creating){
    if(step===2){
      const t1=db.teams?.find(t=>t.id===form.team1Id);
      const t2=db.teams?.find(t=>t.id===form.team2Id);
      const renderChips=(team,selected,setter)=>(team?.players||[]).map(p=>{
        const sel=selected.includes(p.id);
        return(
          <button key={p.id} onClick={()=>toggleXi(p.id,setter)}
            style={{padding:"5px 12px",borderRadius:20,fontSize:11,cursor:"pointer",fontFamily:"inherit",
              background:sel?`rgba(${hexToRgb(accent)},.18)`:"#162030",
              border:`1px solid ${sel?accent:"#1e2d40"}`,
              color:sel?accent:"#8899aa",fontWeight:sel?700:400,margin:"3px"}}>
            {p.name}
          </button>
        );
      });
      return(
        <div className="af" style={{padding:20}}>
          <div style={S.sectionHeader}>
            <button onClick={()=>setStep(1)} style={S.backBtn}>← Back</button>
            <span style={{fontWeight:800,fontSize:16}}>Pick Playing Squad</span>
          </div>
          <div style={{color:"#8899aa",fontSize:12,marginBottom:16}}>Tap players to toggle. Select as many as you like — all selected by default.</div>
          <div style={{marginBottom:18}}>
            <div style={{fontWeight:700,fontSize:13,color:accent,marginBottom:8}}>
              {t1?.name} <span style={{color:"#8899aa",fontWeight:400,fontSize:11}}>({xi1.length} selected)</span>
            </div>
            <div style={{display:"flex",flexWrap:"wrap"}}>{renderChips(t1,xi1,setXi1)}</div>
          </div>
          <div style={{marginBottom:24}}>
            <div style={{fontWeight:700,fontSize:13,color:accent,marginBottom:8}}>
              {t2?.name} <span style={{color:"#8899aa",fontWeight:400,fontSize:11}}>({xi2.length} selected)</span>
            </div>
            <div style={{display:"flex",flexWrap:"wrap"}}>{renderChips(t2,xi2,setXi2)}</div>
          </div>
          <button onClick={createMatch} style={{...S.primaryBtn(accent),width:"100%",padding:"14px",fontSize:14}}>Start Match 🏏</button>
        </div>
      );
    }
    return(
    <div className="af" style={{padding:20}}>
      <div style={S.sectionHeader}>
        <button onClick={()=>{setCreating(false);setStep(1);}} style={S.backBtn}>← Back</button>
        <span style={{fontWeight:800,fontSize:16}}>New Match</span>
      </div>
      {[["team1Id","Team 1"],["team2Id","Team 2"]].map(([key,label])=>(
        <div key={key} style={{marginBottom:12}}>
          <label style={S.label}>{label}</label>
          <select value={form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} style={S.select}>
            <option value="">Select team…</option>
            {(db.teams||[]).map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
        </div>
      ))}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
        <div>
          <label style={S.label}>Overs</label>
          <input type="number" value={form.overs} min="1" max="100" onChange={e=>setForm(f=>({...f,overs:e.target.value}))} style={S.input}/>
        </div>
        <div>
          <label style={S.label}>Max Bowler Overs</label>
          <input type="number" value={form.maxBowlerOvers} min="1" max={form.overs||100}
            placeholder="No limit"
            onChange={e=>setForm(f=>({...f,maxBowlerOvers:e.target.value}))} style={S.input}/>
        </div>
        <div>
          <label style={S.label}>Ground</label>
          <input value={form.ground} onChange={e=>setForm(f=>({...f,ground:e.target.value}))}
            placeholder="e.g. Wankhede" style={S.input} list="grounds-list"/>
          <datalist id="grounds-list">{(db.grounds||[]).map(g=><option key={g.id} value={g.name}/>)}</datalist>
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <label style={S.label}>Tournament (optional)</label>
        <select value={form.tournamentId} onChange={e=>setForm(f=>({...f,tournamentId:e.target.value}))} style={S.select}>
          <option value="">None</option>
          {(db.tournaments||[]).map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
        </select>
      </div>
      <div style={{marginBottom:12}}>
        <label style={S.label}>Toss Won By</label>
        <select value={form.tossWon} onChange={e=>setForm(f=>({...f,tossWon:e.target.value}))} style={S.select}>
          <option value="">Select…</option>
          {form.team1Id&&<option value={form.team1Id}>{db.teams?.find(t=>t.id===form.team1Id)?.name}</option>}
          {form.team2Id&&<option value={form.team2Id}>{db.teams?.find(t=>t.id===form.team2Id)?.name}</option>}
        </select>
      </div>
      {form.tossWon&&(
        <div style={{marginBottom:14}}>
          <label style={S.label}>Elected To</label>
          <div style={{display:"flex",gap:10}}>
            {["bat","field"].map(e=>(
              <button key={e} onClick={()=>setForm(f=>({...f,elected:e}))}
                style={{...S.secondaryBtn,flex:1,borderColor:form.elected===e?accent:"#1e2d40",color:form.elected===e?accent:"#8899aa"}}>
                {e==="bat"?"Bat First":"Field First"}
              </button>
            ))}
          </div>
        </div>
      )}
      <button onClick={goToXiStep} style={{...S.primaryBtn(accent),width:"100%",marginTop:8}}>Next: Pick Playing Squad →</button>
    </div>
    );
  }

  const matches=sortMatchesChronological(db.matches||[],"desc");
  return(
    <div className="af" style={{padding:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <span style={{fontWeight:800,fontSize:18}}>Matches</span>
        <button onClick={()=>setCreating(true)} style={S.primaryBtn(accent)}>+ New Match</button>
      </div>
      {matches.length===0&&<div style={S.empty}>No matches yet.</div>}
      {matches.map(m=>{
        const t1=db.teams?.find(t=>t.id===m.team1Id),t2=db.teams?.find(t=>t.id===m.team2Id);
        const i1=m.innings?.[0],i2=m.innings?.[1];
        const tourn=m.tournamentId?db.tournaments?.find(t=>t.id===m.tournamentId):null;
        return(
          <div key={m.id} style={{position:"relative"}}>
          <div className="hcard" onClick={()=>{setActiveMatch(m.id);setView("scoring");}}
            style={{...S.card,marginBottom:10,cursor:"pointer",
              borderColor:m.status==="complete"?`rgba(${hexToRgb(accent)},.25)`:"#1e2d40"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <b style={{fontSize:13}}>{t1?.name||"?"} vs {t2?.name||"?"}</b>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:10,color:m.status==="complete"?"#4ade80":"#fbbf24"}}>
                  {m.status==="complete"?"✓ Final":`${m.overs} ov`}
                </span>
                <button onClick={e=>{e.stopPropagation();persist({...db,matches:db.matches.filter(x=>x.id!==m.id)});showToast("Match deleted","warn");}}
                  style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.4)",
                    borderRadius:6,color:"#fca5a5",padding:"2px 7px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>✕</button>
              </div>
            </div>
            {i1&&<div style={{fontSize:11,color:"#cdd5e0"}}>{t1?.name}: {i1.runs}/{i1.wickets} ({ovrStr(i1.balls)})</div>}
            {i2&&<div style={{fontSize:11,color:"#cdd5e0"}}>{t2?.name}: {i2.runs}/{i2.wickets} ({ovrStr(i2.balls)})</div>}
            {m.result&&<div style={{fontSize:11,color:accent,fontWeight:700,marginTop:3}}>{m.result}</div>}
            {m.motm&&(()=>{
              const allP=[...(t1?.players||[]),...(t2?.players||[])];
              const motmP=allP.find(p=>p.id===m.motm);
              return motmP&&<div style={{fontSize:10,color:"#f59e0b",marginTop:2}}>⭐ {motmP.name}</div>;

          </div>
          </div>
        );
      })}
