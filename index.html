  );
}

// ─── SCORING VIEW ─────────────────────────────────────────────────────────────
function ScoringView({db,persist,matchId,showToast,accent,setView}){
  const match=db.matches?.find(m=>m.id===matchId);
  const [showWicket,setShowWicket]=useState(false);
  const [showExtra,setShowExtra]=useState(false);
  const [showBowler,setShowBowler]=useState(false);
  const [showBatPick,setShowBatPick]=useState(null);
  const [showNoBall,setShowNoBall]=useState(false);
  const [showEndInn,setShowEndInn]=useState(false);
  const [wForm,setWForm]=useState({type:"Bowled",dismissedIs:"striker",newBatsman:"",fielder:""});
  const [eForm,setEForm]=useState({type:"Wide",runs:1});
  const [tab,setTab]=useState("bat");
  const [bowlerTab,setBowlerTab]=useState("pick");
  const [spellDraft,setSpellDraft]=useState([]); // [{playerId,overs}]
  const [groupDraft,setGroupDraft]=useState([]); // [{players:[id,...],overs:N}]

  if(!match) return <div style={{padding:20,color:"#ef4444"}}>Match not found.</div>;

  // ── Completed match → show full scorecard ──
  if(match.status==="complete"){
    return <FullScorecard match={match} db={db} accent={accent}
      onBack={()=>setView("matches")}
      persist={persist} showToast={showToast}/>;
  }

  const innIdx=match.currentInnings??0;
  const inn=match.innings?.[innIdx];

  // ── Innings 2 not yet created: show "Start 2nd Innings" screen ──
  if(!inn){
    const inn1=match.innings?.[0];
    const batFirst=db.teams?.find(t=>t.id===inn1?.battingTeamId);
    const bowlFirst=db.teams?.find(t=>t.id===inn1?.bowlingTeamId);
    const target=(inn1?.runs||0)+1;
    const startInn2=()=>{
      const inn2=mkInnings(inn1.bowlingTeamId,inn1.battingTeamId);
      inn2.target=target;
      persist({...db,matches:db.matches.map(m=>m.id===matchId?{...m,innings:[m.innings[0],inn2],currentInnings:1}:m)});
      showToast("2nd innings started!");
    };
    return(
      <div style={{minHeight:"100vh",background:"#060b14",padding:24}}>
        <div style={{...S.card,textAlign:"center",padding:"32px 20px",marginTop:40}}>
          <div style={{fontSize:40,marginBottom:12}}>🏏</div>
          <div style={{fontWeight:800,fontSize:18,marginBottom:6}}>1st Innings Complete</div>
          <div style={{color:"#8899aa",fontSize:13,marginBottom:20}}>
            {batFirst?.name||"Team 1"} scored <b style={{color:accent}}>{inn1?.runs}/{inn1?.wickets}</b>
          </div>
          <div style={{background:`rgba(${hexToRgb(accent)},.08)`,border:`1px solid rgba(${hexToRgb(accent)},.3)`,
            borderRadius:10,padding:"12px 16px",marginBottom:24,fontSize:13}}>
            <div style={{color:"#8899aa",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:4}}>TARGET</div>
            <div style={{fontSize:36,fontWeight:900,color:accent}}>{target}</div>
            <div style={{color:"#8899aa",fontSize:11,marginTop:2}}>{bowlFirst?.name||"Team 2"} need {target} to win</div>
          </div>
          <button onClick={startInn2}
            style={{...S.primaryBtn(accent),width:"100%",padding:"14px",fontSize:14}}>
            Start 2nd Innings →
          </button>
        </div>
      </div>
    );
  }

  const _batTeamFull=db.teams?.find(t=>t.id===inn.battingTeamId);
  const _bowlTeamFull=db.teams?.find(t=>t.id===inn.bowlingTeamId);
  const batTeam=match.matchTeams?.[inn.battingTeamId]||_batTeamFull;
  const bowlTeam=match.matchTeams?.[inn.bowlingTeamId]||_bowlTeamFull;
  const strikerName=batTeam?.players?.find(p=>p.id===inn.onStrike)?.name||"—";
  const nStrikeName=batTeam?.players?.find(p=>p.id===inn.nonStrike)?.name||"—";
  const bowlerName=bowlTeam?.players?.find(p=>p.id===inn.currentOver?.bowlerId)?.name||"—";
  const rr=inn.balls>0?(inn.runs/inn.balls*6):0;
  const totalExtra=Object.values(inn.extras||{}).reduce((a,b)=>a+b,0);
  const canUndo=inn.history?.length>0;
  const availBat=(batTeam?.players||[]).filter(p=>!inn.batsmen[p.id]?.out);

  // Chase stats (innings 2 only)
  const isChase = innIdx===1 && inn.target!=null;
  const runsNeeded = isChase ? Math.max(0, inn.target - inn.runs) : null;
  const totalBalls = match.overs * 6;
  const ballsRemaining = isChase ? Math.max(0, totalBalls - inn.balls) : null;
  const rrr = isChase && ballsRemaining > 0 ? (runsNeeded / ballsRemaining * 6) : null;

  const upd=(newInn)=>{
    persist({...db,matches:db.matches.map(m=>m.id===matchId?{...m,innings:m.innings.map((x,i)=>i===innIdx?newInn:x)}:m)});
  };

  const autoEndInnings=(completedInn)=>{
    if(innIdx===0){
      persist({...db,matches:db.matches.map(m=>m.id===matchId?
        {...m,innings:[completedInn,null],currentInnings:1}:m)});
      showToast("Innings ended","warn");
    } else {
      const i1=match.innings[0], i2=completedInn;
      const bat1Team=match.matchTeams?.[i1.battingTeamId]||db.teams?.find(t=>t.id===i1.battingTeamId);
      const bat2Team=match.matchTeams?.[i2.battingTeamId]||db.teams?.find(t=>t.id===i2.battingTeamId);
      const squadSize=match.maxPlayers||10;
      let result="";
      if(i2.runs>i1.runs){
        const wktsLeft=squadSize-i2.wickets;
        const totalB=match.overs*6;
        const ballsLeft=totalB-i2.balls;
        result=`${bat2Team?.name||"Team 2"} won by ${wktsLeft} wicket${wktsLeft!==1?"s":""}${ballsLeft>0?` (${ballsLeft} ball${ballsLeft!==1?"s":""} remaining)`:""}`;
      } else if(i1.runs>i2.runs){
        result=`${bat1Team?.name||"Team 1"} won by ${i1.runs-i2.runs} run${i1.runs-i2.runs!==1?"s":""}`;
      } else {
        result="Match tied";
      }
      persist({...db,matches:db.matches.map(m=>m.id===matchId?
        {...m,innings:[m.innings[0],completedInn],status:"complete",result}:m)});
      showToast("Match complete!","warn");
    }
  };

  // Smart update: tries spell plan auto-advance when over just ended
  const updOrAdvance=(newInn)=>{
    const overJustEnded=!newInn.currentOver?.bowlerId&&(newInn.currentOver?.balls||[]).length===0&&newInn.overs?.length>0;
    if(overJustEnded && autoAdvanceBowler(newInn)) return;
    upd(newInn);
  };

  const handleRun=r=>{
    if(!inn.onStrike){showToast("Set striker","warn");return;}
    if(!inn.currentOver?.bowlerId){showToast("Set bowler","warn");return;}
    let newInnR=applyBall({...inn,_maxOvers:match.overs,_maxPlayers:match.maxPlayers||10},{type:"run",runs:r});
    // Chase won check
    if(innIdx===1 && newInnR.target!=null && newInnR.runs>=newInnR.target) newInnR={...newInnR,completed:true};
    if(newInnR.completed) autoEndInnings(newInnR); else updOrAdvance(newInnR);
  };
  const handleNoBall=scored=>{
    if(!inn.currentOver?.bowlerId){showToast("Set bowler","warn");return;}
    updOrAdvance(applyNoBall(inn,scored));setShowNoBall(false);showToast(`No Ball +${1+scored}`);
  };
  const handleExtra=()=>{
    if(!inn.currentOver?.bowlerId){showToast("Set bowler","warn");return;}
    if(eForm.type==="No Ball"){setShowNoBall(true);setShowExtra(false);return;}
    let newInnE=applyBall({...inn,_maxOvers:match.overs,_maxPlayers:match.maxPlayers||10},{type:"extra",extraType:eForm.type,runs:eForm.runs});
    if(innIdx===1 && newInnE.target!=null && newInnE.runs>=newInnE.target) newInnE={...newInnE,completed:true};
    setShowExtra(false);showToast(eForm.type);
    if(newInnE.completed) autoEndInnings(newInnE); else updOrAdvance(newInnE);
  };
  const handleWicket=()=>{
    if(!inn.onStrike){showToast("Set striker","warn");return;}
    if(!inn.currentOver?.bowlerId){showToast("Set bowler","warn");return;}
    const dismissedId=wForm.dismissedIs==="striker"?inn.onStrike:inn.nonStrike;
    const _eligibleBat=availBat.filter(p=>p.id!==inn.onStrike&&p.id!==inn.nonStrike);
    if(!wForm.newBatsman&&inn.wickets<(match.maxPlayers||10)-1&&_eligibleBat.length>0){showToast("Select new batsman","warn");return;}
    const newInnW=applyBall({...inn,_maxOvers:match.overs,_maxPlayers:match.maxPlayers||10},{type:"wicket",wicketType:wForm.type,dismissedId,newBatsmanId:wForm.newBatsman,runs:0,fielderId:wForm.fielder||null});
    setShowWicket(false);setWForm({type:"Bowled",dismissedIs:"striker",newBatsman:"",fielder:""});
    showToast(`Wicket! ${wForm.type}`,"warn");
    if(newInnW.completed) autoEndInnings(newInnW); else updOrAdvance(newInnW);
  };
  const setBowler=id=>{
    const maxOv=match.maxBowlerOvers;
    if(maxOv){
      const completedOvsByBowler=(inn.overs||[]).filter(ov=>ov.bowlerId===id).length;
      if(completedOvsByBowler>=maxOv){
        showToast(`${bowlTeam?.players?.find(p=>p.id===id)?.name||"Bowler"} has bowled their ${maxOv}-over quota`,"error");
        return;
      }
    }
    // Prevent same bowler bowling consecutive overs
    const lastOver=inn.overs?.[inn.overs.length-1];
    if(lastOver?.bowlerId===id&&inn.currentOver?.balls?.length===0){
      showToast("Same bowler cannot bowl consecutive overs","error");
      return;
    }
    const ni={...inn,currentOver:{...inn.currentOver,bowlerId:id}};
    if(!ni.bowlers[id]) ni.bowlers={...ni.bowlers,[id]:{id,balls:0,runs:0,wickets:0,wides:0,noBalls:0}};
    upd(ni);setShowBowler(false);
  };

  // Derive a stable key for the bowling team's current player set
  const bowlSquadKey = (bowlTeam?.players||[]).map(p=>p.id).sort().join(",");

  // Save spell plan to the match (per innings index) AND to teamSpellPlans
  const saveSpellPlan=(plan)=>{
    const spellPlans={...(match.spellPlans||{}),[innIdx]:plan};
    // Also persist to teamSpellPlans so it can be reused in future matches
    const teamId=inn.bowlingTeamId;
    const teamSpellPlans={...(db.teamSpellPlans||{})};
    if(plan&&( (Array.isArray(plan)&&plan.length>0) || (plan.type==="rotation"&&(plan.slots||[]).length>0) || (plan.type==="group"&&(plan.groups||[]).length>0) )){
      teamSpellPlans[teamId]={...(teamSpellPlans[teamId]||{}), [bowlSquadKey]:{plan, savedAt:Date.now()} };
    }
    persist({...db, matches:db.matches.map(m=>m.id===matchId?{...m,spellPlans}:m), teamSpellPlans });
    setSpellDraft([]);setGroupDraft([]);setShowBowler(false);
    showToast("Plan saved & stored for team");
  };

  // Look up saved plan for this team+squad combo
  const savedTeamPlan=(db.teamSpellPlans||{})[inn.bowlingTeamId]?.[bowlSquadKey]?.plan||null;

  // Current plan for this innings: {type:"rotation",slots:[{playerId,overs}]}
  //                              or {type:"group",   groups:[{players:[id],overs:N}]}
  //                              or [] (legacy / none)
  const spellPlanRaw=(match.spellPlans||{})[innIdx]||null;
  const spellPlan=spellPlanRaw; // may be null, [], or object
  const hasSpellPlan=spellPlanRaw&&(
    Array.isArray(spellPlanRaw)?spellPlanRaw.length>0
    :spellPlanRaw.type==="rotation"?spellPlanRaw.slots?.length>0
    :spellPlanRaw.type==="group"?spellPlanRaw.groups?.length>0
    :false
  );

  // Build a flat sequence of bowler IDs from the active plan
  const buildRotation=(plan,usedMap,lastBowlerId,completedOvers)=>{
    if(!plan) return [];
    // Legacy array format
    if(Array.isArray(plan)){
      const maxSlot=Math.max(...plan.map(s=>s.overs));
      const seq=[];
      for(let r=0;r<maxSlot;r++) for(const s of plan) if(r<s.overs) seq.push(s.playerId);
      return seq;
    }
    if(plan.type==="rotation"){
      const slots=plan.slots||[];
      const maxSlot=Math.max(1,...slots.map(s=>s.overs));
      const seq=[];
      for(let r=0;r<maxSlot;r++) for(const s of slots) if(r<s.overs) seq.push(s.playerId);
      return seq;
    }
    if(plan.type==="group"){
      // Build flat sequence group by group, round-robin within each group
      const seq=[];
      for(const g of (plan.groups||[])){
        const players=g.players||[];
        if(!players.length) continue;
        for(let o=0;o<(g.overs||0);o++) seq.push(players[o%players.length]);
      }
      return seq;
    }
    return [];
  };

  const autoAdvanceBowler=(currentInn)=>{
    if(!hasSpellPlan) return false;
    const completedOvers=(currentInn.overs||[]).length;
    const lastBowlerId=currentInn.overs?.[currentInn.overs.length-1]?.bowlerId;
    const usedMap={};
    (currentInn.overs||[]).forEach(ov=>{ usedMap[ov.bowlerId]=(usedMap[ov.bowlerId]||0)+1; });
    const rotation=buildRotation(spellPlanRaw,usedMap,lastBowlerId,completedOvers);
    if(!rotation.length) return false;
    const startIdx=completedOvers%(rotation.length);
    for(let offset=0;offset<rotation.length;offset++){
      const id=rotation[(startIdx+offset)%rotation.length];
      if(id===lastBowlerId) continue;
      const maxOv=match.maxBowlerOvers;
      if(maxOv&&(usedMap[id]||0)>=maxOv) continue;
      const ni={...currentInn,currentOver:{...currentInn.currentOver,bowlerId:id}};
      if(!ni.bowlers[id]) ni.bowlers={...ni.bowlers,[id]:{id,balls:0,runs:0,wickets:0,wides:0,noBalls:0}};
      persist({...db,matches:db.matches.map(m=>m.id===matchId?{...m,innings:m.innings.map((x,i)=>i===innIdx?ni:x)}:m)});
      return true;
    }
    return false;
  };
  const setBatsman=(id,role)=>{
    const ni={...inn};
    if(role==="strike") ni.onStrike=id; else ni.nonStrike=id;
    if(!ni.batsmen[id]) ni.batsmen={...ni.batsmen,[id]:{id,runs:0,balls:0,fours:0,sixes:0,out:false,how:""}};
    ni.currentPartnership={bat1:ni.onStrike,bat2:ni.nonStrike,runs:0,balls:0};
    upd(ni);setShowBatPick(null);
  };


  const endInnings=()=>setShowEndInn(true);

  const confirmEndInnings=()=>{
    setShowEndInn(false);
    const completedInn={...inn,completed:true};
    if(innIdx===0){
      // End inn 1 → move to inn 2 placeholder (null triggers the "Start 2nd Innings" screen)
      persist({...db,matches:db.matches.map(m=>m.id===matchId?
        {...m,innings:[completedInn,null],currentInnings:1}:m)});
      showToast("Innings 1 ended","warn");
    } else {
      // End inn 2 → match complete; compute result string
      const i1=match.innings[0], i2=completedInn;
      const bat1Team=match.matchTeams?.[i1.battingTeamId]||db.teams?.find(t=>t.id===i1.battingTeamId);
      const bat2Team=match.matchTeams?.[i2.battingTeamId]||db.teams?.find(t=>t.id===i2.battingTeamId);
      const squadSize2=match.maxPlayers||10;
      let result="";
      if(i2.runs>i1.runs){
        const wktsLeft=squadSize2-i2.wickets;
        const totalB=match.overs*6;
        const ballsLeft=totalB-i2.balls;
        result=`${bat2Team?.name||"Team 2"} won by ${wktsLeft} wicket${wktsLeft!==1?"s":""}${ballsLeft>0?` (${ballsLeft} ball${ballsLeft!==1?"s":""} remaining)`:""}`;
      } else if(i1.runs>i2.runs){
        result=`${bat1Team?.name||"Team 1"} won by ${i1.runs-i2.runs} run${i1.runs-i2.runs!==1?"s":""}`;
      } else {
        result="Match tied";
      }
      persist({...db,matches:db.matches.map(m=>m.id===matchId?
        {...m,innings:[m.innings[0],completedInn],status:"complete",result}:m)});
      showToast("Match complete!","warn");
    }
  };

  const innNotStarted = inn.balls===0 && !inn.onStrike && !inn.nonStrike;

  const ballDot = (b,i) => {
    const bg=b.type==="wide"?"#7c3aed":b.type==="noBall"?"#dc2626":b.type==="wicket"?"#ef4444":
             b.type==="bye"||b.type==="legbye"?"#0891b2":b.runs===6?"#f59e0b":b.runs===4?"#22c55e":"#1e2d40";
    const label=b.type==="wide"?"Wd":b.type==="noBall"?`NB${b.scored>0?"+"+b.scored:""}`:b.type==="wicket"?"W":b.runs;
    return(
      <div key={i} style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",
        justifyContent:"center",fontSize:10,fontWeight:800,background:bg,color:"#fff",
        border:"1px solid rgba(255,255,255,.08)"}}>{label}</div>
    );
  };

  return(
    <div style={{minHeight:"100vh",background:"#060b14"}}>
      {/* Start Innings Banner */}
      {innNotStarted&&(
        <div style={{background:`rgba(${hexToRgb(accent)},.1)`,borderBottom:`1px solid rgba(${hexToRgb(accent)},.3)`,
          padding:"10px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <div>
            <div style={{fontWeight:700,fontSize:12,color:accent}}>🏏 Innings {innIdx+1} — Ready to Start</div>
            <div style={{fontSize:11,color:"#8899aa",marginTop:2}}>Set openers (tap names below) and bowler to begin</div>
          </div>
          <div style={{fontSize:20}}>▼</div>
        </div>
      )}
      {/* Scoreboard */}
      <div style={{background:"#0d1424",borderBottom:`2px solid rgba(${hexToRgb(accent)},.3)`,padding:"14px 18px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{color:"#8899aa",fontSize:10,fontWeight:700,letterSpacing:2}}>INN {innIdx+1} · {batTeam?.name||"BATTING"}</div>
            <div style={{display:"flex",alignItems:"baseline",gap:8,marginTop:2}}>
              <span style={{fontSize:40,fontWeight:900,color:accent,fontFamily:"Georgia,serif"}}>{inn.runs}/{inn.wickets}</span>
              <span style={{color:"#8899aa",fontSize:15}}>({ovrStr(inn.balls)})</span>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:isChase&&rrr!=null?(rr>=rrr?"#4ade80":rr>=rrr-2?"#fbbf24":"#ef4444"):rrColor(rr),fontSize:20,fontWeight:800}}>{rr.toFixed(2)}<span style={{fontSize:10,color:"#8899aa"}}> RR</span></div>
            <div style={{color:"#8899aa",fontSize:10,marginTop:2}}>Extras: {totalExtra}</div>
            {match.maxBowlerOvers&&<div style={{color:"#8899aa",fontSize:10,marginTop:1}}>Max: {match.maxBowlerOvers} ov/bowl</div>}
          </div>
        </div>
        <div style={{display:"flex",gap:5,marginTop:10,flexWrap:"wrap"}}>
          {(inn.currentOver?.balls||[]).map(ballDot)}
          {!(inn.currentOver?.balls||[]).length&&<div style={{color:"#445566",fontSize:11}}>Over not started</div>}
        </div>
        {/* Chase panel — innings 2 only */}
        {isChase&&(
          <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid rgba(255,255,255,.06)"}}>
            {runsNeeded<=0
              ? <div style={{textAlign:"center",fontWeight:800,fontSize:14,color:"#4ade80"}}>🏆 Target reached!</div>
              : (
                <>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:8}}>
                    <div>
                      <div style={{color:"#8899aa",fontSize:9,fontWeight:700,letterSpacing:1.5}}>NEED</div>
                      <div style={{fontSize:26,fontWeight:900,color:accent,lineHeight:1}}>
                        {runsNeeded}
                        <span style={{fontSize:11,color:"#8899aa",fontWeight:400}}> runs</span>
                      </div>
                      <div style={{color:"#8899aa",fontSize:10,marginTop:1}}>off {ballsRemaining} ball{ballsRemaining!==1?"s":""}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{color:"#8899aa",fontSize:9,fontWeight:700,letterSpacing:1.5,marginBottom:2}}>RRR</div>
                      <div style={{fontSize:22,fontWeight:800,color:rrr<=rr?"#4ade80":rrr<=rr+2?"#fbbf24":"#ef4444"}}>
                        {rrr!=null?rrr.toFixed(2):"—"}
                      </div>
                      <div style={{color:"#8899aa",fontSize:9,marginTop:1}}>
                        CRR <span style={{color:rr>=rrr?"#4ade80":rr>=rrr-2?"#fbbf24":"#ef4444"}}>{rr.toFixed(2)}</span>
                      </div>
                    </div>
                  </div>
                  {/* Progress bar */}
                  {(()=>{
                    const pct=Math.min(100,(inn.runs/(inn.target||1))*100);
                    return(
                      <div style={{height:4,background:"#1e2d40",borderRadius:2,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pct}%`,
                          background:pct>=100?"#4ade80":pct>=70?accent:"#fb923c",
                          borderRadius:2,transition:"width .3s"}}/>
                      </div>
                    );
                  })()}
                </>
              )
            }
          </div>
        )}
      </div>

      {/* Batsmen & bowler strip */}
      <div style={{background:"#0a1020",padding:"10px 14px",borderBottom:"1px solid #1e2d40",display:"flex",gap:8}}>
        {/* Striker */}
        {(()=>{
          const pl=batTeam?.players?.find(p=>p.id===inn.onStrike);
          const s=inn.batsmen[inn.onStrike];
          const empty=!inn.onStrike;
          return(
            <button onClick={()=>setShowBatPick("strike")}
              style={{flex:1,background:empty?`rgba(${hexToRgb(accent)},.07)`:`rgba(${hexToRgb(accent)},.13)`,
                border:`1.5px solid ${empty?"#1e3a2a":accent}`,
                borderRadius:10,padding:"10px 10px",cursor:"pointer",textAlign:"left",minHeight:64,
                display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
              <div style={{fontSize:9,fontWeight:800,letterSpacing:1.2,color:accent,marginBottom:3}}>⚡ STRIKER</div>
              {empty
                ? <div style={{color:"#4ade80",fontWeight:700,fontSize:13,opacity:.7}}>Tap to set</div>
                : <>
                    <div style={{color:"#e2e8f0",fontWeight:800,fontSize:14,lineHeight:1.2,wordBreak:"break-word"}}>{pl?.name||"?"}</div>
                    {s&&<div style={{color:"#8899aa",fontSize:10,marginTop:3,fontWeight:600}}>
                      <span style={{color:"#e2e8f0",fontWeight:800}}>{s.runs}</span>
                      <span style={{opacity:.6}}>({s.balls})</span>
                      <span style={{marginLeft:5,color:"#4ade80"}}>4s:{s.fours}</span>
                      <span style={{marginLeft:4,color:"#fbbf24"}}>6s:{s.sixes}</span>
                    </div>}
                  </>
              }
            </button>
          );
        })()}
        {/* Non-striker */}
        {(()=>{
          const pl=batTeam?.players?.find(p=>p.id===inn.nonStrike);
          const s=inn.batsmen[inn.nonStrike];
          const empty=!inn.nonStrike;
          return(
            <button onClick={()=>setShowBatPick("nonStrike")}
              style={{flex:1,background:empty?"rgba(255,255,255,.03)":"rgba(255,255,255,.06)",
                border:`1.5px solid ${empty?"#1e2d40":"#334155"}`,
                borderRadius:10,padding:"10px 10px",cursor:"pointer",textAlign:"left",minHeight:64,
                display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
              <div style={{fontSize:9,fontWeight:800,letterSpacing:1.2,color:"#8899aa",marginBottom:3}}>NON-STRIKE</div>
              {empty
                ? <div style={{color:"#556677",fontWeight:700,fontSize:13}}>Tap to set</div>
                : <>
                    <div style={{color:"#cdd5e0",fontWeight:700,fontSize:14,lineHeight:1.2,wordBreak:"break-word"}}>{pl?.name||"?"}</div>
                    {s&&<div style={{color:"#8899aa",fontSize:10,marginTop:3,fontWeight:600}}>
                      <span style={{color:"#cdd5e0",fontWeight:800}}>{s.runs}</span>
                      <span style={{opacity:.6}}>({s.balls})</span>
                      <span style={{marginLeft:5,color:"#4ade80"}}>4s:{s.fours}</span>
                      <span style={{marginLeft:4,color:"#fbbf24"}}>6s:{s.sixes}</span>
                    </div>}
                  </>
              }
            </button>
          );
        })()}
        {/* Bowler */}
        {(()=>{
          const bs=inn.bowlers[inn.currentOver?.bowlerId];
          const empty=!inn.currentOver?.bowlerId;
          return(
            <button onClick={()=>setShowBowler(true)}
              style={{flex:1,background:empty?"rgba(167,139,250,.06)":"rgba(167,139,250,.1)",
                border:`1.5px solid ${empty?"#2a1f40":"#a78bfa"}`,
                borderRadius:10,padding:"10px 10px",cursor:"pointer",textAlign:"left",minHeight:64,
                display:"flex",flexDirection:"column",justifyContent:"space-between",position:"relative"}}>
              <div style={{fontSize:9,fontWeight:800,letterSpacing:1.2,color:"#a78bfa",marginBottom:3}}>🎳 BOWLER</div>
              {empty
                ? <div style={{color:"#a78bfa",fontWeight:700,fontSize:13,opacity:.7}}>
                    {hasSpellPlan&&!inn.currentOver?.bowlerId
                      ? <span style={{color:accent,fontWeight:800}} onClick={e=>{e.stopPropagation();autoAdvanceBowler(inn);}}>▶ Start</span>
                      : "Tap to set"}
                  </div>
                : <>
                    <div style={{color:"#e2e8f0",fontWeight:800,fontSize:14,lineHeight:1.2,wordBreak:"break-word"}}>{bowlerName}</div>
                    {bs&&<div style={{color:"#8899aa",fontSize:10,marginTop:3,fontWeight:600}}>
                      <span style={{color:"#e2e8f0"}}>{ovrStr(bs.balls)}</span>
                      <span style={{opacity:.6}}> ov </span>
                      <span style={{color:"#ef4444"}}>{bs.wickets}w</span>
                      <span style={{marginLeft:4,opacity:.7}}>{bs.runs}r</span>
                    </div>}
                  </>
              }
              {hasSpellPlan&&(
                <div style={{position:"absolute",top:5,right:7,fontSize:8,color:"#a78bfa",fontWeight:800,opacity:.8}}>⟳</div>
              )}
            </button>
          );
        })()}
      </div>
      {/* Rotation pill row */}
      {true&&(
        <div style={{background:"#060d18",padding:"5px 14px",borderBottom:"1px solid #0d1424",display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>{setShowBowler(true);setBowlerTab("spell");}}
            style={{padding:"3px 10px",borderRadius:6,border:`1px solid ${hasSpellPlan?"#a78bfa":savedTeamPlan?"rgba(245,196,66,.5)":"#1e2d40"}`,
              background:hasSpellPlan?`rgba(167,139,250,.1)`:savedTeamPlan?`rgba(245,196,66,.08)`:"transparent",
              color:hasSpellPlan?"#a78bfa":savedTeamPlan?"#fbbf24":"#445566",fontSize:10,fontWeight:700,cursor:"pointer"}}>
            {hasSpellPlan?"⟳ Rotation active":savedTeamPlan?"💾 Load Team Plan":"⟳ Plan Rotation"}
          </button>
          {hasSpellPlan&&!inn.currentOver?.bowlerId&&(
            <button onClick={()=>autoAdvanceBowler(inn)}
              style={{padding:"3px 12px",borderRadius:6,border:"none",
                background:`rgba(${hexToRgb(accent)},.85)`,
                color:"#000",fontSize:10,fontWeight:800,cursor:"pointer"}}>
              ▶ Start Rotation
            </button>
          )}
          {hasSpellPlan&&(
            <span style={{marginLeft:"auto",fontSize:9,color:"#445566"}}>
              {(()=>{
                if(!spellPlanRaw) return "";
                if(spellPlanRaw.type==="rotation"){
                  return (spellPlanRaw.slots||[]).map(s=>{
                    const pl=bowlTeam?.players?.find(p=>p.id===s.playerId);
                    return pl?`${pl.name.split(" ")[0]} ×${s.overs}`:"";
                  }).filter(Boolean).join(" · ");
                }
                if(spellPlanRaw.type==="group"){
                  return (spellPlanRaw.groups||[]).map((g,i)=>`G${i+1}:${g.overs}ov`).join(" → ");
                }
                if(Array.isArray(spellPlanRaw)){
                  return spellPlanRaw.map(s=>{
                    const pl=bowlTeam?.players?.find(p=>p.id===s.playerId);
                    return pl?`${pl.name.split(" ")[0]} ×${s.overs}`:"";
                  }).filter(Boolean).join(" · ");
                }
                return "";
              })()}
            </span>
          )}
        </div>
      )}

      {/* Run buttons */}

                  style={{...S.secondaryBtn,borderColor:eForm.type===e?accent:"#1e2d40",color:eForm.type===e?accent:"#8899aa"}}>

              ))}
            </div>
          </div>
          {(eForm.type==="Bye"||eForm.type==="Leg Bye")&&(
            <div style={{marginBottom:12}}>
              <label style={S.label}>Runs</label>

        </Modal>

      {showNoBall&&(

          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
            {[0,1,2,3,4,5,6].map(r=>(
              <button key={r} onClick={()=>handleNoBall(r)}
                style={{height:50,borderRadius:10,border:`1px solid rgba(${hexToRgb(accent)},.3)`,
                  background:"#162030",color:r===4||r===6?accent:"#e2e8f0",fontWeight:900,fontSize:18,cursor:"pointer",fontFamily:"inherit"}}>
                {r}
              </button>

            {[["pick","Pick Now"],["spell","Plan Rotation"],["group","Group Spells"]].map(([id,label])=>(
              <button key={id} onClick={()=>setBowlerTab(id)}

                style={{flex:1,padding:"7px 4px",background:"transparent",border:"none",cursor:"pointer",
                  color:bowlerTab===id?accent:"#8899aa",fontSize:11,fontWeight:700,letterSpacing:.5,fontFamily:"inherit"}}>
                {label}{id==="spell"&&hasSpellPlan&&<span style={{marginLeft:4,fontSize:9,color:accent}}>✓</span>}
              </button>

          {bowlerTab==="pick"&&(

              {(bowlTeam?.players||[]).map(p=>{

                const lastOver=inn.overs?.[inn.overs.length-1];
                const isConsecutive=lastOver?.bowlerId===p.id&&inn.currentOver?.balls?.length===0;
                const blocked=atQuota||isConsecutive;
                return(
                  <div key={p.id} className={blocked?"":"pl-row"} onClick={()=>!blocked&&setBowler(p.id)}
                    style={{padding:"10px 12px",cursor:blocked?"not-allowed":"pointer",borderRadius:8,
                      display:"flex",justifyContent:"space-between",alignItems:"center",
                      opacity:blocked?0.4:1,

                    <div>
                      <div style={{fontWeight:600,fontSize:13,display:"flex",alignItems:"center",gap:6}}>

                          padding:"1px 5px",borderRadius:4,fontWeight:700}}>QUOTA FULL</span>}

                          padding:"1px 5px",borderRadius:4,fontWeight:700}}>PREV OVER</span>}

                      <div style={{color:"#8899aa",fontSize:10}}>{p.role}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
                      {inn.bowlers[p.id]&&<span style={{color:"#8899aa",fontSize:11}}>

                      </span>}
                      {match.maxBowlerOvers&&(
                        <span style={{fontSize:10,color:atQuota?"#ef4444":completedOvs>0?accent:"#445566"}}>
                          {completedOvs}/{match.maxBowlerOvers} ov
                        </span>
                      )}
                      {inn.currentOver?.bowlerId===p.id&&<span style={{color:accent}}>✓</span>}
                    </div>
                  </div>
                );
              })}
            </>
          )}

          {/* ── PLAN SPELLS TAB ── */}
          {bowlerTab==="spell"&&(()=>{
            // Use spellDraft if editing, otherwise seed from saved plan
            const savedSlots=spellPlanRaw?.type==="rotation"?(spellPlanRaw.slots||[]):Array.isArray(spellPlanRaw)?(spellPlanRaw||[]):[];
            const draft=spellDraft.length>0?spellDraft:savedSlots.map(s=>({...s}));
            const totalPlanned=draft.reduce((s,x)=>s+(x.overs||0),0);
            const addRow=()=>setSpellDraft([...draft,{playerId:"",overs:1}]);
            const removeRow=(i)=>setSpellDraft(draft.filter((_,j)=>j!==i));
            const setRow=(i,key,val)=>setSpellDraft(draft.map((r,j)=>j===i?{...r,[key]:val}:r));
            return(
              <div>
                <div style={{color:"#8899aa",fontSize:11,marginBottom:10}}>

                  {hasSpellPlan&&<span style={{color:accent,fontWeight:700}}> Rotation active ✓</span>}
                </div>
                {/* Load saved team plan banner */}
                {savedTeamPlan&&!hasSpellPlan&&(
                  <div style={{marginBottom:12,padding:"10px 12px",background:`rgba(${hexToRgb(accent)},.08)`,
                    border:`1px solid rgba(${hexToRgb(accent)},.3)`,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:11,fontWeight:700,color:accent}}>💾 Saved plan for this team</div>
                      <div style={{fontSize:9,color:"#8899aa",marginTop:2}}>
                        {savedTeamPlan.type==="rotation"
                          ?(savedTeamPlan.slots||[]).map(s=>{const pl=bowlTeam?.players?.find(p=>p.id===s.playerId);return pl?`${pl.name.split(" ")[0]} ×${s.overs}`:null;}).filter(Boolean).join(" · ")
                          :savedTeamPlan.type==="group"
                          ?(savedTeamPlan.groups||[]).map((g,i)=>`G${i+1}: ${g.players.map(id=>bowlTeam?.players?.find(p=>p.id===id)?.name.split(" ")[0]||"?").join("/")} ×${g.overs}ov`).join(" → ")
                          :""}
                      </div>
                    </div>
                    <button onClick={()=>{ saveSpellPlan(savedTeamPlan); setBowlerTab("pick"); }}
                      style={{...S.primaryBtn(accent),padding:"6px 12px",fontSize:11,flexShrink:0}}>
                      Load →
                    </button>
                  </div>
                )}
                {draft.map((row,i)=>(
                  <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
                    <div style={{width:18,height:18,borderRadius:"50%",background:`rgba(${hexToRgb(accent)},.15)`,
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:accent,flexShrink:0}}>
                      {i+1}
                    </div>
                    <select value={row.playerId}
                      onChange={e=>setRow(i,"playerId",e.target.value)}
                      style={{...S.select,flex:2,padding:"6px 8px",fontSize:12}}>
                      <option value="">Pick bowler…</option>
                      {(bowlTeam?.players||[]).map(p=>(
                        <option key={p.id} value={p.id}>{p.name}</option>
                      ))}
                    </select>
                    <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                      <button onClick={()=>setRow(i,"overs",Math.max(1,(row.overs||1)-1))}
                        style={{...S.iconBtn,padding:"4px 8px",fontSize:14,lineHeight:1}}>−</button>
                      <span style={{minWidth:28,textAlign:"center",fontWeight:700,fontSize:13,color:accent}}>
                        {row.overs||1}
                      </span>
                      <button onClick={()=>setRow(i,"overs",(row.overs||1)+1)}
                        style={{...S.iconBtn,padding:"4px 8px",fontSize:14,lineHeight:1}}>+</button>
                      <span style={{fontSize:10,color:"#556677",marginLeft:2}}>ov</span>
                    </div>
                    <button onClick={()=>removeRow(i)}
                      style={{...S.iconBtn,color:"#ef4444",padding:"4px 8px",flexShrink:0}}>✕</button>
                  </div>
                ))}
                <button onClick={addRow}
                  style={{...S.secondaryBtn,width:"100%",marginBottom:14,fontSize:12}}>
                  + Add Bowler
                </button>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  marginBottom:12,padding:"8px 10px",background:"rgba(255,255,255,.03)",borderRadius:8,
                  border:"1px solid #1e2d40",fontSize:11,color:"#8899aa"}}>
                  <span>Total overs planned:</span>
                  <span style={{fontWeight:800,color:totalPlanned===match.overs?accent:totalPlanned>match.overs?"#ef4444":"#8899aa"}}>

                    {totalPlanned>match.overs&&" (over limit!)"}

                <div style={{display:"flex",gap:8}}>
                  {hasSpellPlan&&(
                    <button onClick={()=>{saveSpellPlan([]);setBowlerTab("pick");}}
                      style={{...S.secondaryBtn,flex:1,fontSize:11,color:"#ef4444",borderColor:"rgba(239,68,68,.3)"}}>
                      Clear Plan
                    </button>

                    onClick={()=>{
                      const valid=draft.filter(r=>r.playerId&&r.overs>0);
                      if(!valid.length){showToast("Add at least one bowler","error");return;}
                      saveSpellPlan({type:"rotation",slots:valid});
                      setBowlerTab("pick");
                    }}
                    style={{...S.primaryBtn(accent),flex:2}}>
                    Save Spell Plan
                  </button>
                </div>
              </div>
            );
          })()}
          {/* ── GROUP SPELLS TAB ── */}
          {bowlerTab==="group"&&(()=>{
            const savedGroups=spellPlanRaw?.type==="group"?(spellPlanRaw.groups||[]):[];
            const draft=groupDraft.length>0?groupDraft:savedGroups.map(g=>({...g,players:[...g.players]}));
            const totalPlanned=draft.reduce((s,g)=>s+(g.overs||0),0);
            const addGroup=()=>setGroupDraft([...draft,{players:[],overs:2}]);
            const removeGroup=(i)=>setGroupDraft(draft.filter((_,j)=>j!==i));
            const setGroupOvers=(i,v)=>setGroupDraft(draft.map((g,j)=>j===i?{...g,overs:Math.max(1,v)}:g));
            const togglePlayer=(gi,pid)=>setGroupDraft(draft.map((g,j)=>{
              if(j!==gi) return g;
              const has=g.players.includes(pid);
              return {...g,players:has?g.players.filter(x=>x!==pid):[...g.players,pid]};
            }));
            const GROUP_COLORS=['#a78bfa','#34d399','#fbbf24','#f87171','#60a5fa','#e879f9'];
            // Build over-by-over preview sequence
            const seq=draft.flatMap((g,gi)=>
              Array.from({length:g.overs},(_, o)=>({pid:g.players[o%g.players.length]||null,gi}))
            );
            const totColor=totalPlanned===match.overs?accent:totalPlanned>match.overs?"#ef4444":"#556677";
            return(
              <div>
                <div style={{color:"#8899aa",fontSize:11,lineHeight:1.5,marginBottom:12}}>
                  Groups bowl in order. Players within a group rotate round-robin.
                  {hasSpellPlan&&spellPlanRaw?.type==="group"&&<span style={{color:accent,fontWeight:700}}> Group plan active ✓</span>}

                {/* Load saved team plan banner */}
                {savedTeamPlan&&savedTeamPlan.type==="group"&&!hasSpellPlan&&(
                  <div style={{marginBottom:12,padding:"10px 12px",background:`rgba(${hexToRgb(accent)},.08)`,
                    border:`1px solid rgba(${hexToRgb(accent)},.3)`,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:11,fontWeight:700,color:accent}}>💾 Saved group plan for this team</div>
                      <div style={{fontSize:9,color:"#8899aa",marginTop:2}}>
                        {(savedTeamPlan.groups||[]).map((g,i)=>`G${i+1}: ${g.players.map(id=>bowlTeam?.players?.find(p=>p.id===id)?.name.split(" ")[0]||"?").join("/")} ×${g.overs}ov`).join(" → ")}
                      </div>
                    </div>
                    <button onClick={()=>{ saveSpellPlan(savedTeamPlan); setBowlerTab("pick"); }}
                      style={{...S.primaryBtn(accent),padding:"6px 12px",fontSize:11,flexShrink:0}}>
                      Load →
                    </button>
                  </div>
                )}

                {draft.map((grp,gi)=>{
                  const col=GROUP_COLORS[gi%GROUP_COLORS.length];
                  return(
                    <div key={gi} style={{marginBottom:10,border:`1px solid ${col}33`,borderRadius:10,padding:"10px 10px 12px",background:"rgba(255,255,255,.02)"}}>
                      {/* Group header */}
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                        <div style={{width:20,height:20,borderRadius:"50%",background:`${col}22`,
                          display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:col,flexShrink:0}}>
                          {gi+1}
                        </div>
                        <span style={{color:"#cdd5e0",fontWeight:700,fontSize:12,flex:1}}>Group {gi+1}</span>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <button onClick={()=>setGroupOvers(gi,(grp.overs||1)-1)}
                            style={{...S.iconBtn,padding:"3px 8px",fontSize:14,lineHeight:1}}>−</button>
                          <span style={{minWidth:22,textAlign:"center",fontWeight:800,fontSize:13,color:col}}>{grp.overs||1}</span>
                          <button onClick={()=>setGroupOvers(gi,(grp.overs||1)+1)}
                            style={{...S.iconBtn,padding:"3px 8px",fontSize:14,lineHeight:1}}>+</button>
                          <span style={{fontSize:10,color:"#445566"}}>ov</span>
                        </div>
                        <button onClick={()=>removeGroup(gi)}
                          style={{...S.iconBtn,color:"#ef4444",padding:"3px 8px",flexShrink:0,marginLeft:2}}>✕</button>
                      </div>

                      {/* Player chip picker */}
                      <div style={{fontSize:10,color:"#445566",fontWeight:700,letterSpacing:.5,marginBottom:5}}>TAP TO ADD BOWLERS:</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}}>
                        {(bowlTeam?.players||[]).map(p=>{
                          const sel=grp.players.includes(p.id);
                          return(
                            <button key={p.id} onClick={()=>togglePlayer(gi,p.id)}
                              style={{padding:"5px 10px",borderRadius:20,cursor:"pointer",fontFamily:"inherit",
                                border:`1.5px solid ${sel?col:"#1e3050"}`,
                                background:sel?`${col}22`:"rgba(255,255,255,.03)",
                                color:sel?"#e2e8f0":"#556677",fontSize:11,fontWeight:sel?700:400}}>
                              {p.name}
                            </button>
                          );
                        })}
                      </div>

                      {/* Rotation preview */}
                      {grp.players.length>0
                        ? <div style={{fontSize:10,color:col,opacity:.8}}>
                            {grp.players.map(id=>bowlTeam?.players?.find(p=>p.id===id)?.name.split(" ")[0]||"?").join(" → ")} → repeats for {grp.overs} ov
                          </div>

// ─── SCORECARD SUB-COMPONENTS ─────────────────────────────────────────────────
function BatCard({inn,team,accent,bowlingTeam,match,db}){
  const bats=team?.players?.filter(p=>inn.batsmen[p.id])||[];
  if(!bats.length) return <div style={S.empty}>No batting data yet</div>;

  function dismissalLine(s){
    if(!s.out) return null;
    const how=s.how;
    // Search matchTeams + full db for names
    const findName=(id)=>{
      if(!id) return null;
      for(const tm of Object.values(match.matchTeams||{})){
        const f=tm?.players?.find(p=>p.id===id); if(f) return f.name;
      }
      for(const t of (db.teams||[])){
        const f=t.players?.find(p=>p.id===id); if(f) return f.name;
      }
      return null;
    };
    const bowlerName=findName(s.bowlerId);
    const fielderName=findName(s.fielderId);
    const bPart=bowlerName?` b ${bowlerName}`:"";
    if(how==="Bowled")         return bowlerName?`b ${bowlerName}`:"bowled";
    if(how==="Caught")         return fielderName&&bowlerName?`c ${fielderName} b ${bowlerName}`:
                                      fielderName?`c ${fielderName}${bPart}`:
                                      bowlerName?`c (unk) b ${bowlerName}`:"caught";
    if(how==="LBW")            return bowlerName?`lbw b ${bowlerName}`:"lbw";
    if(how==="Stumped")        return fielderName&&bowlerName?`st †${fielderName} b ${bowlerName}`:
                                      fielderName?`st †${fielderName}${bPart}`:"stumped";
    if(how==="Run Out")        return fielderName?`run out (${fielderName})`:"run out";
    if(how==="Hit Wicket")     return bowlerName?`hit wkt b ${bowlerName}`:"hit wicket";
    if(how==="Caught & Bowled")return bowlerName?`c&b ${bowlerName}`:"c&b";
    if(how==="Mankad")         return bowlerName?`Mankad b ${bowlerName}`:"Mankad";
    return how||"out";
  }

  return(
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
        <thead>
          <tr style={{borderBottom:"1px solid #1e2d40"}}>
            {["Batsman","R","B","4s","6s","SR"].map(h=>(
              <th key={h} style={{padding:"5px 4px",textAlign:h==="Batsman"?"left":"center",
                color:"#8899aa",fontWeight:700,fontSize:9,letterSpacing:.5}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {bats.map(p=>{
            const s=inn.batsmen[p.id];
            const sr=s.balls>0?((s.runs/s.balls)*100).toFixed(0):"—";
            const isStr=p.id===inn.onStrike, isNS=p.id===inn.nonStrike;
            return(
              <tr key={p.id} style={{borderBottom:"1px solid #0f1824",background:isStr?`rgba(${hexToRgb(accent)},.05)`:""}}>
                <td style={{padding:"7px 4px",fontWeight:isStr?700:400}}>
                  {p.name}{isStr&&<span style={{color:accent,marginLeft:4}}>⚡</span>}{isNS&&<span style={{color:"#8899aa",marginLeft:4}}>●</span>}
                  {s.out&&<div style={{color:"#667788",fontSize:9,fontStyle:"italic",marginTop:1}}>{dismissalLine(s)}</div>}
                </td>
                {[s.runs,s.balls,s.fours,s.sixes,sr].map((v,i)=>(
                  <td key={i} style={{textAlign:"center",padding:"7px 4px",
                    color:i===0&&s.runs>=50?"#f59e0b":i===0&&s.runs>=30?accent:"#cdd5e0"}}>{v}</td>
                ))}
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function BowlCard({inn,team,accent}){
  const bowls=team?.players?.filter(p=>inn.bowlers[p.id]&&inn.bowlers[p.id].balls>0)||[];
  if(!bowls.length) return <div style={S.empty}>No bowling data yet</div>;
  return(
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>

          <tr style={{borderBottom:"1px solid #1e2d40"}}>
            {["Bowler","O","R","W","Econ"].map(h=>(

                color:"#8899aa",fontWeight:700,fontSize:9,letterSpacing:.5}}>{h}</th>

          </tr>
        </thead>
        <tbody>
          {bowls.map(p=>{
            const b=inn.bowlers[p.id];

                  {p.name}{isCur&&<span style={{color:"#a78bfa",marginLeft:4}}>▶</span>}

                {[ovrStr(b.balls),b.runs,b.wickets,econ].map((v,i)=>(

}

// ─── FULL SCORECARD ───────────────────────────────────────────────────────────
function FullScorecard({match,db,accent,onBack,persist,showToast}){
  const [showMotm,setShowMotm]=useState(false);
  const [motmSearch,setMotmSearch]=useState("");
  const [editDetails,setEditDetails]=useState(false);
  const [editGround,setEditGround]=useState(match.ground||"");
  const [editTournId,setEditTournId]=useState(match.tournamentId||"");

  const saveDetails=()=>{
    persist({...db,matches:db.matches.map(m=>m.id===match.id
      ?{...m,ground:editGround.trim()||m.ground,tournamentId:editTournId||null}
      :m)});
    setEditDetails(false);
    showToast("Match details updated!");
  };

  const _t1Full=db.teams?.find(t=>t.id===match.team1Id);
  const _t2Full=db.teams?.find(t=>t.id===match.team2Id);
  const t1=match.matchTeams?.[match.team1Id]||_t1Full;
  const t2=match.matchTeams?.[match.team2Id]||_t2Full;
  const inn1=match.innings?.[0], inn2=match.innings?.[1];

  // All players from both teams for MOTM picker (use full squad for motm, not just XI)
  const allPlayers=[
    ...(_t1Full?.players||[]).map(p=>({...p,teamName:_t1Full?.name||""})),
    ...(_t2Full?.players||[]).map(p=>({...p,teamName:_t2Full?.name||""})),
  ];
  const motmPlayer=match.motm?allPlayers.find(p=>p.id===match.motm):null;
  const filtered=allPlayers.filter(p=>p.name.toLowerCase().includes(motmSearch.toLowerCase()));

  const setMotm=(id)=>{
    persist({...db,matches:db.matches.map(m=>m.id===match.id?{...m,motm:id}:m)});
    setShowMotm(false);
  };

  // Dismissal line helper — searches full db for names, never shows "?"
  function findPlayerName(id) {
    if(!id) return null;
    // Search matchTeams first (playing XI), then full db
    for(const teamObj of Object.values(match.matchTeams||{})){
      const found=teamObj?.players?.find(p=>p.id===id);
      if(found) return found.name;
    }
    for(const t of (db.teams||[])){
      const found=t.players?.find(p=>p.id===id);
      if(found) return found.name;
    }
    return null;
  }
  function dline(s){
    if(!s.out) return "not out";
    const how=s.how;
    const bowlerName=findPlayerName(s.bowlerId);
    const fielderName=findPlayerName(s.fielderId);
    const bPart=bowlerName?` b ${bowlerName}`:"";
    if(how==="Bowled")          return bowlerName?`b ${bowlerName}`:"bowled";
    if(how==="Caught")          return fielderName&&bowlerName?`c ${fielderName} b ${bowlerName}`:
                                       fielderName?`c ${fielderName}${bPart}`:
                                       bowlerName?`c (unk) b ${bowlerName}`:"caught";
    if(how==="LBW")             return bowlerName?`lbw b ${bowlerName}`:"lbw";
    if(how==="Stumped")         return fielderName&&bowlerName?`st †${fielderName} b ${bowlerName}`:
                                       fielderName?`st †${fielderName}${bPart}`:"stumped";
    if(how==="Run Out")         return fielderName?`run out (${fielderName})`:"run out";
    if(how==="Hit Wicket")      return bowlerName?`hit wkt b ${bowlerName}`:"hit wicket";
    if(how==="Caught & Bowled") return bowlerName?`c&b ${bowlerName}`:"c&b";
    if(how==="Mankad")          return bowlerName?`Mankad b ${bowlerName}`:"Mankad";
    if(how==="Handled Ball")    return "handled ball";
    if(how==="Obstructing Field") return "obstructing field";
    if(how==="Timed Out")       return "timed out";
    return how||"out";
  }

  function InningsBatTable({inn, batTeam, bowlTeam}){
    // Include players who actually batted, even if not in squad list
    const squadIds=new Set((batTeam?.players||[]).map(p=>p.id));
    const extraBatters=Object.keys(inn.batsmen||{})
      .filter(id=>!squadIds.has(id))
      .map(id=>{
        // Try to find in full db teams
        for(const t of (db.teams||[])){
          const found=t.players?.find(p=>p.id===id);
          if(found) return found;
        }
        return {id,name:"Unknown",role:""};
      });
    const bats=[...(batTeam?.players||[]).filter(p=>inn.batsmen[p.id]),...extraBatters.filter(p=>inn.batsmen[p.id])];
    const totalExtra=Object.values(inn.extras||{}).reduce((a,b)=>a+b,0);
    const extrasStr=Object.entries(inn.extras||{})
      .filter(([,v])=>v>0).map(([k,v])=>`${k} ${v}`).join(", ");
    return(
      <div style={{marginBottom:20}}>
        {/* Batting header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          borderBottom:`2px solid rgba(${hexToRgb(accent)},.4)`,paddingBottom:6,marginBottom:8}}>
          <div style={{fontWeight:800,fontSize:13,color:accent}}>{batTeam?.name||"Batting"}</div>
          <div style={{fontWeight:900,fontSize:16,color:accent}}>{inn.runs}/{inn.wickets}
            <span style={{color:"#8899aa",fontSize:11,fontWeight:400}}> ({ovrStr(inn.balls)} ov)</span>
          </div>
        </div>
        {/* Batting rows */}
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,marginBottom:6}}>
          <thead>
            <tr style={{borderBottom:"1px solid #1a2840"}}>
              {["Batsman","Dismissal","R","B","4s","6s","SR"].map((h,i)=>(
                <th key={h} style={{padding:"4px 3px",textAlign:i<=1?"left":"center",
                  color:"#556677",fontSize:9,fontWeight:700,letterSpacing:.4}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {bats.map(p=>{
              const s=inn.batsmen[p.id];
              const sr=s.balls>0?((s.runs/s.balls)*100).toFixed(0):"—";
              return(
                <tr key={p.id} style={{borderBottom:"1px solid #0d1424"}}>
                  <td style={{padding:"6px 3px",fontWeight:600,whiteSpace:"nowrap",maxWidth:90,overflow:"hidden",textOverflow:"ellipsis"}}>
                    {p.name}
                    {p.id===motmPlayer?.id&&<span style={{marginLeft:3,fontSize:9}}>⭐</span>}
                  </td>
                  <td style={{padding:"6px 3px",color:"#667788",fontSize:9,fontStyle:"italic",maxWidth:110,overflow:"hidden",textOverflow:"ellipsis"}}>
                    {dline(s)}
                  </td>
                  {[s.runs,s.balls,s.fours||0,s.sixes||0,sr].map((v,i)=>(
                    <td key={i} style={{textAlign:"center",padding:"6px 3px",
                      fontWeight:i===0&&s.runs>=50?700:400,
                      color:i===0&&s.runs>=100?"#f59e0b":i===0&&s.runs>=50?accent:"#cdd5e0"}}>{v}</td>
                  ))}
                </tr>
              );
            })}
            {/* Extras + total */}
            <tr style={{borderTop:"1px solid #1a2840"}}>
              <td colSpan={2} style={{padding:"6px 3px",color:"#8899aa",fontSize:10}}>Extras ({extrasStr||"none"})</td>
              <td style={{textAlign:"center",padding:"6px 3px",color:"#8899aa"}}>{totalExtra}</td>
              <td colSpan={3}/>
              <td/>
            </tr>
            <tr style={{borderTop:"1px solid #1a2840",background:`rgba(${hexToRgb(accent)},.05)`}}>
              <td colSpan={2} style={{padding:"6px 3px",fontWeight:800,fontSize:12}}>TOTAL</td>
              <td style={{textAlign:"center",padding:"6px 3px",fontWeight:900,fontSize:13,color:accent}}>{inn.runs}</td>
              <td colSpan={2} style={{padding:"6px 3px",color:"#8899aa",fontSize:10}}>/{inn.wickets} wkts</td>
              <td colSpan={2} style={{padding:"6px 3px",color:"#8899aa",fontSize:10,textAlign:"right"}}>{ovrStr(inn.balls)} ov</td>
            </tr>
          </tbody>
        </table>
        {/* Bowling */}
        <div style={{color:"#8899aa",fontSize:9,fontWeight:700,letterSpacing:1,marginBottom:4,marginTop:12}}>BOWLING</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
          <thead>
            <tr style={{borderBottom:"1px solid #1a2840"}}>
              {["Bowler","O","M","R","W","Econ","Wd","NB"].map((h,i)=>(
                <th key={h} style={{padding:"4px 3px",textAlign:i===0?"left":"center",
                  color:"#556677",fontSize:9,fontWeight:700,letterSpacing:.4}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {(()=>{
              const bowlSquadIds=new Set((bowlTeam?.players||[]).map(p=>p.id));
              const extraBowlers=Object.keys(inn.bowlers||{})
                .filter(id=>!bowlSquadIds.has(id)&&inn.bowlers[id]?.balls>0)
                .map(id=>{
                  for(const t of (db.teams||[])){
                    const found=t.players?.find(p=>p.id===id);
                    if(found) return found;
                  }
                  return {id,name:"Unknown",role:""};
                });
              const bowlers=[...(bowlTeam?.players||[]).filter(p=>inn.bowlers[p.id]?.balls>0),...extraBowlers];

                      color:i===3&&b.wickets>=5?"#f59e0b":i===3&&b.wickets>0?accent:"#cdd5e0"}}>{v}</td>
                  ))}
                </tr>
              );
            })}
          </tbody>
        </table>
        {/* FOW */}
        {inn.fallOfWickets?.length>0&&(
          <div style={{marginTop:10,fontSize:9,color:"#556677",lineHeight:1.6}}>
            <span style={{fontWeight:700,color:"#8899aa",letterSpacing:.5}}>FOW: </span>

                <span key={i}>{i>0&&", "}<b style={{color:"#8899aa"}}>{f.score}/{f.wicket}</b> {pl?.name||"?"} ({f.over})</span>

            })}
          </div>
        )}
        {/* Over-by-over */}
        {(inn.overs||[]).length>0&&(
          <div style={{marginTop:14}}>
            <div style={{color:"#8899aa",fontSize:9,fontWeight:700,letterSpacing:1,marginBottom:6}}>OVER BY OVER</div>
            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"collapse",fontSize:10,minWidth:"100%"}}>
                <thead>
                  <tr style={{borderBottom:"1px solid #1a2840"}}>
                    <th style={{padding:"3px 5px",color:"#556677",fontSize:8,fontWeight:700,textAlign:"left",whiteSpace:"nowrap"}}>Ov</th>
                    <th style={{padding:"3px 5px",color:"#556677",fontSize:8,fontWeight:700,textAlign:"left"}}>Bowler</th>
                    <th style={{padding:"3px 5px",color:"#556677",fontSize:8,fontWeight:700,textAlign:"center"}}>Balls</th>
                    <th style={{padding:"3px 5px",color:"#556677",fontSize:8,fontWeight:700,textAlign:"center"}}>Runs</th>
                    <th style={{padding:"3px 5px",color:"#556677",fontSize:8,fontWeight:700,textAlign:"center"}}>W</th>
                    <th style={{padding:"3px 5px",color:"#556677",fontSize:8,fontWeight:700,textAlign:"center"}}>Total</th>
                  </tr>
                </thead>
                <tbody>
                  {(()=>{
                    let cumRuns=0, cumWkts=0;
                    return (inn.overs||[]).map((ov,i)=>{
                      const ovRuns=ov.balls.reduce((s,b)=>s+(b.runs||0),0);
                      const ovWkts=ov.balls.filter(b=>b.type==="wicket").length;
                      cumRuns+=ovRuns; cumWkts+=ovWkts;
                      const bowler=findPlayerName(ov.bowlerId)||"?";
                      const dotBalls=ov.balls.filter(b=>b.type==="run"&&b.runs===0).length;
                      return(
                        <tr key={i} style={{borderBottom:"1px solid #0d1424",
                          background:ovWkts>0?`rgba(239,68,68,.05)`:""}}>
                          <td style={{padding:"5px 5px",fontWeight:700,color:accent,fontSize:9}}>{i+1}</td>
                          <td style={{padding:"5px 5px",color:"#cdd5e0",fontSize:9,whiteSpace:"nowrap"}}>{bowler}</td>
                          <td style={{padding:"5px 5px",textAlign:"center"}}>
                            <div style={{display:"flex",gap:2,justifyContent:"center",flexWrap:"wrap"}}>
                              {ov.balls.map((b,j)=>{
                                const bg=b.type==="wide"?"#7c3aed":b.type==="noBall"?"#dc2626":b.type==="wicket"?"#ef4444":
                                         b.type==="bye"||b.type==="legbye"?"#0891b2":b.runs===6?"#f59e0b":b.runs===4?"#22c55e":"#1e2d40";
                                const lbl=b.type==="wide"?"W":b.type==="noBall"?"N":b.type==="wicket"?"W":b.runs===0?".":b.runs;
                                return <span key={j} style={{width:16,height:16,borderRadius:"50%",display:"inline-flex",
                                  alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:800,
                                  background:bg,color:"#fff"}}>{lbl}</span>;
                              })}
                            </div>
                          </td>
                          <td style={{padding:"5px 5px",textAlign:"center",fontWeight:700,
                            color:ovRuns>=15?"#f59e0b":ovRuns>=10?accent:"#cdd5e0"}}>{ovRuns}</td>
                          <td style={{padding:"5px 5px",textAlign:"center",
                            color:ovWkts>0?"#ef4444":"#556677"}}>{ovWkts||"—"}</td>
                          <td style={{padding:"5px 5px",textAlign:"center",color:"#8899aa",fontSize:9}}>{cumRuns}/{cumWkts}</td>
                        </tr>
                      );
                    });
                  })()}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    );
  }

  return(
    <div className="af" style={{padding:"16px 16px 40px",minHeight:"100vh",background:"#060b14"}}>

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>

          Object.keys(inn.bowlers||{}).forEach(id=>{
